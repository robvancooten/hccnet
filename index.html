    import * as THREE from 'three';

    // alert("urlcdn:" + leesURL() );

    let menu = document.getElementById("menu");
    menu.innerHTML = leesMenuTekst();

    let spaties = "&nbsp; &nbsp; &nbsp; &nbsp;&nbsp; &nbsp; &nbsp; &nbsp;";
    let mess = "";
    let messlocal = "<h4>" + spaties + " HELLO localhost.<br>";
    messlocal += spaties + "Threejs Versie: " + THREE.REVISION + "<br>";
    messlocal += spaties + "HTML mode: " + document.compatMode;

    if (window.jQuery) {       // jQuery is loaded => print the version     
      messlocal = messlocal + '<br>' + spaties + 'jQuery versie: ' + (jQuery.fn.jquery) + "</h4>";

      /*       
      document.getElementById("kopje").onmousemove = function() {mouseOver()};
      document.getElementById("kopje").onmouseup = function() {mouseOut()};
      
      function mouseOver() {

        //  alert("Over me"); 
      }
      function mouseOut() {

      toonFeestjes();

    $(document).ready(function () {

      let buttonR = document.getElementById("buttonR");
      buttonL.addEventListener("pointerdown", open_gordijn, false);
      buttonR.addEventListener("pointerdown", close_gordijn, false);

      close_gordijn();  // dan is close knop weg. 

      // alert("Document Ready");
      let tekst = 'Roterende beelden in 3D. Of  ' +
        '  ff spelen. <br>';
      let bubbelinfo = document.getElementById("bubbelinfo");
      bubbelinfo.innerHTML = tekst;

      $("#particles").load("particles/index.html");

      //  if (location.hostname != "localhost")
      //    document.getElementById("footer").style.display = "none";
    });   // end function ready. 

    function toonFeestjes() {
      const d = new Date();
      // const d = new Date("July 11, 2025");
      let jaar = d.getYear();
      // alert(d); 
      // let dag = d.getDate() ; 
      let dag = dayofyear(d);
      const paasdag = eerstePaasDag(d.getFullYear());

      // console.log(paasdag); 
      const lente = new Date(jaar + "-03-20");
      const zomer = new Date(jaar + "-06-21");
      const herfst = new Date(jaar + "-09-22");
      const dec5 = new Date(jaar + "-12-05");
      const kerst = new Date(jaar + "-12-25");
      const nieuwjaar = new Date(jaar + "-12-31");

      let aantaldagentotlente = (dayofyear(lente) - dag).valueOf();
      let aantaldagentotpasen = (dayofyear(paasdag) - dag).valueOf();
      let aantaldagentotpinsteren = aantaldagentotpasen + 49;
      //  alert ("aantal dagen tot Pasen: " + aantaldagentotpasen) ;   
      let aantaldagentot5dec = (dayofyear(dec5) - dag).valueOf();
      let aantaldagentotzomer = (dayofyear(zomer) - dag).valueOf();
      let aantaldagentotherfst = (dayofyear(herfst) - dag).valueOf();
      let aantaldagentotkerst = (dayofyear(kerst) - dag).valueOf();
      let aantaldagentotnieuwjaar = (dayofyear(nieuwjaar) - dag + 1).valueOf();

      //  alert("aantal dagen tot Sinterklaas: " + toWord(aantaldagen) );  
      if (aantaldagentotlente > 0)
        mess = mess + "<h4>" + spaties + "aantal dagen tot de lente: " + toWord(aantaldagentotlente) + "<br>";
      else if (aantaldagentotpasen > 0)
        mess = mess + "<h4>" + spaties + "aantal dagen tot 1e Paasdag: " + toWord(aantaldagentotpasen) + "<br>";
      else if (aantaldagentotpinsteren > 0)
        mess = mess + "<h4>" + spaties + "aantal dagen tot Pinsteren: " + toWord(aantaldagentotpinsteren) + "<br>";
      else if (aantaldagentotzomer > 0)
        mess = mess + "<h4>" + spaties + "aantal dagen tot de zomer: " + toWord(aantaldagentotzomer) + "<br>";
      else if (aantaldagentotherfst > 0)
        mess = mess + "<h4>" + spaties + "aantal dagen tot de herfst: " + toWord(aantaldagentotherfst) + "<br>";
      else if (aantaldagentot5dec > 0)
        mess = mess + "<h4>" + spaties + "aantal dagen tot Sinterklaas: " + toWord(aantaldagentot5dec) + "<br>";
      else if (aantaldagentotkerst > 0)
        mess = mess + "<h4>" + spaties + "aantal dagen tot Kerst: " + toWord(aantaldagentotkerst) + "<br>";
      else if (aantaldagentotnieuwjaar > 0)
        mess = mess + "<h4>" + spaties + "aantal dagen tot Nieuwjaar: " + toWord(aantaldagentotnieuwjaar) + "<br>";
      else mess = mess + "<h4>" + spaties + "Geen feestjes voorlopig " + "<br>";

    }
