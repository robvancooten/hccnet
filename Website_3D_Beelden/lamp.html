<body>
    <div id="menu">
        <!-- tekst dynamisch-->
    </div>

    <!-- Import maps polyfill -->
    <!-- Remove this when import maps will be widely supported   -->
    <script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "./build/three.module.js"

    <script type="module">
        import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './my_js/menu_tekst.js';
        import * as THREE from 'three';
        import { OrbitControls } from './jsm/controls/OrbitControls.js';
        import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';

        let scene, camera, renderer;
        let controls;

        let intens = 10;

        let breedte = 32;

        let move = true;

        init();

        animate();

        function init() {
            maakMenu();
            maakScene();
            maakKubus();
            maakBelichting();
        
            maakLamp(1, 1, 0);
            maakLamp2(-1, -1, 0);   // bol 
            maakLamp3( 0, 0, -1);  // rechthoekig
            maakLamp4( 0, 0, 0);            


            maakFloor()


            startOrbitController();
            controls.update();

        }  // end init

        function maakMenu() {
            let menu = document.getElementById("menu");
            if (isTouchDevice())
                menu.innerHTML = leesMenuTekst() + "Planet with Heads - Use fingers to zoom, rotate. Touch for reverse rotation -";
            else
                menu.innerHTML = leesMenuTekst() + "Planet with Heads - Click for reverse rotation. Zoom with MouseWheel -";

            kleurActiveLink();
        }

        function maakScene() {
            // 1. Scene setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            // 6. Camera position
            camera.position.z = 5;
            camera.position.y = 1;
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        function render() {
            //            stats.update();

            camera.lookAt(scene.position);
            controls.autoRotate = move;
            if (move)
                controls.autoRotateSpeed = 4
            else
                controls.autoRotateSpeed = 0;

            renderer.render(scene, camera);
        }  // einde render 

        function startOrbitController() {
            controls = new OrbitControls(camera, renderer.domElement);
            controls.addEventListener('change', render);
            //  controls.listenToKeyEvents(window);    // pijltjes toetsen.
            //     controls.enableDamping = true; // an animation loop is required when either damping or auto-rotation are enabled
            //     controls.dampingFactor = 0.05;

            controls.minPolarAngle = + Math.PI * 0.1;     // tilt. , x as.            
            controls.maxPolarAngle = + Math.PI * 2;

            //    controls.minAzimuthAngle =  - Math.PI * 2.5;      // rot y as.
            //    controls.maxAzimuthAngle =  + Math.PI * 2.5;

            controls.minDistance = 0.5;
            controls.maxDistance = 50;  // 0.2

            controls.enableRotate = true;

            controls.target.set(0, 0, 0);

            controls.autoRotate = true;
            controls.autoRotateSpeed = 4;   // 2 is default. 

            controls.update();
        }   // einde startOrbitControls.

        function maakKubus() {
             const texture = new THREE.TextureLoader().load('./images/marjan.jpg');
            let material = new THREE.MeshPhongMaterial({ map: texture, color: 0xaaaaaa, shininess: 2000, reflectivity: 1.0  });            
        //    let material = new THREE.MeshPhongMaterial({ color: 0xf0f0f0, shininess: 200, reflectivity: 1.0 });
            material.side = THREE.DoubleSide;
            //    material.side = THREE.BackSide; // BackSide, FrontSide, DoubleSide. 
            material.specular.set(0xffffff);

            let geometry = new THREE.BoxGeometry(breedte, breedte, breedte);
            let kubus = new THREE.Mesh(geometry, material);
            //   kubus.position.z = -breedte/2 ;
            kubus.receiveShadow = true;
            //  kubus.castShadow = false;
            scene.add(kubus);
        }

        function maakFloor() {
            // 5. Add a floor/object to see the light affect it
            const planeGeo = new THREE.PlaneGeometry(10, 10);
            const planeMat = new THREE.MeshStandardMaterial({ color: 0x808080 });
            const floor = new THREE.Mesh(planeGeo, planeMat);
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = -breedte/20;
            scene.add(floor);
        }

        function maakBelichting() {
            intens = 5;
            const alight = new THREE.AmbientLight(0xf0f0f0, intens); // soft white light, intensity
            scene.add(alight);

            const pointLight = new THREE.PointLight(0xff0000, 2.5, 0, 0);
            camera.add(pointLight);
        }

        function maakLamp(x = 0, y = 0, z = 0) {
            // 2. Create the outer transparent sphere (the lamp shade)
            let radius = 4;
            const glassGeometry = new THREE.SphereGeometry(radius, 32, 32);
            const glassMaterial = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.2,
                transmission: 0.9, // 0.9 Physically correct transparency
                roughness: 0.05  // 0.05 
            });
            const kap = new THREE.Mesh(glassGeometry, glassMaterial);
            // scene.add(kap);

            // 3. Create the inner light bulb
            radius = 0.2;
            const bulbGeometry = new THREE.SphereGeometry(radius, 16, 16);
            const bulbMaterial = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                emissive: 0xffffff,
                emissiveIntensity: 10
            });
            const bulb = new THREE.Mesh(bulbGeometry, bulbMaterial);
            //  scene.add(bulb);

            // 4. Create the light source inside the bulb

            const pointLight = new THREE.PointLight(0xffffff, intens, 100);
            bulb.add(pointLight); // Add light to the bulb mesh so it moves with it

            let lamp = new THREE.Group();
            lamp.add(kap);
            lamp.add(bulb);
            lamp.position.x = x;
            lamp.position.y = y;
            lamp.position.z = z;
            scene.add(lamp);
        }

        function maakLamp2(x = 1, y = 0, z = 0) {
            // 2. Create the outer transparent sphere (the lamp shade)
            let radius = 0.3;  // 4
            const glassGeometry = new THREE.SphereGeometry(radius, 32, 32);

                transmission: 0.9, // 0.9 Physically correct transparency

            });

            let geometry = new THREE.SphereGeometry(radius, 16, 32, 0, 2 * Math.PI, 0, 0.5 * Math.PI);
            //   material.side = THREE.DoubleSide;
            const textuur = new THREE.TextureLoader().load('images/blad.jpg');
            const bumpTexture = new THREE.TextureLoader().load('images/blad_bump.jpg');

            const mat = new THREE.MeshPhongMaterial({
                map: textuur,
                // opacity : 0.0 ,
                // alphaMap : 1 , 
                color: 0xffffff,

                // metalness: 0.5,   niet voor dit materiaal
                emissive: 0x001100,   // 'darkgreen'
                specular: 0x001500,
                reflectivity: 1.0,   // doet niet veel
                bumpMap: bumpTexture,
                bumpScale: 30
            });

            //    const kap = new THREE.Mesh(glassGeometry, glassMaterial);
            const kap = new THREE.Mesh(geometry, mat);
            // scene.add(kap);

            // 3. Create the inner light bulb
            radius = 0.2;
            const bulbGeometry = new THREE.SphereGeometry(radius, 16, 16);
            const bulbMaterial = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                emissive: 0xffffff,
                emissiveIntensity: 10
            });
            const bulb = new THREE.Mesh(bulbGeometry, bulbMaterial);
            //  scene.add(bulb);

            // 4. Create the light source inside the bulb

            const pointLight = new THREE.PointLight(0xffffff, intens, 100);
            bulb.add(pointLight); // Add light to the bulb mesh so it moves with it

            let lamp = new THREE.Group();
            lamp.add(kap);
            lamp.add(bulb);
            lamp.position.x = x;
            lamp.position.y = y;
            lamp.position.z = z;
            scene.add(lamp);
        }

            let kap= new THREE.Mesh(geometry, material);
            //scene.add(kap);

            // 3. Create the inner light bulb
            let radius = 0.2;

             bulbGeometry = new THREE.CylinderGeometry(0.05,0.2,0.2, 8, 1 , false);

            // 4. Create the light source inside the bulb

            const pointLight = new THREE.PointLight(0xff00ff, intens, 100);
            bulb.add(pointLight); // Add light to the bulb mesh so it moves with it

            let lamp = new THREE.Group();
            lamp.add(kap);

            lamp.position.x = x;

    </script>
