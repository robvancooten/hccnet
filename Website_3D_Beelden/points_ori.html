<!DOCTYPE html>
<html lang="en">

<head>
    <title>point lights</title>
    <meta charset="utf-8">
    <!-- 
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
        -->
    <!-- <meta http-equiv="refresh" content="5">    -->
    <link type="text/css" rel="stylesheet" href="css/main.css">
    <link type="text/css" rel="stylesheet" href="css/menu.css">
    <style>
        body {
            /*  cursor:none;    */
            cursor: url(./images/kop.cur), auto;
        }
    </style>
</head>

<body>

    <div id="menu">

    </div>

    <!-- Import maps polyfill -->
    <!-- Remove this when import maps will be widely supported -->
    <script async src="./build/es-module-shims.js"></script>

    <script type="importmap">
			{
				"imports": {
					"three": "./build/three.module.js"
				}
			}
		</script>

    <script type="module">
        import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './my_js/menu_tekst.js';
        import * as THREE from 'three';

        import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from './jsm/controls/OrbitControls.js';
        import Stats from './jsm/libs/stats.module.js'

        let camera, scene, renderer;
        let controls;   // touch mouse controls            
        const focus = 100;

        let z = 70;
        let mouseX = 0, mouseY = 0;
        var isTouching = false;
        var touchDevice = false;
        let move = true;
        //  var mousePositionX;


        let light = [], lightHolder;
        let pad = 'modellen/glb/';
        const kop = 'bladerKop';

        let object;
        let bol;
        let breedte = 500;
        var r = +1;


        const clock = new THREE.Clock();
        const stats = new Stats();

        init();
        animate();

        function init() {
            touchDevice = is_touch_enabled();

            //    camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 1000);
            //    camera.position.z = focus;
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 6, 50);

            let menu = document.getElementById("menu");
            if (touchDevice)
                menu.innerHTML = leesMenuTekst() + "touch to rotate and tilt. ";
            else
                menu.innerHTML = leesMenuTekst() + "Mousewheel to zoom. Mouse followed by green light. Click 2 freeze light. ";

            kleurActiveLink();


            // let x = location.hostname;
            if (location.hostname == "localhost")
                pad = "./modellen/glb/"
            else
                pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";


            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x003300);

            const alight = new THREE.AmbientLight(0x404040, 1.5); // soft white light, intensity
            scene.add(alight);


            /* 
            var shadowIntensity = 0.5; // between 0 and 1

            var light2 = light1.clone();
            light1.castShadow = true;
            light2.castShadow = false;
            light1.intensity = shadowIntensity;
            light2.intensity = 1 - shadowIntensity;   */

            let intensiteit = 100.0;
            const shadowIntensity = 1; // between 0 and 1
            // White directional light at half intensity shining from the top: 0,5 
            let directionalLight1 = new THREE.DirectionalLight(0xffffff, intensiteit);

            directionalLight1.castShadow = true;
            directionalLight1.intensity = shadowIntensity;

            let directionalLight2 = new THREE.DirectionalLight(0xffffff, intensiteit);
            directionalLight2.castShadow = false;

            directionalLight1.position.set(50, 1.5, +50);
            directionalLight2.position.set(50, 1.5, +50);

            // Set up shadow properties for the light
            const w = 128;
            directionalLight1.shadow.mapSize.width = w;
            directionalLight1.shadow.mapSize.height = w;

            const lightCameraConstant = 32;  // 64, hoe kleiner hoe mooier rond. 
            directionalLight1.shadow.camera.left = -lightCameraConstant;
            directionalLight1.shadow.camera.right = lightCameraConstant;
            directionalLight1.shadow.camera.top = lightCameraConstant;
            directionalLight1.shadow.camera.bottom = -lightCameraConstant;

        //    directionalLight1.shadow.camera.near = 2.5;
        //    directionalLight1.shadow.camera.far = 256; // 512;
            scene.add(directionalLight1);
            //   scene.add(directionalLight2);

            const helper = new THREE.DirectionalLightHelper(directionalLight1);
            // const helper = new THREE.CameraHelper(directionalLight1.shadow.camera)
            //   scene.add(helper);

            const shadowHelper = new THREE.CameraHelper(directionalLight1.shadow.camera);
            //     scene.add(shadowHelper);

            maakPointLights();

            const planeGeometry = new THREE.PlaneGeometry(4 * 2048, 4 * 2048, 32, 32);
            let planeMaterial = new THREE.MeshPhongMaterial({ color: 0xc0c0c0, shininess: 200, reflectivity: 1.0 });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.receiveShadow = true;
            //  plane.position.y =  50;
            plane.position.z = - 20;
            plane.rotation.x = Math.PI * 2
            scene.add(plane);

            //model
            laadModel();
            //model
            function laadModel() {
                let model = pad + kop + '.glb';
                // console.log("model: " + model) ;
                const loader = new GLTFLoader();

                loader.load(model, function (gltf) {
                    object = gltf.scene.children[0];
                    object.scale.x = object.scale.y = object.scale.z = 1;
                    object.traverse(function (child) {
                        if (child.isMesh) {
                            child.castShadow = true;
                        }
                    });
                    /*    object.position.x = 20;
                        object.position.y = 20;
                        object.position.z = 20;     */
                    scene.add(object);
                },
                );    // einde loader
            }   // einde laadModel 

            //renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.shadowMap.enabled = true;
            //        renderer.shadowMap.type = THREE.BasicShadowMap;    // zelfde CPU
            //  renderer.shadowMap.type = THREE.PCFShadowMap   // zelfde CPU. 
            renderer.shadowMap.type = THREE.PCFSoftShadowMap   // zwaarder.              
            // renderer.shadowMap.type = THREE.VSMShadowMap ;      // zelfde CPU          
            //  renderer.shadowMap.type = THREE.PCFSoftShadowMap
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(stats.dom)
            onWindowResize();

            // document.body.appendChild(renderer.domElement);


            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', onDocumentMouseMove);
            window.addEventListener("mousedown", (e) => {
                isTouching = true;
                move = !move;
                // alert("touch true"); 
                mouseX = e.clientX - window.innerWidth / 2;
                mouseY = e.clientY - window.innerHeight / 2;
                //  alert("mouseY: "  + event.clientY ); 
            });
            window.addEventListener("mouseup", (e) => isTouching = false);
            startOrbitController();
        }

        function onWindowResize() {

            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);

        }

        function onDocumentMouseMove(event) {
            isTouching = true;
            // alert("touch true"); 
            //   mouseX = e.clientX;
            //   mouseY = e.clientY;
            if (!touchDevice && move) {
                mouseX = (event.clientX - window.innerWidth / 2);
                mouseY = (event.clientY - window.innerHeight / 2);
            }
            else {
                //  mouseX = event.clientX;
                //  mouseY = event.clientY;

            }

        }
        // let op: touchmove werkt soms, afhankelijk browser en device!
        function is_touch_enabled() {
            return ('ontouchstart' in window) ||
                (navigator.maxTouchPoints > 0) ||
                (navigator.msMaxTouchPoints > 0);
        }

        function maakPointLights() {

            // bollampen : 
            // PointLight( color : Integer, intensity : Float, distance : Number, decay : Float )
            let intensity = 15;
            let distance = 80;
            let decay = 2;

            // SphereGeometry(radius : Float, widthSegments : Integer, heightSegments :
            let diameter = 2 * 1.6;
            const sphere = new THREE.SphereGeometry(diameter, 32, 16);  // voor lights.  

            let kl = 0x3333ff;
            let mat = new THREE.MeshPhongMaterial({ color: kl, shininess: 200, reflectivity: 0.1 });
            let bolleke0 = new THREE.Mesh(sphere, mat);
            bolleke0.castShadow = true;
            scene.add(bolleke0);
            light[0] = new THREE.PointLight(kl, intensity, distance, decay);   // decay 2 lijkt physica.
            light[0].add(bolleke0);
            // light[0].castShadow = true;
            scene.add(light[0]);

            kl = 0xaa55ff;
            mat = new THREE.MeshPhongMaterial({ color: kl, shininess: 200, reflectivity: 0.1 });
            let bolleke1 = new THREE.Mesh(sphere, mat);
            bolleke1.castShadow = true;
            scene.add(bolleke1);

            light[1] = new THREE.PointLight(kl, intensity, distance, decay);   // decay 2 lijkt physica.
            // light[1].castShadow = true;
            light[1].add(bolleke1);

            kl = 0xaaaa55;
            mat = new THREE.MeshPhongMaterial({ color: kl, shininess: 200, reflectivity: 0.1 });
            let bolleke2 = new THREE.Mesh(sphere, mat);
            bolleke2.castShadow = true;
            scene.add(bolleke2);
            light[2] = new THREE.PointLight(kl, intensity, distance, decay);   // decay 2 lijkt physica.
            //  light[2].castShadow = true;
            light[2].add(bolleke2);

            kl = 0xaa2222;
            mat = new THREE.MeshPhongMaterial({ color: kl, shininess: 200, reflectivity: 0.1 });  // ffaa00 
            let bolleke3 = new THREE.Mesh(sphere, mat);
            bolleke3.castShadow = true;
            scene.add(bolleke3);
            light[3] = new THREE.PointLight(kl, intensity, distance, decay);   // decay 2 lijkt physica.
            light[3].add(bolleke3);

            kl = 0x228B22;
            mat = new THREE.MeshPhongMaterial({ color: kl, shininess: 200, reflectivity: 0.1 });
            let bolleke4 = new THREE.Mesh(sphere, mat);
            bolleke4.castShadow = true;
            scene.add(bolleke4);
            light[4] = new THREE.PointLight(kl, intensity, distance, decay);
            light[4].add(bolleke4);

            if (!touchDevice)
                scene.add(light[4]);

            lightHolder = new THREE.Group();
            let aantal = 4;
            if (touchDevice)
                aantal = 3;
            // alert(aantal);
            for (let k = 0; k < aantal; k++)
                lightHolder.add(light[k]);

            scene.add(lightHolder);
            //  lightHolder.quaternion.copy(camera.quaternion); // in the animation loop


        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            lightHolder.quaternion.copy(camera.quaternion);
            render();
        }

        function render() {
            const time = Date.now() * 0.0005;
            stats.update();
            //    const delta = clock.getDelta();
            // new: 
            //  camera.position.x += (mouseX - camera.position.x) * .05;
            //  camera.position.y += (- mouseY - camera.position.y) * .05;

            camera.lookAt(scene.position);

            if (object != null) {
                if (object.rotation.z > 0.5)
                    r = -1;
                if (object.rotation.z < -0.5)
                    r = +1;
                // r = 1;
                object.rotation.z += 0.005 * r;
                //   bol.rotation.y += 0.005 * r;
            }

            let w = window.innerWidth;
            let h = window.innerHeight;
            //  console.log("w: " + w) ; 
            z = 10;

            light[0].position.x = Math.sin(time * 0.9) * 0.05 * w;
            // light[0].position.y = Math.cos(time * 0.5) * 0.005 * h;
            //   light[0].position.z = z + Math.abs(Math.cos(time * 0.3) * 1);


            light[1].position.x = Math.cos(time * 0.8) * 0.05 * w;
            light[1].position.y = Math.sin(time * 0.5) * 0.05 * h;
            light[1].position.z = z + Math.abs(Math.sin(time * 0.7)) * 2;

            light[2].position.x = Math.sin(time * 0.7) * 0.045 * w;
            light[2].position.y = Math.cos(time * 0.3) * 0.05 * h;
            light[2].position.z = z + Math.abs(Math.sin(time * 0.5)) * 1;

            light[3].position.x = Math.sin(time * 0.6) * 0.03 * w;
            //    light[3].position.y = Math.cos(time * 0.7) * 0.03 * h;
            light[3].position.z = z + Math.abs(Math.sin(time * 0.5) * 1);

            if (touchDevice) {
                z = 70;
                light[4].position.x = mouseX / 10 * (focus - z) / focus;
                light[4].position.y = - mouseY / 10 * (focus - z) / focus;
                light[4].position.z = z;  // 130
            }
            else {
                light[4].position.x = + 1 * mouseX / 5 * (focus - z) / focus;
                light[4].position.y = - 1 * mouseY / 5 * (focus - z) / focus;
                light[4].position.z = z  // + Math.abs(Math.sin(time * 0.5) * 1);    //  z;  // 130
            }
            renderer.render(scene, camera);
        }  // einde render 

        function startOrbitController() {
            controls = new OrbitControls(camera, renderer.domElement);
            controls.addEventListener('change', render);
            controls.listenToKeyEvents(window);    // pijltjes toetsen.
            controls.enableDamping = true; // an animation loop is required when either damping or auto-rotation are enabled
            controls.dampingFactor = 0.05;

            controls.minPolarAngle = +Math.PI * 0.4;     // tilt. , x as.            
            controls.maxPolarAngle = Math.PI * 0.8;

            controls.minAzimuthAngle = -Math.PI * 0.25;      // rot y as.
            controls.maxAzimuthAngle = +Math.PI * 0.3;

            // controls.target.set(0, 10, 0);
            controls.minDistance = 20.0;
            controls.maxDistance = 400.0;

            //  controls.autoRotate = true;
            //  controls.autoRotateSpeed = 4;   // 2 is default. 

            controls.update();
        }   // einde startOrbitControls.

    </script>
</body>

</html>
