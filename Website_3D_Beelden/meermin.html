<!DOCTYPE html>
<html lang="en">

<head>
	<title>Een meermin tonen.</title>
	<meta charset="utf-8">
	<!-- 
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		-->
	<meta name="author" content=" Rob van Cooten. Waalre. ">
	<meta name="keywords" content="3D models, Threejs, Ceramics">
	<meta name="description" content="Showing all kinds of ways to show ceramics heads using ThreeJS.">
	<link type="text/css" rel="stylesheet" href="css/main.css">
	<link href="css/menu.css" rel="stylesheet" type="text/css">
	<link rel="shortcut icon" href="./images/ernie.ico">
	<style>
		body {
			cursor: url(./images/biglips.cur), auto;
		}
	</style>
</head>

<body>
	<div id="menu">

	</div>

	<script type="importmap">
			{
				"imports": {
					"three": "./build/three.module.js"
				}
			}
		</script>

	<script type="module">
		import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './my_js/menu_tekst.js';
		import * as THREE from 'three';
		import Stats from './jsm/libs/stats.module.js';
		import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';
		// import { RGBELoader } from './jsm/loaders/RGBELoader.js';
		import { HDRLoader } from './jsm/loaders/HDRLoader.js';
		import { OrbitControls } from './jsm/controls/OrbitControls.js';

		import { FontLoader } from './jsm/loaders/FontLoader.js';
		import { TextGeometry } from './jsm/geometries/TextGeometry.js';

		let container, menu;

		let camera, cameraOrtho, scene, renderer;
		let controls;   // touch mouse controls
		let mouseX = 0, mouseY = 0;

		let windowHalfX = window.innerWidth / 2;
		let windowHalfY = window.innerHeight / 2;
		let insetWidth, insetHeight;
		let portraitmode = true;

		let object;
		let pad = "";
		let nummer = 0;
		var modellen = new Array();

		let light1, light2, light3;
		let bol1, bol2, bol3;
		let rot = 0;
		let move = true;

		let stats;

		let alfa = +1, teken = +1, mix = 0;

		const wit = new THREE.Color(0xffffff);
		const grijs = new THREE.Color(0xdddddd);
		const rood = new THREE.Color(0xff0000);
		const groen = new THREE.Color(0x00ff00);
		const blauw = new THREE.Color(0x0000ff);
		const paars = new THREE.Color(0xff00ff);
		const geel = new THREE.Color(0xffff00);
		let kleur = new THREE.Color(0xffffff);
		let mixedkleur = new THREE.Color(0xffffff);

		init();
		animate();

		function init() {
			maakMenu();
			assignKleuren();
			function assignKleuren() {

			}
			maakScene();

			maakBelichting();

			//model
			laadModel();

			myRenderer();

			//	document.addEventListener('mousemove', onDocumentMouseMove);
			renderer.domElement.addEventListener('pointerdown', onPointerDown);
			window.addEventListener('resize', onWindowResize);
			onWindowResize();

			maakTekst();

			/* stats
			stats = new Stats();
			document.body.appendChild(stats.dom);  
			*/

			startOrbitController();

		}   // einde init

		function laadModel() {
			let model = pad + 'meermin.glb';
			//  console.log("model: " + model)
			const loader = new GLTFLoader();

			loader.load(model, function (gltf) {
				object = gltf.scene.children[0];

				object.scale.multiplyScalar(1);  // 50 
				//	object.metalness = 0.0; // dir light werkt anders niet...?
				// object.texture.encoding = THREE.sRGBEncoding ; 

				scene.add(object);
				kleurObject();
			},
				// called while loading is progressing
				function (xhr) {
					;
					// 	console.log((xhr.loaded / xhr.total * 100) + '% loaded');
				},
				// called when loading has errors
				function (error) {

					console.log('O, 0 An error happened during loading');

				}
			);    // einde loader
		}   // einde laadModel


		function is_portrait() {
			return (window.innerWidth < window.innerHeight);
		}
		if (is_portrait())
			portraitmode = true;
		else
			portraitmode = false;

		function onWindowResize() {
			portraitmode = is_portrait();
			insetWidth = window.innerWidth / 4;
			//	console.log("insetWidth: " + insetWidth); 
			insetHeight = window.innerHeight / 4;
			//	console.log("insetHeight: "  + insetHeight) ; 

			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();

			renderer.setSize(window.innerWidth, window.innerHeight);

			cameraOrtho.aspect = window.innerWidth / window.innerHeight;
			cameraOrtho.updateProjectionMatrix();
		}


		function animate() {
			requestAnimationFrame(animate);
			// controls.update(); // only required if controls.enableDamping = true
			maakKleuren();
			maakRotaties();
			render();
		}

		let r = +1;
		function render() {
			//  hoofdcamera: 				
			renderer.setClearColor(0x000000);
			renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
			renderer.render(scene, camera);
			// second camera: 
			renderer.setClearColor(0x000000);
			renderer.clearDepth();
			renderer.setScissorTest(true);
			// x, y, width en height:  
			let x = 10; let y = window.innerHeight - insetHeight / 2 - 100;
			let iw = insetWidth / 4; let ih = insetHeight / 2;
			// console.log("insetWidth: " + insetWidth); 
			if (portraitmode == false) {
				for (let k = 0; k < 5; k++) {
					renderer.setScissor(x, y - k * 100, iw, ih);
					renderer.setViewport(x, y - k * 100, iw, ih);
					renderer.render(scene, cameraOrtho);
				}
			}
			else {
				for (let k = 0; k < 5; k++) {
					renderer.setScissor(x + k * 100, 0, iw, ih);
					renderer.setViewport(x + k * 100, 0, iw, ih);
					renderer.render(scene, cameraOrtho);
				}
			}

			renderer.setScissorTest(false);

			if (object != null) {
				if (object.rotation.z > 0.5)
					r = -1;
				if (object.rotation.z < -0.5)
					r = +1;

				if (move)
					object.rotation.z += 0.005 * r;
			}
		}  // einde render 

		function startOrbitController() {
			controls = new OrbitControls(camera, renderer.domElement);
			controls.addEventListener('change', render);
			controls.listenToKeyEvents(window);    // pijltjes toetsen.
			//	controls.enableDamping = true; // an animation loop is required when either damping or auto-rotation are enabled
			//		controls.dampingFactor = 0.05;

			controls.minPolarAngle = Math.PI * 0.35;     // tilt. , x as.            
			controls.maxPolarAngle = Math.PI * 0.6;

			controls.minAzimuthAngle = -Math.PI * 0.25;      // rot y as.
			controls.maxAzimuthAngle = +Math.PI * 0.4;

			//controls.target.set(0, 10, 0);
			controls.minDistance = 20.0;
			controls.maxDistance = 400.0;
		}

		function maakKleuren() {
			if (alfa > 1)
				teken = -1;
			else if (alfa < 0.1) {
				teken = + 1;
				mix = mix + 1;
				if (mix > 3)
					mix = 0;
			}

			alfa = alfa + 0.005 * teken;

			if (mix == 0)
				kleur = geel;
			else if (mix == 1)
				kleur = groen;
			else if (mix == 2)
				kleur = paars;
			else if (mix == 3)
				kleur = blauw;

			mixedkleur.lerpColors(rood, kleur, alfa);
			//	bolletje.material.color = mixedkleur; 
			//		pointLight.color = mixedkleur;

			bol1.material.color = mixedkleur;
			light1.color = mixedkleur;

			mixedkleur = new THREE.Color();
			mixedkleur.lerpColors(groen, kleur, alfa);
			bol2.material.color = rood;
			light2.color = rood;

			mixedkleur = new THREE.Color();
			mixedkleur.lerpColors(blauw, kleur, alfa);
			bol3.material.color = mixedkleur;
			light3.color = mixedkleur;

			//	light1.add( new THREE.Mesh( sphere, new THREE.MeshBasicMaterial( { color: mixedkleur} ) ) );

			//	stats.update();
		}
		function maakRotaties() {
			rot = rot + 0.02;
			light1.position.x = -Math.sin(rot * 0.7) * 15;
			light1.position.y = Math.cos(rot * 0.5) * 10 + 10;
			light1.position.z = Math.cos(rot * 0.3) * 10 + 20;

			light2.position.x = Math.sin(rot * 0.7) * 15;
			light2.position.y = -Math.cos(rot * 0.5) * 15 + 15;
			light2.position.z = Math.cos(rot * 0.3) * 10 + 20;

			light3.position.x = Math.sin(rot * 0.7) * 15;
			light3.position.y = Math.cos(rot * 0.5) * 15 + 15;
			light3.position.z = Math.cos(rot * 0.3) * 15 + 20;

		}

		function myRenderer() {
			renderer = new THREE.WebGLRenderer({
				powerPreference: 'high-performance',
				antialias: true,
				alpha: true,
			})
			renderer = new THREE.WebGLRenderer();
			renderer.setPixelRatio(window.devicePixelRatio);
			renderer.setSize(window.innerWidth, window.innerHeight);
			//	renderer.outputColorSpace = THREE.sRGBEncoding;
			//	renderer.toneMapping = THREE.ACESFilmicToneMapping
			//	renderer.toneMappingExposure = 1.4;   // dit scheelt veel. 
			//	renderer.setPixelRatio(Math.min(Math.max(1, window.devicePixelRatio), 2))
			container.appendChild(renderer.domElement);

		}

		function kleurObject() {
			object.traverse((o) => {
				if (o.isMesh) {
					o.material.emissive = new THREE.Color(0x333333);
					o.material.metalness = 0.5;  // 0..1 
				}
			});
		}

		function maakTekst() {
			const loader = new FontLoader();
			let font = undefined,
				fontName = 'gentilis', // helvetiker, optimer, gentilis, droid sans, droid serif
				fontWeight = 'normal'; // normal bold

			loader.load('./fonts/helvetiker_regular.typeface.json', function (font) {

				const textGeo = new TextGeometry('Mermaid...', {
					font: font,
					size: 4,
					height: 2.5,
					curveSegments: 12,
					bevelEnabled: false,   // true,
					bevelThickness: 1,  // 10
					bevelSize: 0.08,    // 8
					bevelOffset: 0,
					bevelSegments: 1  // 5
				});

				textGeo.computeBoundingBox();
				const centerOffset = - 0.5 * (textGeo.boundingBox.max.x - textGeo.boundingBox.min.x);

				const materials = [
					new THREE.MeshPhongMaterial({ color: 0x555555, flatShading: true }), // front
					new THREE.MeshPhongMaterial({ color: 0x555555 }) // side
				];

				let textMesh = new THREE.Mesh(textGeo, materials);
				textMesh.scale.z = 0.05;

				textMesh.position.x = centerOffset;
				textMesh.position.y = 10;
				textMesh.rotation.y = Math.PI * 2;

				scene.add(textMesh);
			});
		}
		function maakBelichting() {
			// let ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
			//	scene.add(ambientLight);

			const directionalLight = new THREE.DirectionalLight(0xffffff, 8.2); // 20 te veel licht, geen kleur meer.
			directionalLight.position.set(1, 1, 1);
			directionalLight.target.position.set(0, 0, 0);
			scene.add(directionalLight);

			// bollampen : 
			// PointLight( color : Integer, intensity : Float, distance : Number, decay : Float )
			let diameter = 0.5;
			let spher1 = new THREE.SphereGeometry(diameter, 16, 8);
			let mat1 = new THREE.MeshBasicMaterial({ color: 0xff0000 });
			mat1 = new THREE.MeshPhongMaterial({ color: 0xff0000, shininess: 20, reflectivity: 0.1 });
			bol1 = new THREE.Mesh(spher1, mat1);

			light1 = new THREE.PointLight(0xff0040, 1, 50);
			light1.add(bol1);
			//	light1.position.set(-10, 10, -30);
			scene.add(light1);

			let spher2 = new THREE.SphereGeometry(diameter, 16, 8);
			//	mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
			let mat2 = new THREE.MeshPhongMaterial({ color: 0x00ff00, shininess: 20, reflectivity: 0.1 });
			bol2 = new THREE.Mesh(spher2, mat2);

			light2 = new THREE.PointLight(0xff0040, 1, 50);
			light2.add(bol2);
			//	light2.position.set(-10, 10, 10);
			scene.add(light2);

			let spher3 = new THREE.SphereGeometry(diameter, 16, 8);
			//	mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
			let mat3 = new THREE.MeshPhongMaterial({ color: 0x0000ff, shininess: 20, reflectivity: 0.1 });
			bol3 = new THREE.Mesh(spher3, mat3);

			light3 = new THREE.PointLight(0xff0040, 1, 50);
			light3.add(bol3);
			//		light3.position.set(-10, 10, 10);
			scene.add(light3);


		}
		function onPointerDown(event) {
			move = !move;
		}

		function maakMenu() {

			menu = document.getElementById("menu");
			if (isTouchDevice())
				menu.innerHTML = leesMenuTekst() + "Mermaid Ceramics. Use fingers to rotate, zoom. Touch to stop.";
			else
				menu.innerHTML = leesMenuTekst() + "Mermaid Ceramics. Use mouse to rotate, start/stop. Wheel to zoom. Or arrow keys 2move. ";

			if (location.hostname == "localhost") {
				pad = "./modellen/glb/";
				//  alert() ; 
			}
			else
				pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";
			// 	pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";

			kleurActiveLink();

			container = document.createElement('div');
			document.body.appendChild(container);
		}

		function maakScene() {
			camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
			camera.position.z = 120;   //  100

			/*
			OrthographicCamera( left : Number, right : Number, top : Number, bottom : Number, near : Number, far : Number )
			left — Camera frustum left plane.
			right — Camera frustum right plane.
			top — Camera frustum top plane.
			bottom — Camera frustum bottom plane.
			near — Camera frustum near plane.
			far — Camera frustum far plane.
			*/
			// cameraOrtho = new THREE.OrthographicCamera(  -0.5, 0.5, 0.5, -0.5, 0.01, 10);
			let frusWidth = 10;
			cameraOrtho = new THREE.OrthographicCamera(-frusWidth, frusWidth, frusWidth, -frusWidth, 0.1, 2000);
			camera.add(cameraOrtho);

			// scene
			scene = new THREE.Scene();
			scene.background = new THREE.Color(0x000000);
			scene.add(camera);
		}			
	</script>

</body>

</html>
