<!DOCTYPE html>
<html lang="en">

<head>
    <title>Kop met meerdere kleuren.</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <!--
    3d obj model met apart jpg voor texture. 
    jpg bestanden pseudo colouring.         
    -->
    <meta name="author" content=" Rob van Cooten. Waalre. ">
    <meta name="keywords" content="3D models, Threejs, Ceramics">
    <!--  https://sourceforge.net/projects/three-js.mirror/  -->
    <meta name="description" content="Showing all kinds of ways to show ceramics heads using ThreeJS.">
    <link type="text/css" rel="stylesheet" href="css/main.css">
    <link type="text/css" rel="stylesheet" href="css/menu.css">
    <style>
        canvas {
            aspect-ratio: auto;
        }
    </style>

</head>

<body>
    <div id="menu">
        Hier komt menu.
    </div>


    <script type="importmap">
			{
				"imports": {
					"three": "./build/three.module.js"
				}
			}
		</script>

    <script type="module">
        import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './my_js/menu_tekst.js';
        import * as THREE from 'three';
        import { OBJLoader } from './jsm/loaders/OBJLoader.js';
        import { OrbitControls } from './jsm/controls/OrbitControls.js';

        import { FontLoader } from './jsm/loaders/FontLoader.js';
        import { TextGeometry } from './jsm/geometries/TextGeometry.js';

        let container, menu;

        let camera, scene, renderer;
        let controls;   // touch mouse controls
        let manager;
        const minmaxAngleY = Math.PI * 0.3;
        let rot;  // rotatie camera. 
        let rotSpeed = 5;
        let richting = 1;
        let teller = 0;
        let textMesh;
        let heen = true;

        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;


        let pad = "./modellen/";

        let koppen = [];
        let kop;
        let aantalKoppen = 12;
        var modellen = new Array();
        let textures = [], kleuren = [];
        let spotlight, spotlightHelper;
        let lightholder;
        let shiftY = 90, shiftZ = 100, intensity = 10;
        let afstandX = 100; let schaal = 2.0;
        let nummer;
        let modelNummer = 0;   //  0 of 1 


        init();
        animate();

        function init() {
            maakMenu();
            maakScene();
            maakBelichting();

            modellen[0] = pad + 'bladerKop/bladerKop';

            laadKoppen();
            maakRenderer();
            maakTekst("Focus");

            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener("pointerdown", pressingDown, false);

            startOrbitController();

        }   // einde init

        function pressingDown(e) {
            let plusnul = 0.001;
            let minnul = -plusnul;


            //    alert("YES klik"); 
            if (richting == +1)
                richting = plusnul
            else if (richting == plusnul)
                richting = -1
            else if (richting == -1)
                richting = minnul
            else richting = 1;

            controls.autoRotateSpeed = richting * 10;  // controls.autoRotateSpeed;
        }

        function PpressingDown(e) {
            controls.autoRotateSpeed = -controls.autoRotateSpeed;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            rot = controls.getAzimuthalAngle();
            if (rot >= minmaxAngleY - 0.001) {
                richting = +1;
                if (heen) {
                    teller++;
                    // alert("heen: " + heen);
                    heen = false;
                    //    console.log("teller: " + teller);
                }
                if (teller > aantalKoppen - 1)
                    teller = 0;
            }
            else if (rot <= -minmaxAngleY + 0.001) {
                //    alert(); 
                richting = -1;
                if (!heen) {
                    teller++;
                    heen = true;
                    //   console.log("teller: " + teller);
                }
                if (teller > aantalKoppen - 1)
                    teller = 0;
            }
            controls.autoRotateSpeed = +rotSpeed * richting;

            if (koppen[aantalKoppen - 1] != null) {
                toonSpotLight();

            }

            controls.update();
            //   lightholder.quaternion.copy(camera.quaternion);
            render();
        }

        function render() {
            //  camera.position.z = 1000; 
            //	camera.lookAt( scene.position );

            camera.updateMatrixWorld();

            renderer.render(scene, camera);
        }


        function startOrbitController() {
            controls = new OrbitControls(camera, renderer.domElement);

            controls.addEventListener('change', render);
            controls.listenToKeyEvents(window);    // pijltjes toetsen.

            controls.enableDamping = false;
            // an animation loop is required when either damping or auto-rotation are enabled
            //    controls.dampingFactor = 0.025;   // 0.05 

            controls.minPolarAngle = Math.PI * 0.2;     // tilt. , x as.            
            controls.maxPolarAngle = Math.PI * 0.85;    //  start hoek. 

            controls.minAzimuthAngle = -minmaxAngleY;  //    rot y as.
            controls.maxAzimuthAngle = +minmaxAngleY;  // 

            controls.target.set(0, 10, 100);  //  controls.target.set(0, 10, 100);
            controls.minDistance = 30.0;
            controls.maxDistance = 490.0;

            controls.autoRotate = true;
            controls.autoRotateSpeed = rotSpeed;   // 2 is default. 

            controls.enabled = false;

            camera.position.set(afstandX, 100, 10 * 1000);
            camera.lookAt(controls.target);

            controls.enabled = true;
            controls.update();
        }

        function kleurObject(k) {
            // Als je de PBR‑eigenschappen (metalness/roughness/texture) wilt behouden en alleen de kleur wilt tweaken:
            kop.traverse((node) => {
                if (node.isMesh && node.material && node.material.color ) {
                    //    console.log("node naam: " + k + " : " + node.name);
                    let kleur = kleuren[k];
                    node.material.color.set(kleur); 
                    node.material.emissive = new THREE.Color(kleur);
                    node.material.needsUpdate = true;
                }
            });  // end traverse
        }

        function kleurObject1(k) {
            alert(k);
            const material = new THREE.MeshStandardMaterial({
                color: 0x00ffff, // rood
                metalness: 1.0, // 0..1
                roughness: 0.6,
            });

            kop.traverse((node) => {
                if (node.isMesh) {
                    node.material = material;   // vervang materiaal
                    node.castShadow = true;
                    node.receiveShadow = true;
                }
            });  // end traverse
        }

        function kleurObject2() {

            let mat001 = new THREE.MeshPhysicalMaterial();
            mat001.color = new THREE.Color("gold");
            mat001.reflectivity = 1.0;
            mat001.roughness = 0.0;
            mat001.envMapIntensity = 1.0;


            kop.traverse((child) => {
                if (child.isMesh) {
                    if (child instanceof THREE.Mesh) {
                        console.log(">>Childsname: " + child.name);
                        //   kop = child;

                        var material = child.material.clone();

                        material.map = mat001;

                        child.material = material;

                        //    child.material.emissive = new THREE.Color(0xff0000);  //  333333
                        //  child.material.metalness = 0.0;  // 0..1 ;  1 is mat. 
                    }

                }
            });
        }

        function maakRenderer() {
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 0.7;   // dit scheelt veel. 
            // renderer.outputEncoding = THREE.sRGBEncoding;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            renderer.shadowMap.enabled = true;  // new
            renderer.colorManagement = true; // voor blender glb export . 
            container.appendChild(renderer.domElement);
            // document.body.appendChild(renderer.domElement);
        }

        function maakMenu() {
            menu = document.getElementById("menu");
            if (isTouchDevice())
                menu.innerHTML = leesMenuTekst() + "Head with different textures. Use finger to rotate, double touche to stop/run.";
            else
                menu.innerHTML = leesMenuTekst() + "Head with textures.  Use mouse to rotate, double click to stop/run. Wheel to zoom.";

            kleurActiveLink();
            document.getElementsByTagName("body")[0].style.cursor = "url('images/biglips.cur'), move";
        }

        function maakScene() {
            //new PerspectiveCamera( fov : number, aspect : number, near : number, far : number )            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            // camera.position.z = 700
            // scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.add(camera);

            container = document.createElement('div');
            document.body.appendChild(container);
        } // einde maakScene     

        function maakBelichting() {
            // kleuren voor standaards, pointlights en spotlight. 
            kleuren[0] = 0xffffff;
            kleuren[1] = 0xff0000;
            kleuren[2] = 0x00ff00;
            kleuren[3] = 0x0000ff;
            kleuren[4] = 0xffff00;
            kleuren[5] = 0x00ffff;
            kleuren[6] = 0xff00ff;
            kleuren[7] = 0xcccccc;
            kleuren[8] = 0xccffcc;
            kleuren[9] = 0xffccff;
            kleuren[10] = 0xccffff;
            kleuren[11] = 0xccccff;

            let intens = 0.1;
            const ambientLight = new THREE.AmbientLight(0xcccccc, intens);  // 0.7 
            scene.add(ambientLight);

            intens = 5.5; // 5.5
            const light = new THREE.DirectionalLight(0xffffff, intens);
            light.position.set(1, 1, 1).normalize();
            scene.add(light);
            // SpotLight( color : Integer, intensity : Float, distance : Float, angle : Radians, penumbra : Float, decay : Float )
            const color = 0xFFFFFF;
            intens = 1500;
            const angle = Math.PI * 0.05;

            spotlight = new THREE.SpotLight(color, intens, 0, angle);
            spotlight.position.x = 0;
            spotlight.position.y = 0;
            spotlight.position.z = 1000;
            spotlight.penumbra = 0;   // 0..1  breed naar smal.
            spotlight.decay = 0;
            //	spotlight.distance = 2 * breedte;            
            //     spotlight.color.setHex(0xffffff);
            scene.add(spotlight);

            spotlightHelper = new THREE.SpotLightHelper(spotlight);
            //  scene.add(spotlightHelper); 

            /* 
            lightholder = new THREE.Group();
            lightholder.add(spotlight);
            lightholder.add(spotlightHelper);
            scene.add(lightholder);  
            */

        }   // einde maakBelichting.            

        function loadModel() {
            for (let k = 0; k < aantalKoppen; k++) {
                nummer = k;
                koppen[nummer].traverse(function (child) {
                    if (child.isMesh) {
                        child.material.emissive = new THREE.Color(0x555555);  //  333333
                        child.material.metalness = 0.0;  // 0..1 ;  1 is mat. 

                        if (k < 8)
                            child.material.map = textures[k];
                        else {
                            child.material.color.set(kleuren[k % 4]);    // same as CSS's #RRGGBB style
                            // child.material.roughness = 1.0 ;    // 0..1
                            //  child.material.metalness = 1.0 ;    // 0 stone  ..1 metal 
                        }  // end else
                    }   // end mesh 
                });   // end traverse 

                // hoogte rij instellen: 
                let h = Math.floor(k / 4);
                //  alert(h);

                koppen[nummer].position.x = -2 * afstandX + (k % 4) * afstandX;
                koppen[nummer].position.y = +afstandX - h * afstandX;    // - 95;
                koppen[nummer].position.z = -0;
                koppen[nummer].scale.x = koppen[nummer].scale.y = koppen[nummer].scale.z = schaal;
                scene.add(koppen[nummer]);
            }  // einde for aantal koppen

        }   // einde loadModel. 


        function onProgress(xhr) {

            if (xhr.lengthComputable) {

                const percentComplete = xhr.loaded / xhr.total * 100;
                // if (percentComplete == 100)
                // console.log('model: ' + modellen[nummer] + " " + Math.round(percentComplete, 2) + '% downloaded');

            }
        }    // einde onProgress.

        function onError(event) {
            console.log('O o model loadError. ')
            if (location.hostname == "localhost")
                alert(event + " O, 0 An error happened during loading model");
        }


        function laadTexturen() {
            const textureLoader = new THREE.TextureLoader(manager);
            for (let k = 0; k < aantalKoppen; k++) {
                // 5, 9 11 niet fraai.
             //    textures[k] = textureLoader.load(modellen[modelNummer]  + k + '.jpg',
                textures[k] = textureLoader.load(modellen[modelNummer]  + '0.jpg',                
                    function (obj) {
                        //   console.log(modellen[modelNummer] + k + '.jpg');
                    },
                    // Function called when download progresses
                    function (xhr) {
                        //   console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                    },
                    // onError callback
                    function (error) {
                        console.error('An error happened', error);
                        if (location.hostname == "localhost")
                            alert("'O, 0 An error happened during loading" + error);
                    }  // einde error
                );
            }   // einde for texturen

        }


        function laadKoppen() {
            manager = new THREE.LoadingManager(loadModel);
            // texture laden:
            laadTexturen();

            const loader = new OBJLoader(manager);
            for (let k = 0; k < aantalKoppen; k++) {
                loader.load(modellen[0] + '.obj', function (obj) {
                    kop = obj;

                    kleurObject(k);
                    koppen[k] = kop;
                }, onProgress, onError);  // einde loader

            }  // end for loop laden koppen. 

        } // einde laadKoppen.        

        function berekenAfstandSpotLightKop() {
            kop = koppen[teller];
            let a = kop.position.x - spotlight.position.x;
            let b = kop.position.y - spotlight.position.y;
            let c = kop.position.z - spotlight.position.z;
            let d = Math.sqrt(a * a + b * b + c * c);
            return d;
        }

        function toonSpotLight() {
            spotlight.target = koppen[teller];
            let afstand = berekenAfstandSpotLightKop();
            spotlight.distance = afstand * 1.02;
            spotlight.angle = 0.15 * Math.PI * 50 / afstand;
            spotlightHelper.update();
            if (textMesh != null) {
                textMesh.position.x = koppen[teller].position.x - 15;
                textMesh.position.y = koppen[teller].position.y - 20;
            }
        }

        function maakTekst(tekst) {
            if (textMesh != null) {
                scene.remove(textMesh);
            }

            const loader = new FontLoader();
            let font = undefined,
                fontName = 'optimer', // helvetiker, optimer, gentilis, droid sans, droid serif
                fontWeight = 'bold'; // normal bold

            loader.load('./fonts/helvetiker_regular.typeface.json', function (font) {
                const textGeo = new TextGeometry(tekst, {
                    font: font,
                    size: 8,
                    height: 5,
                    curveSegments: 12
                });

                textGeo.computeBoundingBox();
                const centerOffset = - 0.5 * (textGeo.boundingBox.max.x - textGeo.boundingBox.min.x);

                const materials = [
                    new THREE.MeshBasicMaterial({ color: 0xaaffaa }), // front
                    new THREE.MeshBasicMaterial({ color: 0x00ff00 }) // side
                ];

                textMesh = new THREE.Mesh(textGeo, materials);
                textMesh.scale.z = 0.1;

                textMesh.position.x = -25;  // centerOffset;
                textMesh.position.y = -25;
                textMesh.position.z = 2;
                textMesh.rotation.y = Math.PI * 2;

                scene.add(textMesh);
            });
        }        
    </script>

</body>

</html>
