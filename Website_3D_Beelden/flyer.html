<html lang="en">

<head>
    <title>Luchtballon met koppen transport.</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <meta name="author" content=" Rob van Cooten. Waalre. ">
    <meta name="keywords" content="3D models, Threejs, Ceramics">
    <!--  https://sourceforge.net/projects/three-js.mirror/  -->
    <meta name="description" content="Showing all kinds of ways to show ceramics heads using ThreeJS.">
    <link type="text/css" rel="stylesheet" href="css/main.css">

<body>
    <div id="menu">
        Hier komt menu.
    </div>
    <button type="button" id="toon" class="unselectable"> Show/Hide lamp.</button>
    <script type="importmap">
        {
            "imports": {
                "three": "./build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './my_js/menu_tekst.js';
        import * as THREE from 'three';
        //  import { OBJLoader } from './jsm/loaders/OBJLoader.js';
        import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from './jsm/controls/OrbitControls.js';

        let container, menu;

        let camera, scene, renderer;
        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;
        let controls;   // touch mouse controls        

        let luchtballon, kamer;
        let kop;
        let koppen = [];
        let object;
        let paal = [], sokkel = [];
        let paalHoogte, paalDikte;
        let breedte = 550;
        const pad = "./modellen/";
        let modellen = new Array();
        let textures = [], kleuren = [];
        let pointLights = [], spotLight, spotLightHelper;
        let shiftY = 100, shiftZ = 100;   // afstand paal pointlight. 
        let intensity = 10;
        let nummer;   // kop, paal nummer. 
        let lampen = [];
        let onoff = true;

        const cameraZ = 1700;

        init();
        animate();

        function init() {
            maakMenu();
            maakScene();
            maakBelichting();

            maakLuchtBallon();
            maakKamer();
            positioneerPalen();
            positioneerPointLights();

            function positioneerPointLights() {
                for (let k = 0; k < 4; k++) {
                    pointLights[k].position.x = paal[k].position.x;
                    pointLights[k].position.y = paal[k].position.y + 100; // + shiftY;
                    pointLights[k].position.z = paal[k].position.z;  // + shiftZ;
                }
            }

            leesModellen();

            for (let k = 0; k < 4; k++) {
                laadModel(k);
            }

            maakRenderer();
            window.addEventListener('resize', onWindowResize);
            let toon = document.getElementById('toon');
            toon.addEventListener("pointerdown", pressingDown, false);

            function pressingDown(e) {
                showhideLampen();
            }
            startOrbitController();
        }   // einde init

        /*****************    funkties    *********************/
        function showhideLampen() {
            //    alert("onoff: " + onoff);
            for (let k = 0; k < 4; k++) {
                if (onoff)
                    scene.add(lampen[k])
                else
                    scene.remove(lampen[k]);
            }
            onoff = !onoff;
        }

        function laadModel(k) {
            //   alert("k= " + k) ; 
            let pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";
            let model = pad + modellen[k] + '.glb';
            //  console.log("model: " + model)
            const loader = new GLTFLoader();

            loader.load(model, function (gltf) {
                kop = gltf.scene.children[0];

                normeerKop(kop);
                centerPivot(kop);

                koppen[k] = kop;

                koppen[k].position.x = 10000;
                scene.add(koppen[k]);
                if (k == 3) {
                    nummer = 0;
                    scene.add(luchtballon);
                }
            },
                // called while loading is progressing
                function (xhr) {
                    ;
                    // 	console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                },
                // called when loading has errors
                function (error) {

                    console.log('O, 0 An error happened during loading');
                    if (location.hostname == "localhost")
                        alert("'O, 0 An error happened during loading" + error);

                }
            );    // einde loader
        }   // einde laadModel   

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function startOrbitController() {
            controls = new OrbitControls(camera, renderer.domElement);

            controls.addEventListener('change', render);
            controls.listenToKeyEvents(window);    // pijltjes toetsen.

            controls.enableDamping = true; // an animation loop is required when either damping or auto-rotation are enabled
            controls.dampingFactor = 0.05;

            controls.minPolarAngle = Math.PI * 0.3;     // tilt. , x as.            
            controls.maxPolarAngle = Math.PI * 0.45;    //  start hoek. 

            controls.minAzimuthAngle = -Math.PI * 0.25;      // rot y as.
            controls.maxAzimuthAngle = Math.PI * 0.25;

            //controls.target.set(0, 10, 0);
            controls.minDistance = 50.0;
            controls.maxDistance = 5000.0;
            controls.update();
        }
        //
        function rotentilt() {
            let polar = Math.tan(controls.getPolarAngle());
            spotLight.position.y = 100 + 100 / polar;
            // console.log("Math.tan( controls.getPolarAngle() ): " + Math.tan( controls.getPolarAngle() )) ; 
            let azi = Math.tan(controls.getAzimuthalAngle());
            spotLight.position.x = + 150 * azi;
            // console.log(" Math.tan( controls.getAzimuthalAngle() ) "  +  Math.tan( controls.getAzimuthalAngle() ) ) ; 

            /**************************************************************************************************************/

            // pointLights[1].position.y = paal[1].position.y + paal[1].position.y / polar;   
            pointLights[0].position.x = paal[0].position.x + 100 * azi;
            pointLights[0].position.y = paal[0].position.y;  // + paal[0].position.y * polar;   

            pointLights[1].position.x = paal[1].position.x + 100 * azi;
            // pointLights[1].position.y = paal[1].position.y + paal[1].position.y / polar;   
            render();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            //  spotLight.quaternion.copy(camera.quaternion);
            render();
        }
        /*
                    let box = new THREE.Box3().setFromObject(theGroup);
                    let sizeX = box.getSize().x;
                    let sizeY = box.getSize().y;
                    let sizeZ = box.getSize().z;      */


        let r = +1; let deltaX, deltaY, deltaZ;
        let terug = false, heen = true;
        let speed = 100;  // inverse speed, 100 default. 
        let teller = -1;
        //  alert(nummer);
        function render() {
            //   controls.update(); werkt alleen bij animation.          

            if (koppen[nummer] != null) {
                // kamer.rotation.y += 0.01;
                if (heen) {
                    if (luchtballon.rotation.y > 0.5)
                        r = -1;
                    if (luchtballon.rotation.y < -0.5)
                        r = +1;

                    luchtballon.rotation.y += 0.005 * r;

                    heenWeg();
                }

                if (terug)
                    terugWeg();

                if (heen == false && terug == false)
                    scannenBeelden();
            }
            renderer.render(scene, camera);
        }

        function heenWeg() {
            // goede positie voor in korf: 
            koppen[nummer].position.x = koppen[nummer].position.z = 0;
            koppen[nummer].position.y = -20;
            luchtballon.add(koppen[nummer]);

            spotLight.target = paal[nummer];   // + paalHoogte ; 
            let py = paal[nummer].position.y;

            let afstand = berekenAfstandSpotLightPaal();
            spotLight.distance = afstand * 1.14;

            // let posY = paal[nummer].position.y ; 
            let posY = 100;
            // spotLight.target.position.y = posY;  ///paalHoogte ; 
            // console.log("spotLight.target.x: " + spotLight.target.position.x ) ; 

            spotLightHelper.update();

            deltaX = paal[nummer].position.x + 0 * paalDikte * 0.5 - luchtballon.position.x;
            luchtballon.position.x = luchtballon.position.x + deltaX / speed;

            deltaY = paal[nummer].position.y + paalHoogte - luchtballon.position.y;
            luchtballon.position.y = luchtballon.position.y + deltaY / speed;

            deltaZ = paal[nummer].position.z + paalDikte / 2 - luchtballon.position.z;
            luchtballon.position.z = luchtballon.position.z + deltaZ / speed;

            if (Math.abs(deltaX) < 0.1) {  // bijna op de paal: 
                // alert(); 
                luchtballon.remove(koppen[nummer]);
                koppen[nummer].position.x = paal[nummer].position.x;   // + 300;
                koppen[nummer].position.y = paal[nummer].position.y + paalHoogte / 2 + 5;   // +5 + paalHoogte / 2;
                koppen[nummer].position.z = paal[nummer].position.z;

                scene.add(koppen[nummer]);

                terug = true;
                heen = false;

            }
        }   // einde heen 


        function terugWeg() {
            luchtballon.remove(koppen[nummer]);
            deltaX = 450 - luchtballon.position.x;
            // console.log(" deltaX: " + deltaX);
            luchtballon.position.x = luchtballon.position.x + deltaX / speed;

            deltaY = 400 - luchtballon.position.y;
            luchtballon.position.y = luchtballon.position.y + deltaY / speed;
            // console.log(" deltaY: "  + deltaY) ;

            deltaZ = -400 - luchtballon.position.z;
            luchtballon.position.z = luchtballon.position.z + deltaZ / speed;
            // console.log(" deltaX: "  + deltaX) ;

            if (Math.abs(deltaX) < 100.51) {   // start 450,  dan ballon boven. 
                nummer++;
                if (nummer < 4) {
                    /*
                    pointLights[nummer].position.x = paal[nummer].position.x;
                    pointLights[nummer].position.y = paal[nummer].position.y + shiftY;
                    pointLights[nummer].position.z = paal[nummer].position.z + shiftZ;
                    */
                    // scene.add(pointLights[nummer]);
                    //  alert("nummer: " + nummer);
                    terug = false;
                    heen = true;
                }

                if (nummer == 4) {
                    heen = false;
                    terug = false;
                    //  alert("nu scannen");
                    nummer = 0;
                    teller = -1;
                    scannenBeelden();
                }
            }
        }  // einde terug. 

        /*****************   spotLight scan   *******************/
        function scannenBeelden() {

            // console.log("scannen nummer  is: " + nummer);
            // console.log("teller: " + teller);

            if (koppen[nummer].rotation.z > 1.5) {
                r = -1;
                teller++; // rotatie teller
            }
            if (koppen[nummer].rotation.z < -1.5)
                r = +1;

            koppen[nummer].rotation.z += 0.055 * r;  //  0.015 * r

            if (teller == -1) // 1 keer starten. 
            {
                spotLight.color.setHex(kleuren[nummer]);    // zie je haast niet. 
                spotLight.intensity = 200;
                spotLight.target = koppen[nummer];
                spotLightHelper.update();

                pointLights[nummer].intensity = 500;

                teller = 0;
            }

            if (teller > 1 && koppen[nummer].rotation.z < 0) {

                koppen[nummer].rotation.z = 0;

                if (nummer < 3)
                    nummer++;
                else {
                    for (let k = 0; k < 4; k++) {
                        koppen[k].position.x = 10000;
                    }
                    nummer = 0;
                    heen = true; // weer opnieuw.                     
                }

                //  alert("nummer: " + nummer);
                // spotLight = new THREE.SpotLight(color, intensity, 0, angle);
                spotLight.color.setHex(kleuren[nummer]);
                //  spotLight.target = paal[nummer];
                spotLight.target = koppen[nummer];
                //  console.log("nummer spotLight: " + nummer);

                spotLightHelper.update();
                teller = 0;

            }   // einde delay. 
        }   // einde scannenBeelden. 

        function berekenAfstandSpotLightPaal() {
            let a = (paal[nummer].position.x) - spotLight.position.x;
            let b = (paal[nummer].position.y - spotLight.position.y) + paalHoogte * 0.5;
            let c = (paal[nummer].position.z - spotLight.position.z);
            let d = Math.sqrt(a * a + b * b + c * c);
            return d;
        }
        function maakBelichting() {
            const ambientLight = new THREE.AmbientLight(0xcccccc, 0.3);
            scene.add(ambientLight);

            // White directional light at half intensity shining from the top: 0,5 
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);  // 1 voor pointlight leuk belichten.
            directionalLight.position.set(- 150, -150, 150);
            directionalLight.position.set(-breedte * 1.5, breedte * 1.5, breedte * 1.5);

            scene.add(directionalLight);


            // SpotLight( color : Integer, intensity : Float, distance : Float, angle : Radians, penumbra : Float, decay : Float )
            const color = 0xFFFFFF;
            intensity = 20;  // 3
            const angle = Math.PI * 0.015;

            spotLight = new THREE.SpotLight(color, intensity, 0, angle);
            spotLight.position.x = 0;
            spotLight.position.y = breedte * 0.7;;   // 50
            spotLight.position.z = breedte * 0.4;  // 100
            spotLight.decay = 0;

            scene.add(spotLight);

            spotLightHelper = new THREE.SpotLightHelper(spotLight);
            scene.add(spotLightHelper);

            // kleuren voor standaards, pointlights en spotLight. 
            kleuren[0] = 0x228B22;
            kleuren[1] = 0x20B2AA;
            kleuren[2] = 0x87CEEB;
            kleuren[3] = 0xff0000; //  0x696969;

            // SphereGeometry(radius : Float, widthSegments : Integer, heightSegments :
            const sphere = new THREE.SphereGeometry(3.3, 16, 8);  // voor lights.  
            // PointLight( color : Integer, intensity : Float, distance : Number, decay : Float ); 
            intensity = 200;
            for (let k = 0; k < 4; k++) {
                pointLights[k] = new THREE.PointLight(kleuren[k], intensity, 100);  // 200 
                let mat = new THREE.MeshPhongMaterial({ color: kleuren[k], shininess: 200, reflectivity: 0.9 });
                pointLights[k].add(new THREE.Mesh(sphere, mat));   // ff0040
                scene.add(pointLights[k]);
            }


            let vakje = breedte / 9;
            for (let k = 0; k < 4; k++) {
                let x = - 3 * vakje + k * 2 * vakje;
                let y = -20;   // 0 is er ruim boven, + nog hoger. 
                let z = 0;

                maakLamp(x, y, z, k);
            }
        }

        function maakLamp(x = 1, y = 0, z = 0, k) {
            // 2. Create the outer transparent sphere (the lamp shade)
            let radius = 10  // 0.3
            const glassGeometry = new THREE.SphereGeometry(radius, 32, 32);
            const glassMaterial = new THREE.MeshPhysicalMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 1,  // 0: trans, 1 opaque
                transmission: 0.9, // 0.9 Physically correct transparency
                roughness: 0.05  // 0.05 
            });

            let geometry = new THREE.SphereGeometry(radius, 16, 32, 0, 2 * Math.PI, 0, 0.5 * Math.PI);
            //   material.side = THREE.DoubleSide;
            const textuur = new THREE.TextureLoader().load('images/blad.jpg');
            const bumpTexture = new THREE.TextureLoader().load('images/blad_bump.jpg');

            const mat = new THREE.MeshPhongMaterial({
                map: textuur,
                // opacity : 0.0 ,
                // alphaMap : 1 , 
                color: 0xffffff,
                shininess: 220,    //  standaard 30 
                side: THREE.DoubleSide,
                // metalness: 0.5,   niet voor dit materiaal
                emissive: kleuren[k],   // 'darkgreen' 0x001100
                specular: kleuren[k],
                reflectivity: 1.0,   // doet niet veel
                bumpMap: bumpTexture,
                bumpScale: 30
            });

            //    const kap = new THREE.Mesh(glassGeometry, glassMaterial);
            const kap = new THREE.Mesh(geometry, mat);
            // scene.add(kap);

            // 3. Create the inner light bulb
            radius = 5;  // 0.2
            const bulbGeometry = new THREE.SphereGeometry(radius, 16, 16);
            const bulbMaterial = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                emissive: 0xffffff,
                emissiveIntensity: 10
            });
            const bulb = new THREE.Mesh(bulbGeometry, bulbMaterial);
            //  scene.add(bulb);

            // 4. Create the light source inside the bulb
            let intens = 5500;
            const pointLight = new THREE.PointLight(0xffffff, intens, 0);  // 0 no limit. 
            bulb.add(pointLight); // Add light to the bulb mesh.

            let lamp = new THREE.Group();
            lamp.add(kap);
            lamp.add(bulb);
            lamp.position.x = x;
            lamp.position.y = y;
            lamp.position.z = z;
            lampen[k] = lamp;
            //    scene.add(lamp);
            //     console.log("Lamp: " + lamp.position.x);
        }

        function maakMenu() {
            menu = document.getElementById("menu");
            if (isTouchDevice())
                menu.innerHTML = leesMenuTekst() + "luchtballon bouwt expositie op. Use fingers to rotate.";
            else
                menu.innerHTML = leesMenuTekst() + "luchtballon bouwt expositie op.  Use mouse to rotate.";

            kleurActiveLink();
            document.getElementsByTagName("body")[0].style.cursor = "url('images/biglips.cur'), move";
        }

        function maakRenderer() {
            // renderer = new THREE.WebGLRenderer();
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

        }

        function maakScene() {
            container = document.createElement('div');
            document.body.appendChild(container);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10 * 1000);
            camera.position.z = cameraZ;   // 700 

            // scene

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.add(camera);
        }

        function maakLuchtBallon() {
            // nested functions: 
            let touwen, ballon, korf;
            maakTouwen();
            maakBallon();
            maakKorf();

            function maakTouwen() {
                /******************     maken touwen    ************/
                let geo = new THREE.CylinderGeometry(18, 1, 30, 32);  // radius i, radius o, height. 
                let mat = new THREE.MeshBasicMaterial({
                    color: 0x777777, wireframe: true,
                    wireframeLinewidth: 1.2, wireframeLinecap: "square"
                });  // "square"  "butt" 
                touwen = new THREE.Mesh(geo, mat);
                touwen.position.y = 20;
                // scene.add(cylinder);
            }

            function maakBallon() {
                /******************* maken ballon:    ******************/
                const textureblad = new THREE.TextureLoader().load('images/schaakbord.jpg');
                let mat = new THREE.MeshPhongMaterial({
                    map: textureblad,
                    color: 0xcccccc,
                    shininess: 150,
                    side: THREE.DoubleSide,
                    //  metalness: 0.5,
                    //  emissive: 'darkgreen',    // red, green 
                    specular: 0x000000,
                });

                let geo = new THREE.SphereGeometry(20);
                //mat = new THREE.MeshBasicMaterial({ color: 0xff00ff, });
                ballon = new THREE.Mesh(geo, mat);
                ballon.position.y = 45;
            }
            function maakKorf() {
                /******************************    MAKEN KORF, korf    *****************/
                let w = 35;
                let geo = new THREE.BoxGeometry(w, w, w, 3, 3);
                let mat = new THREE.MeshBasicMaterial({ color: 0x770000, wireframe: true, wireframeLinewidth: 1.2, wireframeLinecap: "square" });
                //    wireframeLinewidth werkt meestal niet, standaard 1. 

                korf = new THREE.Mesh(geo, mat);
                korf.position.y = -15;    // - 95;
                korf.position.z = -0;
            }
            /*************************  Maken luchtballon groep    ************/
            luchtballon = new THREE.Group;
            luchtballon.add(ballon);
            luchtballon.add(touwen);
            luchtballon.add(korf);
            luchtballon.position.x = 200;
            luchtballon.position.y = 200;
        }

        function maakKamer() {
            //	let material = new THREE.MeshBasicMaterial( {color: 0xcccccc} );
            let materialArray = [];
            let texture_ft = new THREE.TextureLoader().load('./images/skybox/wit.jpg');  // linkerkant 
            let texture_bk = new THREE.TextureLoader().load('./images/skybox/wit.jpg');  // rechterkant
            let texture_up = new THREE.TextureLoader().load('./images/skybox/zwart.jpg');
            let texture_dn = new THREE.TextureLoader().load('./images/schaakbord10.jpg');
            let texture_rt = new THREE.TextureLoader().load('./images/skybox/woman1.jpg');  // achter
            let texture_lf = new THREE.TextureLoader().load('./images/skybox/woman1.jpg');

            // MeshBasicMaterial geen reflectie, MeshLambertMaterial and MeshPhongMaterial and MeshStandardMaterial.

            materialArray.push(new THREE.MeshStandardMaterial({ map: texture_ft }));
            materialArray.push(new THREE.MeshStandardMaterial({ map: texture_bk }));
            materialArray.push(new THREE.MeshBasicMaterial({ map: texture_up }));
            materialArray.push(new THREE.MeshPhongMaterial({ map: texture_dn }));
            materialArray.push(new THREE.MeshStandardMaterial({ map: texture_rt }));
            materialArray.push(new THREE.MeshPhongMaterial({ map: texture_lf }));


            for (let i = 0; i < 6; i++)
                materialArray[i].side = THREE.BackSide;  // BothSide;  // FrontSide ;  //  BackSide;

            let boxGeo = new THREE.BoxGeometry(breedte, breedte, breedte);
            kamer = new THREE.Mesh(boxGeo, materialArray);


            //  kamer = new THREE.Mesh(geometry, material);
            kamer.position.y = breedte * 0.3;
            //    kamer.rotation.x = -0.03;  // 0.4
            kamer.rotation.y = Math.PI / 1;
            scene.add(kamer);

        }

        /******************     maken palen    ************/
        function maakPaal(k) {
            paalHoogte = 60;
            paalDikte = 30;
            let geo = new THREE.CylinderGeometry(paalDikte / 2, paalDikte / 2, paalHoogte, 32);  // radius i, radius o, height. 
            //    mat = new THREE.MeshBasicMaterial({ color: kleuren[k] });
            let mat = new THREE.MeshPhongMaterial({ color: kleuren[k], reflectivity: 0.5 });
            // paal = new THREE.Mesh(geo, mat);
            paal[k] = new THREE.Mesh(geo, mat);
            let vakje = breedte / 9;
            paal[k].position.x = - 3 * vakje + k * 2 * vakje;
            paal[k].position.y = -90;
            paal[k].position.z = 0;

            /*
            paal[k].geometry.computeBoundingBox();
            let box = new THREE.Box3().setFromObject(paal[k]);
            paalHoogte = box.max.y - box.min.y;
            alert(paalHoogte); 
            paalDikte = box.max.x - box.min.x;
            //  alert("paalHoogte" + paalHoogte);
            */
            scene.add(paal[k]);
