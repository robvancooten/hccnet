<!DOCTYPE html>
<html lang="en">

	<head>
		<title>All heads made by Marjan. </title>
		<meta charset="utf-8">
		
		<link type="text/css" rel="stylesheet" href="css/main.css">

		<!-- https://threejs.org/docs/#api/en/textures/CubeTexture  -->
	</head>

	<body>

		<!-- Import maps polyfill -->
		<!-- Remove this when import maps will be widely supported -->
		<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>

		<script type="importmap">
			{
				"imports": {
					"three": "./build/three.module.js"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';
			import { OrbitControls } from './jsm/controls/OrbitControls.js';

			import { TWEEN } from 'https://unpkg.com/three@0.139.0/examples/jsm/libs/tween.module.min.js';

			let camera, scene, renderer;
			let mesh;

			init();
			animate();

			function init() {

				camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 10000);
				camera.position.z = 1000;

				scene = new THREE.Scene();

				const loader = new THREE.CubeTextureLoader();
				loader.setPath('images/koppen/');

				const textureCube = loader.load([
					'kop1.jpg', 'kop2.jpg',
					'kop4.jpg', 'kop3.jpg',   // top/ bottum 
					'kop3.jpg', 'kop4.jpg'
				]);

				//	textureCube.mapping = THREE.CubeRefractionMapping;
				textureCube.mapping = THREE.CubereflectionMapping;

				const material = new THREE.MeshLambertMaterial({ color: 0xffffff, envMap: textureCube });

				let w = 256;
				const geometry = new THREE.BoxGeometry(w, w, w);
				//	const material = new THREE.MeshBasicMaterial({ map: texture });

				mesh = new THREE.Mesh(geometry, material);
				scene.add(mesh);
				scene.background = textureCube;

				// kleuren flamingo: 
				const dirLight = new THREE.DirectionalLight(0xffffff, 3);
				dirLight.color.setHSL(0.1, 1, 0.95);
				dirLight.position.set(- 1, 1.75, 1);
				dirLight.position.multiplyScalar(30);
				scene.add(dirLight);

				renderer = new THREE.WebGLRenderer({ antialias: true });
				renderer.setPixelRatio(window.devicePixelRatio);
				renderer.setSize(window.innerWidth, window.innerHeight);
				document.body.appendChild(renderer.domElement);

				//controls
				const controls = new OrbitControls(camera, renderer.domElement);
				controls.enableZoom = true;
				controls.enablePan = false;
				controls.minPolarAngle = Math.PI / 4;
				controls.maxPolarAngle = Math.PI / 1.5;

				//
				startTween()  ;

				window.addEventListener('resize', onWindowResize);

			}

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize(window.innerWidth, window.innerHeight);

			}

			function animate() {

				requestAnimationFrame(animate);

				//	mesh.rotation.x += 0.005;
				//	mesh.rotation.y += 0.01;

				renderer.render(scene, camera);
				TWEEN.update();

			}
			function startTween() {

				// Tween.js Tweening
				new TWEEN.Tween(mesh.position)
					.to({ y: 1.5 }, 2000)
					.yoyo(true)
					.repeat(Infinity)
					.easing(TWEEN.Easing.Cubic.InOut)
					.start()
					;
				new TWEEN.Tween(mesh.rotation)
					.to({ y: "-" + (Math.PI / 2) * 8 }, 6000) // Math.PI/2 = 360degrees x8 rotations
					.delay(1000)
					.repeat(Infinity)
					.easing(TWEEN.Easing.Cubic.InOut)
					.start()
					;
				new TWEEN.Tween(mesh.rotation)
					.to({ x: "-" + (Math.PI / 2) * 9 }, 14000)
					.repeat(Infinity)
					.easing(TWEEN.Easing.Cubic.InOut)
					.start()
					;
				new TWEEN.Tween(mesh.scale)
					.to({ x: 1.25, y: 1.25, z: 1.25 }, 5000)
					.yoyo(true)
					.repeat(Infinity)
					.easing(TWEEN.Easing.Cubic.InOut)
					.start()
					;
			} 
		</script>

	</body>

</html>
