<!DOCTYPE html>
<html lang="en">

<head>

    <link type="text/css" rel="stylesheet" href="css/main.css">

<body>

    <div id="menu">
        Hier komt menu.
    </div>
    <footer>
        <img src="images/pijlPrev.jpg" id="links" alt="to the left" title="to the left" class="unselectable">
        <img src="images/pijlNext.jpg" id="rechts" alt="naar Rechts" title="to the right" class="unselectable">
        <span>
            move
        </span>
        <img src="images/pijlUp.jpg" id="up" alt="up" title="to the back" class="unselectable">

    </footer>

    <!-- Import maps polyfill -->

    <script type="importmap">
			{
				"imports": {

    <script type="module">
        import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './my_js/menu_tekst.js';
        import * as THREE from 'three';
        import { OBJLoader } from './jsm/loaders/OBJLoader.js';
        import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from './jsm/controls/OrbitControls.js';
        import { leesModellen, modellen } from './my_js/all_modellen.js';

        let container, menu;

        let camera, scene, renderer;
        let controls;   // touch mouse controls
        let breedte = 550    // 550;

        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;

        let ballon, luchtballon, kamer;
        let kop = [];
        const koppen = [];  // standaard null       
        let nummer = 0;
        let pad;
        let max;
        let object;
        let paal = [], sokkel = [];
        let paalHoogte, paalDikte;
        const aantalKolommen = 5;

        // const pad = "./modellen/";

        let textures = [], kleuren = [];
        let pointLights = [], spotLight, spotLightHelper;
        let shiftY = 100, shiftZ = 100;   // afstand paal pointlight. 
        let intensity = 10;
        let positie = 0;
        let teller = -1;

        const cameraZ = 1700;
        let lightHolder;

        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;
        let naarLinks = false; let naarRechts = false;
        let naarAchter = false; let naarVoren = false;

        init();
        animate();

        function init() {
            //  let tekst = toonTekst(); 
            //  alert(tekst); 
            menu = document.getElementById("menu");
            if (isTouchDevice())
                menu.innerHTML = leesMenuTekst() + "Expositie all heads. Use fingers to zoom or rotate.";
            else
                menu.innerHTML = leesMenuTekst() + "Expositie all heads.  Use mouse to zoom or rotate.";

            kleurActiveLink();

            leesModellen();
            max = modellen.length;
            //   alert("aantal koppen: " + max ) ; 
            let loc = location.hostname;
            if (loc == "localhost")
                pad = "./modellen/glb/"
            else
                pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";

            maakNavigator();


            function maakNavigator() {
                const links = document.getElementById("links");
                links.addEventListener("pointerdown", pressingLinks, false);
                function pressingLinks() {
                    naarLinks = true;
                }
                links.addEventListener("pointerup", releaseLinks, false);
                function releaseLinks() {
                    naarLinks = false;
                }

                const rechts = document.getElementById("rechts");
                rechts.addEventListener("pointerdown", pressingRechts, false);
                function pressingRechts() {
                    naarRechts = true;
                }
                rechts.addEventListener("pointerup", releaseRechts, false);
                function releaseRechts() {
                    naarRechts = false;
                }

                const up = document.getElementById("up");
                up.addEventListener("pointerdown", pressingOmhoog, false);
                function pressingOmhoog() {
                    naarAchter = true;
                }
                up.addEventListener("pointerup", releaseOmhoog, false);
                function releaseOmhoog() {
                    naarAchter = false;
                }

                const down = document.getElementById("down");
                down.addEventListener("pointerdown", pressingDown, false);
                function pressingDown() {
                    naarVoren = true;
                }
                down.addEventListener("pointerup", releaseUp, false);
                function releaseUp() {
                    naarVoren = false;
                }
            }

            container = document.createElement('div');
            document.body.appendChild(container);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10 * 1000);
            camera.position.z = cameraZ;   // 700 

            // scene

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.add(camera);
            belichten();
            maakKamer();
            maakPalen();

            for (let k = 0; k < aantalKolommen; k++) {
                pointLights[k].position.x = paal[k].position.x;
                pointLights[k].position.y = paal[k].position.y + shiftY;
                pointLights[k].position.z = paal[k].position.z + shiftZ;
            }

            leesModellen();
            //   laadModel();

            renderer = new THREE.WebGLRenderer();
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            //	document.addEventListener('mousemove', onDocumentMouseMove);
            window.addEventListener('resize', onWindowResize);
            startOrbitController();

        }   // einde init

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        //
        function rotentilt() {
            let polar = Math.tan(controls.getPolarAngle());
            spotLight.position.y = 100 + 100 / polar;
            // console.log("Math.tan( controls.getPolarAngle() ): " + Math.tan( controls.getPolarAngle() )) ; 
            let azi = Math.tan(controls.getAzimuthalAngle());
            spotLight.position.x = + 150 * azi;
            // console.log(" Math.tan( controls.getAzimuthalAngle() ) "  +  Math.tan( controls.getAzimuthalAngle() ) ) ; 

            /**************************************************************************************************************/

            // pointLights[1].position.y = paal[1].position.y + paal[1].position.y / polar;   
            pointLights[0].position.x = paal[0].position.x + 100 * azi;
            pointLights[0].position.y = paal[0].position.y;  // + paal[0].position.y * polar;   

            pointLights[1].position.x = paal[1].position.x + 100 * azi;
            // pointLights[1].position.y = paal[1].position.y + paal[1].position.y / polar;   
            render();

        }
        function animate() {
            requestAnimationFrame(animate);
            if (koppen[nummer] != null) {  // als er 1 is geladen: 
                if (nummer < max - 1) {
                    nummer++;
                    laadModel();  // laadt de volgende
                }
            }
            //  controls.update();
            lightHolder.quaternion.copy(camera.quaternion);
            //  spotLight.quaternion.copy(camera.quaternion);
            render();
        }
        /*
                    var box = new THREE.Box3().setFromObject(theGroup);
                    var sizeX = box.getSize().x;
                    var sizeY = box.getSize().y;
                    var sizeZ = box.getSize().z;      */


        function render() {
            let sp = 5;
            if (naarLinks)
                camera.position.x += sp;
            if (naarRechts)
                camera.position.x -= sp;
            if (naarAchter)
                camera.position.z += sp;
            if (naarVoren)
                camera.position.z -= sp;

            if (teller % 100 == 0 && koppen[max - 1] != null)
                scannenBeelden();

            teller++;
            renderer.render(scene, camera);
        }


        /*****************   spotLight scan   *******************/
        function scannenBeelden() {
            spotLight.target = paal[positie];
            let afstand = berekenAfstandSpotLightKop(positie);
            spotLight.distance = afstand;  // 1.14 ;
            spotLight.angle = 0.005 * Math.PI * breedte / afstand;
            spotLight.color.setHex(kleuren[positie % aantalKolommen]);
            spotLightHelper.update();

            positie++;
            positie = positie % (max - 1);
            //   console.log("nummer spotLight: " + positie);
        }   // einde scannenBeelden. 

        function kleurObject(kop) {

            kop.traverse((o) => {
                if (o.isMesh) {
                    //    o.material.emissive = new THREE.Color(0x333333);  //  333333
                    o.material.metalness = 0.0;  // 0..1 , 0.5
                }
            });
        }

        function berekenAfstandSpotLightKop(pos) {
            let a = (koppen[pos].position.x) - spotLight.position.x;
            let b = (koppen[pos].position.y - spotLight.position.y) + paalHoogte * 0.5;
            let c = (koppen[pos].position.z - spotLight.position.z);
            let d = Math.sqrt(a * a + b * b + c * c);
            let kopHoogte = 20;
            d = d + kopHoogte;
            return d;
        }
        function belichten() {
            const ambientLight = new THREE.AmbientLight(0xcccccc, 0.3);
            scene.add(ambientLight);

            // White directional light at half intensity shining from the top: 0,5 , default is 1. 
            const directionalLight = new THREE.DirectionalLight(0xffffff, 2.5);  // 1 voor pointlight leuk belichten.
            directionalLight.position.set(- 150, -150, 150);
            directionalLight.position.set(-breedte * 1.5, breedte * 1.5, breedte * 1.5);

            scene.add(directionalLight);


            // SpotLight( color : Integer, intensity : Float, distance : Float, angle : Radians, penumbra : Float, decay : Float )
            const color = 0xFF0000;
            intensity = 20;  // 3
            const angle = Math.PI * 0.015;

            spotLight = new THREE.SpotLight(color, intensity, breedte, angle);
            spotLight.position.x = 0;
            spotLight.position.y = breedte * 0.7;   // 50
            spotLight.position.z = breedte * 0.4;  // 100
            spotLight.decay = 0;

            scene.add(spotLight);

            spotLightHelper = new THREE.SpotLightHelper(spotLight);
            scene.add(spotLightHelper);

            // kleuren voor standaards, pointlights en spotLight. 
            kleuren[0] = 0x228B22;
            kleuren[1] = 0x20B2AA;
            kleuren[2] = 0x87CEEB;
            kleuren[3] = 0x696969;
            kleuren[4] = 0xAA6969;
            kleuren[5] = 0xFF0000;

            // SphereGeometry(radius : Float, widthSegments : Integer, heightSegments :
            const sphere = new THREE.SphereGeometry(3.3, 16, 8);  // voor lights.  
            // PointLight( color : Integer, intensity : Float, distance : Number, decay : Float ); 
            intensity = 17.0;
            for (let k = 0; k < max; k++) {
                pointLights[k] = new THREE.PointLight(kleuren[k % aantalKolommen], intensity, 100);  // 200 
                let mat = new THREE.MeshPhongMaterial({ color: kleuren[k % aantalKolommen], shininess: 200, reflectivity: 0.9 });
                pointLights[k].add(new THREE.Mesh(sphere, mat));   // ff0040
                scene.add(pointLights[k]);
            }
            scene.add(pointLights[0]);

            lightHolder = new THREE.Group();
            for (let k = 0; k < aantalKolommen; k++) {
                lightHolder.add(pointLights[k]);
            }
            //  lightHolder.add(pointLights[0]);
            //  lightHolder.position.z = +0 ;
            //   lightHolder.position.x = +100 
            //  scene.add(lightHolder);
            //  lightHolder.quaternion.copy(camera.quaternion); // in the animation loop

        }


        function laadModel() {
            let model = pad + modellen[nummer] + '.glb';
            //    console.log("model: " + model) ; 
            //  alert("model: " + model);
            const loader = new GLTFLoader();

            loader.load(model, function (gltf) {
                //  console.log("nummer: " + nummer);
                kop = gltf.scene.children[0];
                //    koppen[nummer] = kop;
                kleurObject(kop);
                normeerKop(kop);
                centerPivot(kop);

                // kop.position.x = - max / 2 * 50 + 50 * nummer;
                kop.position.x = paal[nummer].position.x;   // + 300;
                kop.position.y = paal[nummer].position.y + paalHoogte * 0.6;
                kop.position.z = paal[nummer].position.z;
                //   koppen[nummer].position.y = 10 * nummer;
                // console.log("geladen, nummer: " + nummer);
                //   toonPivot();
                // koppen[nummer] = kop ;                 
                scene.add(koppen[nummer]);
                //  alert("nummer na laden: " + nummer)
            },
                function (xhr) {
                    let proc = + 100 * xhr.loaded / xhr.total;
                    proc = proc.toFixed(0) + "%";
                    if (proc == '118%' || proc == '100%') {
                        proc = '';
                    }

                },
                function (onLoad) {
                    //  alert("loaded"); 
                    // 	console.log('loaded');
                },
                // called when loading has errors
                function (error) {
                    //  if (loc == "localhost")
                    //      alert("o o an error while loading: " + nummer + " kop");
                    console.log('O, 0 An error happened during loading');
                }
            );    // einde loader
        }   // einde laadModel

        function maakKamer() {
            //	var material = new THREE.MeshBasicMaterial( {color: 0xcccccc} );
            let materialArray = [];
            let texture_ft = new THREE.TextureLoader().load('./images/skybox/wit.jpg');  // linkerkant 
            let texture_bk = new THREE.TextureLoader().load('./images/skybox/wit.jpg');  // rechterkant
            let texture_up = new THREE.TextureLoader().load('./images/skybox/zwart.jpg');
            let texture_dn = new THREE.TextureLoader().load('./images/schaakbord.jpg');
            let texture_rt = new THREE.TextureLoader().load('./images/skybox/woman1.jpg');  // achter
            let texture_lf = new THREE.TextureLoader().load('./images/skybox/woman1.jpg');

            // MeshBasicMaterial geen reflectie, MeshLambertMaterial and MeshPhongMaterial and MeshStandardMaterial.

            materialArray.push(new THREE.MeshStandardMaterial({ map: texture_ft }));
            materialArray.push(new THREE.MeshStandardMaterial({ map: texture_bk }));
            materialArray.push(new THREE.MeshBasicMaterial({ map: texture_up }));
            materialArray.push(new THREE.MeshPhongMaterial({ map: texture_dn }));
            materialArray.push(new THREE.MeshStandardMaterial({ map: texture_rt }));
            materialArray.push(new THREE.MeshPhongMaterial({ map: texture_lf }));


            for (let i = 0; i < 6; i++)
                materialArray[i].side = THREE.BackSide;  // BothSide;  // FrontSide ;  //  BackSide;

            let boxGeo = new THREE.BoxGeometry(breedte, breedte, breedte);
            kamer = new THREE.Mesh(boxGeo, materialArray);


            //  kamer = new THREE.Mesh(geometry, material);
            kamer.position.y = breedte * 0.3;
            //    kamer.rotation.x = -0.03;  // 0.4
            kamer.rotation.y = Math.PI / 1;
            scene.add(kamer);

        }
        /******************     maken palen    ************/
        function maakPalen() {
            let vakBreedte = 69;
            let rad = 40;   // 8;
            let geo = new THREE.CylinderGeometry(rad, rad, 56, 32);  // radius i, radius o, height. 
            //    mat = new THREE.MeshBasicMaterial({ color: kleuren[k] });


            for (let k = 0; k < max; k++) {
                let mat = new THREE.MeshLambertMaterial({ color: kleuren[k % aantalKolommen], opacity: 0.8, transparent: 1.0 });
                //    mat.emissive = new THREE.Color(0x333333);  //  333333
                //    mat.metalness = 1.0;  // 0..1 , 0.5
                //     mat.opacity = 0.1;  // lambert material 0 is helemaal transparent. 
                //     mat.transparent = 0.5 ; 

                paal[k] = new THREE.Mesh(geo, mat);

                paal[k].geometry.computeBoundingBox();
                let box = new THREE.Box3().setFromObject(paal[k]);
                paalHoogte = box.max.y - box.min.y;
                paalDikte = box.max.x - box.min.x;
                //  alert("paalHoogte" + paalHoogte);

                paal[k].position.x = -  vakBreedte * aantalKolommen / 2 + 0.5 * vakBreedte - paalDikte + (k % aantalKolommen) * vakBreedte;
                paal[k].position.y = -80;
                paal[k].position.z = + aantalKolommen / 2 * vakBreedte - vakBreedte * Math.floor(k / aantalKolommen);

                pointLights[k % 5].position.x = paal[k].position.x;
                pointLights[k % 5].position.y = paal[k].position.y + 10;
                pointLights[k % 5].position.z = paal[k].position.z;
                //    console.log("paal.z: " + paal[k].position.z  )
                const light = new THREE.PointLight(0x0000ff, 10, 0);
                light.position.set(0, 0, 0);
                scene.add(light);
            //    PointLightHelper( light : PointLight, sphereSize : Float, color : Hex )
                let pointlightHelper = new THREE.PointLightHelper( light, 100, 0x0000FF );
                scene.add(pointlightHelper) ; 

                paal[0].position.x = 0 
                paal[0].position.y = 0 
                paal[0].position.z = 0 

                scene.add(paal[0]);

           //     scene.add(paal[k]);
                paal[k].add(pointLights[k % 5]);
            }
        }  // einde maakPalen.             

        function startOrbitController() {
            controls = new OrbitControls(camera, renderer.domElement);
            controls.addEventListener('change', render);
            controls.listenToKeyEvents(window);    // pijltjes toetsen.                

            controls.minPolarAngle = -Math.PI * 0.3;     // tilt. , x as.            
            controls.maxPolarAngle = Math.PI * 0.5;   // + meer zon. 

            controls.minAzimuthAngle = -Math.PI * 1.55;      // rot y as.
            controls.maxAzimuthAngle = Math.PI * 1.55;

            controls.target.set(0, 10, 0);
            controls.minDistance = 40.0;
            controls.maxDistance = breedte * 10;
            controls.update();
        }

        function pivot() {
            /*
            let box = new THREE.Box3().setFromObject(koppen[0]);
            let sizeX = box.getSize().x;
            let sizeY = box.getSize().y;
            let sizeZ = box.getSize().z;      */
        }
        function normeerKop(kop) {
            let hoogte = berekenHoogte(kop);
            let scaleFactor = 17 / hoogte;
            // hoogte = Math.round(hoogte);
            //   alert("hoogte: " + hoogte);
            kop.scale.multiplyScalar(scaleFactor);  // 50    
        }
        function berekenHoogte(kop) {
            let box3 = new THREE.Box3().setFromObject(kop);
            let size = new THREE.Vector3();
            box3.getSize(size);
            //   console.log("size: " + size.y);
            return size.y;
        }
        function centerPivot(kop) {
            let box3 = new THREE.Box3().setFromObject(kop);
            const low = box3.min;
            const high = box3.max;
            const corner1 = new THREE.Vector3(low.x, low.y, low.z);
            const corner8 = new THREE.Vector3(high.x, high.y, high.z);
            const transform = new THREE.Vector3(0, 0, 0,);
            //    transform = ( corner1 - corner8 ) / 2;                     

            const group = new THREE.Group();
            group.add(kop);
            kop.position.x = kop.position.x - (high.x + low.x) / 2;
            kop.position.y = kop.position.y - (high.y + low.y) / 2;
            kop.position.z = kop.position.z - (high.z + low.z) / 2;

            //   console.log("transform.x: "  +  (high.x  + low.x)/2 ); 
            koppen[nummer] = group;
            //    scene.add(group); 

        }

const corner5 = new THREE.Vector3(high.x,   high.y, low.z);

const corner7 = new THREE.Vector3(low.x,    high.y, high.z);
const corner8 = new THREE.Vector3(high.x,   high.y, high.z);
        */
    </script>
