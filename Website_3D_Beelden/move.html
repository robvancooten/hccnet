<!DOCTYPE html>
<html lang="en">

<head>
	<title>Showing All heads made by Marjan.</title>
	<meta charset="utf-8">
	<meta name="author" content=" Rob van Cooten. Waalre. ">
	<meta name="keywords" content="3D models, Threejs, Ceramics">
	<!--  https://sourceforge.net/projects/three-js.mirror/  -->
	<meta name="description" content="Showing all kinds of ways to show ceramics heads using ThreeJS.">
	<link type="text/css" rel="stylesheet" href="css/main.css">
	<link href="css/menu.css" rel="stylesheet" type="text/css">
	<link rel="icon" type="image/x-icon" href="./images/ernie.ico">

	<style>
		body {
			pointer-events: auto;
			/* touch-action: auto;      */
			/*   pointer-events: none;   dat werkt voor mouse  */
			/*  cursor:none;    */
			cursor: url(./images/kop.ico), auto;
		}

		.unselectable {
			/* speciaal voor touch devices */
			-webkit-user-select: none;
			-webkit-touch-callout: none;
			-moz-user-select: none;
			-ms-user-select: none;
			user-select: none;
			-webkit-touch-callout: none;
			/* Safari */
			-webkit-user-select: none;
			/* Chrome */
			-moz-user-select: none;
			/* Firefox */
			-ms-user-select: none;
			/* Internet Explorer/Edge */
		}

		#rechts,
		#links {
			margin-top: 0.0vh;
			width: 5vw;
			/* 7% ; */
			height: 5vh;
			/* 20px;  */
			background-color: #cccccc;
			border-style: ridge;
			border-width: 0.5vw;
			border-color: #cccccc;
			/* cursor: url(images/kop.cur), auto;   */
			display: inline;
			/* voor images dezelfde hoogte  */
		}

		#rechts {
			float: right;
		}

		#reset {
			margin-top: 0.0vh;
			position: absolute;
			left: 50%;
			width: 5vw;
			height: 5vh;
			border-style: ridge;
			border-color: #cccccc;
			border-radius: 50%;
			display: inline;

		}

		#rechts,
		#links,
		#reset,
		#zoomIn:hover,
		#zoomOut:hover {
			cursor: pointer;
		}

		#zoomIn,
		#zoomOut {
			margin: 0;
			position: absolute;
			top: 70%;
			width: 8vh;
			max-width: 50px;
			height: 8vh;
			max-height: 50px;
			text-align: center;
			border-radius: 50%;
			background-color: white;
			color: black;
			border: 5px solid CornflowerBlue;
			/* 2vw niet mooi */
		}

		/* 	background: url ('/image/btn.png') no-repeat;   */


		#zoomOut {
			position: absolute;
			top: 85%;
			background-color: #fff;
			border: 5px solid CornflowerBlue;
		}
	</style>
	<script src="./build/jquery.js"></script>
</head>

<body>
	<div id="menu">
		Hier komt Menu.
	</div>
	<div id="nav">
		<img src="images/pijlPrev.jpg" id="links" alt="left" title="move to the left." class="unselectable ">

		<img src="images/kop.jpg" id="reset" alt="reset" title="Reset." class="unselectable ">

		<img src="images/pijlNext.jpg" id="rechts" alt="right" title="move to the right." class="unselectable ">

		<input type="button" id="zoomIn" value="In" title="Zoom In." class="unselectable">
		<!--   onclick="pressingDown();">   -->
		<input type="button" id="zoomOut" value="Out" title="Zoom Out" class="unselectable">
	</div>

	<script type="importmap">
			{
				"imports": {
					"three": "./build/three.module.js"		
				}
			}
		</script>

	<script type="module">

		import * as THREE from 'three';
		import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './my_js/menu_tekst.js';
		import { leesModellen, modellen } from './my_js/all_modellen.js';
		import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';
		import { OrbitControls } from './jsm/controls/OrbitControls.js';

		let container;

		let camera, scene, renderer;

		let zoom = false;

		let windowHalfX = window.innerWidth / 2;
		let windowHalfY = window.innerHeight / 2;

		let kop;
		let nummer = 0;
		let aantal = 0;
		const koppen = [];

		let teller = 1;
		let pos = 0;   // positie kop en spotlight.

		let breedte = 1000;
		let spotLight = null;
		let spotLightHelper;
		let controls;
		let richtingZ = 0;
		let richtingX = 1;
		let startZ = 100;

		init();
		animate();

		function init() {
			maakMenu();
			maakScene();
			maakBelichting();
			//  maakBox();
			maakSkybox();

			leesModellen();
			initKoppen();

			for (let k = 0; k < aantal; k++)
				laadKop(k);

			rendererSimpel();
			// myRenderer();

			document.addEventListener("DOMContentLoaded", startNavigator);
			window.addEventListener('resize', onWindowResize);

			$(document).ready(function () {
				$('body').bind('cut copy', function (e) {
					e.preventDefault();
				});
			});
			startOrbitControls();
		}
		// einde init; 

		function onWindowResize() {

			windowHalfX = window.innerWidth / 2;
			windowHalfY = window.innerHeight / 2;

			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();

			renderer.setSize(window.innerWidth, window.innerHeight);
		}


		function animate() {
			requestAnimationFrame(animate);
			//	controls.update();
			render();
		}

		function render() {
			let a;
			a = camera.position.z * Math.tan(45 * Math.PI / 360);
			// naar links is plus. 
			if (camera.position.x > 4 * a)
				richtingX = -1;
			if (camera.position.x < -4 * a)
				richtingX = +1;

			camera.position.x += richtingX * 0.3;

			if (camera.position.z > breedte / 2 && richtingZ > 0)
				richtingZ = -1;
			if ((camera.position.z < - 30) && (richtingZ < 0)) // anders door het scherm heen. 	
				richtingZ = +1;

			camera.position.z += richtingZ * 0.5;

			// 	console.log("camera z positie: " + camera.position.z )

			// camera.lookAt(scene.position);
			if ((koppen[0] != null) && (spotLight != null))
				volgKop();
			renderer.render(scene, camera);
		}

		function volgKop() {
			// alert(); 
			teller++;
			if ((teller % 100) == 0) {
				spotLight.visible = true;
				spotLight.target = koppen[pos];
				spotLight.distance = berekenAfstandSpotLightKop(pos) + 50;
				//   scene.remove(spotLightHelper);
				//   spotLightHelper = new THREE.SpotLightHelper(spotLight);
				//	spotLightHelper.visible = true; 
				spotLightHelper.update();
				// scene.add(spotLightHelper);

				pos++;
				if (pos >= aantal)
					pos = 0;
				//	console.log("pos: " + pos);
			}
		}

		function maakSkybox() {
			// texturen laden: 
			let texture_ft = new THREE.TextureLoader().load('./images/skybox/1.jpg');
			let texture_dn = new THREE.TextureLoader().load('./images/skybox/2.jpg');

			// let matft = new THREE.MeshPhongMaterial({ map: texture_ft });
			const matft = new THREE.MeshPhongMaterial({
				map: texture_ft,
				color: 0xffffff,     //  0x228822,
				shininess: 220,    //  standaard 30 
				//  side: THREE.FrontSide,    //            BackSide,       //  FrontSide,
				// metalness: 0.5,   niet voor dit materiaal
				emissive: 0x001100,   // 'darkgreen'
				specular: 0x001500,
				reflectivity: 1.0   // doet niet veel
			});

			//    let matdn = new THREE.MeshPhongMaterial({ map: texture_dn });
			let matdn = new THREE.MeshLambertMaterial({ map: texture_dn });


			let materialArray = [];

			materialArray.push(matft);
			materialArray.push(matft);
			materialArray.push(matft);
			materialArray.push(matdn);
			materialArray.push(matdn);
			materialArray.push(matdn);

			for (let i = 0; i < 6; i++) {
				materialArray[i].side = THREE.DoubleSide;
			}

			let skyboxGeo = new THREE.BoxGeometry(breedte, breedte, breedte);

			let skybox = new THREE.Mesh(skyboxGeo, materialArray);

			scene.add(skybox);
		}
		function startOrbitControls() {

			controls = new OrbitControls(camera, renderer.domElement);
			controls.addEventListener('change', render);

			controls.enableDamping = true; // an animation loop is required when either damping or auto-rotation are enabled
			controls.dampingFactor = 0.05;

			controls.minPolarAngle = Math.PI * 0.35;     // tilt. , x as.            
			controls.maxPolarAngle = Math.PI * 0.6;

			controls.minAzimuthAngle = -Math.PI * 0.2;      // rot y as.
			controls.maxAzimuthAngle = Math.PI * 0.2;

			controls.minDistance = 0.005 * breedte;    // 500 
			controls.maxDistance = 0.30 * breedte;     // 1500 tevens startpositie camera

			controls.autoRotate = true;
			controls.autoRotateSpeed = 2.4;   // 2 is default. 
			//	controls.update();
		}

		function laadKop(nummer) {
			let pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";
			let model = pad + modellen[nummer] + '.glb';

			const loader = new GLTFLoader();
			loader.load(model, function (gltf) {
				kop = gltf.scene.children[0];
				koppen[nummer] = kop;
				let schaalY = berekenHoogte(kop);
				//	console.log("schaalY van nummer: " + schaalY + " / " + nummer);
				let s = 17 / schaalY;
				koppen[nummer].scale.multiplyScalar(s);  // 50 

				let centrum = new THREE.Vector3();
				centrum = berekenCenter(kop);

				koppen[nummer].position.x = 26 * nummer - aantal * 13 - centrum.x;
				koppen[nummer].position.y = - centrum.y;
				koppen[nummer].position.z = - 40 - centrum.z;
				//	kop.metalness = 10; // dir light werkt anders niet...?
				// kop.texture.encoding = THREE.sRGBEncoding ; 

				scene.add(kop);
				kleurObject();
			},
				// called while loading is progressing
				function (xhr) {
					;
					// 	console.log((xhr.loaded / xhr.total * 100) + '% loaded');
				},
				// called when loading has errors
				function (error) {

					console.log('O, 0 An error happened during loading');

				}
			);    // einde loader
		}   // einde laadModel		

		function kleurObject() {
			kop.traverse((o) => {
				if (o.isMesh) {
					o.material.emissive = new THREE.Color(0x333333);
					o.material.metalness = 0.5;  // 0..1 
				}
			});
		}

		function myRenderer() {
			/*	const renderer = new THREE.WebGLRenderer({
					powerPreference: 'high-performance',
					antialias: true,
					alpha: true,
				})    */
			renderer = new THREE.WebGLRenderer();
			renderer.outputColorSpace = THREE.sRGBEncoding;
			renderer.toneMapping = THREE.ACESFilmicToneMapping
			renderer.setPixelRatio(Math.min(Math.max(1, window.devicePixelRatio), 2))
		}
		function rendererSimpel() {
			renderer = new THREE.WebGLRenderer();
			renderer.setPixelRatio(window.devicePixelRatio);
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.toneMappingExposure = 10.4;   // dit scheelt veel. 
			container.appendChild(renderer.domElement);
		}
		function startNavigator() {
			// Listening for the mouse and touch events   
			const reset = document.getElementById("reset");
			reset.addEventListener("pointerdown", pressingDownReset, false);

			const rechts = document.getElementById("rechts");
			rechts.addEventListener("pointerdown", pressingDownR, false);

			const links = document.getElementById("links");
			links.addEventListener("pointerdown", pressingDownL, false);

			// camera.position.z = startZ;
			const zoomIn = document.getElementById("zoomIn");
			zoomIn.addEventListener("pointerdown", pressingZoomInDown, false);

			const zoomOut = document.getElementById("zoomOut");
			zoomOut.addEventListener("pointerdown", pressingZoomOutDown, false);

		}

		function pressingDownR(e) {
			if (richtingX == -1) {
				richtingX = 0;
				rechts.style.borderColor = "white";
				links.style.borderColor = "white";
			}
			else {
				richtingX = -1;
				rechts.style.borderColor = "green";
				links.style.borderColor = "white";
			}

			e.preventDefault();
			// console.log("Pressing R!");
		}
		function pressingDownL(e) {
			if (richtingX == +1) {
				richtingX = 0;
				links.style.borderColor = "white";
				rechts.style.borderColor = "white";
			}
			else {
				richtingX = +1;
				links.style.borderColor = "green";
				rechts.style.borderColor = "white";
			}

			e.preventDefault();
			e.stopPropagation();

			// console.log("Pressing R!");
		}
		function pressingZoomInDown(e) {
			if (richtingZ == 0) {
				richtingZ = -1;
				zoomIn.style.backgroundColor = "CornflowerBlue";
				zoomOut.style.backgroundColor = "white";
				//	zoomIn.style.border.color = "blue";
				//	zoomOut.style.border.color = "CornflowerBlue";
			}
			else {
				richtingZ = 0;
				zoomIn.style.backgroundColor = "white";
				zoomOut.style.backgroundColor = "white";
				//	zoomIn.style.border.color = "blue";
				//	zoomOut.style.border.color = "CornflowerBlue";
				// alert() ;
			}
			e.preventDefault();
			// console.log("Pressing zoomIn ");
			//	alert("zoomIN") ; 
		}

		function pressingZoomOutDown(e) {
			if (richtingZ == 0) {
				richtingZ = +1;
				zoomOut.style.backgroundColor = "CornflowerBlue";
				zoomIn.style.backgroundColor = "white";
			}
			else {
				richtingZ = 0;
				zoomOut.style.backgroundColor = "white";
				zoomIn.style.backgroundColor = "white";
			}
			e.preventDefault();

			// console.log("Pressing zoomIn ");
		}
		function pressingDownReset(e) {
			kleurKnoppen();
			if (richtingZ != 0 || richtingX != 0) {
				richtingX = 0;
				richtingZ = 0;
				controls.reset();
				reset.style.borderColor = "white";
			}
			else {
				controls.reset();
				richtingX = -1;
				reset.style.borderColor = "green";
			}

			//	camera.position.x = 0;
			//	camera.position.z = startZ;
			e.preventDefault();
			// console.log("Pressing R!");
		}
		function kleurKnoppen() {
			[rechts, links].forEach(knop => {
				knop.style.borderColor = "white";
			});
			zoomOut.style.backgroundColor = "white";
			zoomIn.style.backgroundColor = "white";
		}
		function maakSpotLight() {
			//   alert(); 
			spotLight = new THREE.SpotLight(0x00ff00, 200);
			spotLight.position.set(0, 10, breedte * 1.0);
			spotLight.distance = breedte * 1.1;
			spotLight.angle = Math.PI * 0.01;
			//    spotLight.penumbra = 0;   // 0..1  breed naar smal.
			spotLight.decay = 0;

			scene.add(spotLight);
			spotLight.visible = false;

			spotLightHelper = new THREE.SpotLightHelper(spotLight);
			spotLightHelper.visible = false;
			scene.add(spotLightHelper);

		}

		function berekenAfstandSpotLightKop(p) {
			let pos = p;
			let a = (koppen[pos].position.x) - spotLight.position.x;
			let b = (koppen[pos].position.y - spotLight.position.y);

			let d = Math.sqrt(a * a + b * b + c * c);
			return d;
		}

		function berekenHoogte(kop) {
			let box3 = new THREE.Box3().setFromObject(kop);
			let size = new THREE.Vector3();
			box3.getSize(size);
			// console.log("size: " + size.y);
			let posY = box3
			//	console.log("posY: " + posY);
			return size.y;
		}
		function berekenCenter(kop) {
			let box3 = new THREE.Box3().setFromObject(kop);
			let centrum = new THREE.Vector3();
			box3.getCenter(centrum);
			//	console.log("centrum.y: " + centrum.y + " / " + nummer);
			// 	target — the result will be copied into this Vector3.
			return centrum;
		}

		function maakMenu() {
			let menu = document.getElementById("menu");
			if (isTouchDevice())
				menu.innerHTML = leesMenuTekst() + "Ceramics heads by Marjan. Use finger or touch buttons to move/zoom or rotate.";
			else {
				menu.innerHTML = leesMenuTekst() + "Ceramics heads by Marjan. Press Mouse or buttons to move/zoom or rotate.";
				// 	alert(); 
			}
			kleurActiveLink();
		}

		function maakScene() {
			container = document.createElement('div');
			document.body.appendChild(container);

			camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2 * breedte);
			camera.position.z = startZ;

			// scene
			scene = new THREE.Scene();
		}

		function maakBelichting() {
			const ambientLight = new THREE.AmbientLight(0xcccccc, 5);
			//	scene.add(ambientLight);   // voor kop!

			let intens = 2;
			const directionalLight = new THREE.DirectionalLight(0xffffff, intens); // 20 te veel licht, geen kleur meer.
			directionalLight.position.set(1, 1, 1);
			directionalLight.target.position.set(0, 0, 0);
			scene.add(directionalLight);

			// White directional light at half intensity shining from the top: 0,5 
			let directionalLight2 = new THREE.DirectionalLight(0xffffff, intens);
			directionalLight2.position.set(-1, 1, 1);
			directionalLight2.target.position.set(0, 0, 0);
			scene.add(directionalLight2);

			maakSpotLight();
		}

		function initKoppen() {
			aantal = modellen.length;
			// alert("aantal modellen: " + aantal)

			for (let k = 0; k < aantal; k++)
				koppen[k] = null;
		}		
	</script>

</body>

</html>
