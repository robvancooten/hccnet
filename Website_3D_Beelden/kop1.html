<!DOCTYPE html>
<html lang="en">

	<head>
		<title>Shows a 3D Head.</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	</head>

	<body>
		<!-- Import maps polyfill -->
		<script src="js/Detector.js"></script>

		<script type="importmap">
			{
				"imports": {
					"three": "./build/three.module.js"
					
				}
			}
		</script>

		<script type="module">
			import * as THREE from 'three';
			import { OBJLoader } from './simpel_loader/js_simpel/OBJLoader.js';
		// 	import { OBJLoader } from './jsm/loaders/OBJLoader.js';  werkt niet. 			

			let container;

			let camera, scene, renderer;
			let object;

			function Wwebgl_support() {
				try {
					var canvas = document.createElement('canvas');
					return !!window.WebGLRenderingContext &&
						(canvas.getContext('webgl') || canvas.getContext('experimental-webgl'));
				} catch (e) {
					return false;
				}
			};

			// Initiate function or other initializations here
			init();

			function init() {
				container = document.createElement('div');
				document.body.appendChild(container);

				camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
				camera.position.z = 50;

				// scene
				scene = new THREE.Scene();
				// scene.background = new THREE.Color( 0xaaaaaa );   			

				const directionalLight = new THREE.DirectionalLight(0xffffff, 3.5);
				directionalLight.position.set(-100, 100, 100)
				scene.add(directionalLight);

				scene.add(camera);

				// manager
				function loadModel() {
					object.traverse(function (child) {
						if (child.isMesh)
							child.material.map = texture;
					});

					object.position.y = -5;    // - 95;
					// object.scale.x=0.5;
					scene.add(object);

				}   // einde loadModel. 

				const manager = new THREE.LoadingManager(loadModel);

				// texture laden:
				const textureLoader = new THREE.TextureLoader(manager);
				const texture = textureLoader.load('./modellen/bladerKop/bladerKop.jpg');

				// model
				function onProgress(xhr) {

					if (xhr.lengthComputable) {

						const percentComplete = xhr.loaded / xhr.total * 100;
						//	if (percentComplete == 100)
						//		console.log('model ' + Math.round(percentComplete, 2) + '% downloaded');

					}
				}    // einde onProgress.

				function onError() {
					console.log('O o loadError. ')
				}


				const loader = new OBJLoader(manager);
				// loader.load( 'model/male02.obj', function ( obj ) {
				loader.load('./modellen/bladerKop/bladerKop.obj', function (obj) {

					object = obj;

				}, onProgress, onError);

				//  renderer = new THREE.WebGLRenderer();
				renderer = new THREE.WebGLRenderer({ alpha: true }); // init like this
				renderer.setClearColor(0xffffff, 0); // second param is opacity, 0 => transparent     
				renderer.setPixelRatio(window.devicePixelRatio);
				renderer.setSize(window.innerWidth, window.innerHeight);
				container.appendChild(renderer.domElement);

				window.addEventListener('resize', onWindowResize);
				animate();

			}   // einde init

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize(window.innerWidth, window.innerHeight);

			}
			//

			function animate() {
				requestAnimationFrame(animate);
				render();
			}

			let r = +1;
			function render() {
				camera.lookAt(scene.position);

				if (object != null) {
					if (object.rotation.y > 0.5)
						r = -1;
					if (object.rotation.y < -0.5)
						r = +1;

					object.rotation.y += 0.005 * r;
				}

				renderer.render(scene, camera);
			}

		</script>

	</body>

</html>
