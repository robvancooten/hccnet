<!DOCTYPE html>
<html lang="en">

    <head>
        <title>point lights</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
        <!-- <meta http-equiv="refresh" content="5">    -->
        <link type="text/css" rel="stylesheet" href="css/main.css">
        <link type="text/css" rel="stylesheet" href="css/menu.css">
        <style>
            body {
                /*  cursor:none;    */
                cursor: url(./images/biglips.cur), auto;
            }
        </style>
    </head>

    <body>

        <div id="menu">

        </div>

        <!-- Import maps polyfill -->
        <!-- Remove this when import maps will be widely supported -->
        <script async src="./build/es-module-shims.js"></script>

        <script defer src="./my_js/menu_tekst.js"></script>

        <script type="importmap">
			{
				"imports": {
					"three": "./build/three.module.js"
				}
			}
		</script>

        <script type="module">

            import * as THREE from 'three';

            import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';
            import { OrbitControls } from './jsm/controls/OrbitControls.js';
            import { RGBELoader } from './jsm/loaders/RGBELoader.js';  // voor renderer            

            let camera, scene, renderer;
            let controls;   // touch mouse controls            
            const focus = 50;

            let z = 70;
            let mouseX = 0, mouseY = 0;
            let isTouching = false;
            let touchDevice = false;
            let move = true;
            //  var mousePositionX;


            let light = [], lightHolder;
            let pad = '';
            const model = 'geinVogelAni';

            let object, hoofd;
            let r = +1;
            let rotkop = +1;


            const clock = new THREE.Clock();

            init();
            animate();

            function init() {
                touchDevice = is_touch_enabled();

                camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 1000);
                camera.position.z = focus;

                let menu = document.getElementById("menu");
                if (touchDevice)
                    menu.innerHTML = leesMenuTekst() + "touch to rotate and tilt. ";
                else
                    menu.innerHTML = leesMenuTekst() + "Mousewheel to zoom. Click 2 freeze. ";

                kleurActiveLink();

                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x009999);


                maakBelichting();
                maakBolLampen();

                //model
                let loc = location.hostname;
				if (loc == "localhost")
					pad = "./modellen/glb/"
				else
					pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";

                laadMesh();

                // manager
                function laadMesh() {
                    // model
                    const loader = new GLTFLoader().setPath(pad);
                    loader.load(model + '.glb', function (gltf) {

                        gltf.scene.scale.set(1, 1, 1);
                        object = gltf.scene;
                        scene.add(object);

                        //   object.material.metalness = 0;
                        //   object.children[1].material.metalness = 0;


                        object.traverse((o) => {
                            if (o.isMesh) {
                                o.material.emissive = new THREE.Color(0x444444);
                                o.material.metalness = 0;  // 0..1 
                                o.roughness = 0;   // 0..1  zie niks
                                o.color = 0xff0000;  // werkt niet
                            }
                        });

                        console.log(dumpObject(object).join('\n'));
                    //     let kubus = object.getObjectByName('Cube');
                        hoofd = object.getObjectByName('kop');
                      //  alert(hoofd);
                        //  render();
                    }
                    );
                }

                //renderer
                myrenderer();

                window.addEventListener('resize', onWindowResize);
                document.addEventListener('mousemove', onDocumentMouseMove);

                window.addEventListener("mousedown", (e) => {
                    isTouching = true;
                    move = !move;
                    // alert("touch true"); 
                    mouseX = e.clientX - window.innerWidth / 2;
                    mouseY = e.clientY - window.innerHeight / 2;
                    //  alert("mouseY: "  + event.clientY ); 
                });

                window.addEventListener("mouseup", (e) => isTouching = false);
                startOrbitController();
            }

            function onWindowResize() {

                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);

            }

            function onDocumentMouseMove(event) {
                isTouching = true;
                // alert("touch true"); 
                //   mouseX = e.clientX;
                //   mouseY = e.clientY;
                if (!touchDevice && move) {
                    mouseX = (event.clientX - window.innerWidth / 2);
                    mouseY = (event.clientY - window.innerHeight / 2);
                }
                else {
                    //  mouseX = event.clientX;
                    //  mouseY = event.clientY;

                }

            }
            // let op: touchmove werkt soms, afhankelijk browser en device!
            function is_touch_enabled() {
                return ('ontouchstart' in window) ||
                    (navigator.maxTouchPoints > 0) ||
                    (navigator.msMaxTouchPoints > 0);
            }

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                lightHolder.quaternion.copy(camera.quaternion);
                render();
            }

            function render() {
                const time = Date.now() * 0.0005;
                camera.lookAt(scene.position);

                if (object != null) {
                    if (object.rotation.y > 0.5)
                        r = -1;
                    if (object.rotation.y < -0.5)
                        r = +1;

                    if (move)
                        object.rotation.y += 0.005 * r;


                    if (hoofd != null) {
                        if (hoofd.rotation.z < -0.1)
                            rotkop = -1;
                        if (hoofd.rotation.z > 0.1)
                            rotkop = +1;
                        if (!move)
                            hoofd.rotation.z -= 0.02 * rotkop;
                    }
                }

                let w = window.innerWidth;
                let h = window.innerHeight;
                //  console.log("w: " + w) ; 
                z = 50;

                light[0].position.x = Math.sin(time * 0.7) * 0.01 * w;
                light[0].position.y = Math.cos(time * 0.5) * 0.005 * h;
                light[0].position.z = z + Math.abs(Math.cos(time * 0.3) * 10);


                light[1].position.x = Math.cos(time * 0.3) * 0.015 * w;
                light[1].position.y = Math.sin(time * 0.5) * 0.005 * h;
                light[1].position.z = z + Math.abs(Math.sin(time * 0.7)) * 10;

                light[2].position.x = Math.sin(time * 0.7) * 0.015 * w;
                light[2].position.y = Math.cos(time * 0.3) * 0.005 * h;
                light[2].position.z = z + Math.abs(Math.sin(time * 0.5)) * 10;

                light[3].position.x = Math.sin(time * 0.3) * 0.01 * w;
                light[3].position.y = Math.cos(time * 0.7) * 0.005 * h;
                light[3].position.z = z + Math.abs(Math.sin(time * 0.5) * 10);

                if (touchDevice) {
                    z = 70;
                    light[4].position.x = mouseX / 10 * (focus - z) / focus;
                    light[4].position.y = - mouseY / 10 * (focus - z) / focus;
                    light[4].position.z = z;  // 130
                }
                else {
                    light[4].position.x = 1.4 * mouseX / 10 * (focus - z) / focus;
                    light[4].position.y = - 1.4 * mouseY / 10 * (focus - z) / focus;
                    light[4].position.z = z;  // 130
                }
                renderer.render(scene, camera);
            }  // einde render 

            function startOrbitController() {
                controls = new OrbitControls(camera, renderer.domElement);
                controls.addEventListener('change', render);
                controls.listenToKeyEvents(window);    // pijltjes toetsen.
                controls.enableDamping = true; // an animation loop is required when either damping or auto-rotation are enabled
                controls.dampingFactor = 0.05;

                controls.minPolarAngle = +Math.PI * 0.15;     // tilt. , x as.            
                controls.maxPolarAngle = Math.PI * 0.8;

                controls.minAzimuthAngle = -Math.PI * 0.25;      // rot y as.
                controls.maxAzimuthAngle = +Math.PI * 0.4;

                // controls.target.set(0, 10, 0);
                controls.minDistance = 10.0;
                controls.maxDistance = 400.0;

                //  controls.autoRotate = true;
                //  controls.autoRotateSpeed = 4;   // 2 is default. 

                controls.update();
            }   // einde startOrbitControls.

            function myrenderer() {
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 0.2;   // dit scheelt veel. 
                renderer.outputEncoding = THREE.sRGBEncoding;
                renderer.shadowMap.enabled = true;  // new
                renderer.colorManagement = true; // voor blender glb export . 
                document.body.appendChild(renderer.domElement);
            }

            function maakBelichting() {
                const ambientLight = new THREE.AmbientLight(0xffffff, 1.4);
                //   scene.add(ambientLight);

                const dirLight = new THREE.DirectionalLight(0xffffff, 5.8);
                dirLight.position.set(-200, -100, 150);
                scene.add(dirLight);
            }
            function maakBolLampen() {
                // bollampen : 
                // SphereGeometry(radius : Float, widthSegments : Integer, heightSegments :
                const sphere = new THREE.SphereGeometry(0.6, 16, 8);  // voor lights.  

                // PointLight( color : Integer, intensity : Float, distance : Number, decay : Float )
                let intensity = 1.5;
                let distance = 80;
                let decay = 2;
                light[0] = new THREE.PointLight(0xff0000, intensity, distance, decay);   // decay 2 lijkt physica.
                let mat = new THREE.MeshPhongMaterial({ color: 0xff0000, shininess: 200, reflectivity: 0.1 });
                light[0].add(new THREE.Mesh(sphere, mat));
                //  scene.add(light[0]);

                light[1] = new THREE.PointLight(0xff00ff, intensity, distance, decay);   // decay 2 lijkt physica.
                mat = new THREE.MeshPhongMaterial({ color: 0xff00ff, shininess: 200, reflectivity: 0.1 });
                light[1].add(new THREE.Mesh(sphere, mat));
                // scene.add(light[1]);

                light[2] = new THREE.PointLight(0x80ff80, intensity, distance, decay);   // decay 2 lijkt physica.
                mat = new THREE.MeshPhongMaterial({ color: 0x80ff80, shininess: 200, reflectivity: 0.1 });
                light[2].add(new THREE.Mesh(sphere, mat));
                // scene.add(light[2]);

                light[3] = new THREE.PointLight(0xffaa00, intensity, distance, decay);
                mat = new THREE.MeshPhongMaterial({ color: 0xffaa00, shininess: 200, reflectivity: 0.1 });
                light[3].add(new THREE.Mesh(sphere, mat));
                // scene.add(light[3]);

                light[4] = new THREE.PointLight(0x228B22, intensity, distance, decay);
                mat = new THREE.MeshPhongMaterial({ color: 0x228822, shininess: 200, reflectivity: 0.1 });
                const bol = new THREE.SphereGeometry(1.0, 16, 8);  // voor lights.  
                light[4].add(new THREE.Mesh(bol, mat));
                if (!touchDevice)
                    scene.add(light[4]);

                lightHolder = new THREE.Group();
                let aantal = 4;
                if (touchDevice)
                    aantal = 3;
                // alert(aantal);
                for (let k = 0; k < aantal; k++)
                    lightHolder.add(light[k]);

                scene.add(lightHolder);
                //  lightHolder.quaternion.copy(camera.quaternion); // in the animation loop


            }


            function dumpObject(obj, lines = [], isLast = true, prefix = '') {
                const localPrefix = isLast ? '└─' : '├─';
                lines.push(`${prefix}${prefix ? localPrefix : ''}${obj.name || '*no-name*'} [${obj.type}]`);
                const newPrefix = prefix + (isLast ? '  ' : '│ ');
                const lastNdx = obj.children.length - 1;
                obj.children.forEach((child, ndx) => {
                    const isLast = ndx === lastNdx;
                    dumpObject(child, lines, isLast, newPrefix);
                });
                return lines;
            }
        </script>
    </body>

</html>
