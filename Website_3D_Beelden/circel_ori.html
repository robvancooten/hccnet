<!DOCTYPE html>
<html lang="en">

<head>
    <title>Tekst in Circel</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <meta name="author" content=" Rob van Cooten. Waalre. ">
    <meta name="keywords" content="3D models, Threejs, Ceramics">
    <!--  https://sourceforge.net/projects/three-js.mirror/  -->
    <meta name="description" content="Showing all kinds of ways to show ceramics heads using ThreeJS.">
    <link type="text/css" rel="stylesheet" href="css/main.css">
    <link type="text/css" rel="stylesheet" href="css/menu.css" >
    <!-- 
https://threejs.org/examples/#webgl_modifier_curve 
-->
</head>

<body>
    <div id="menu">
        <p>Hier komt dynamisch het menu.</p>
    </div>

    <script type="importmap">
			{
				"imports": {
					"three": "./build/three.module.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>

    <script type="module">
        import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './my_js/menu_tekst.js';
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';
        import Stats from './jsm/libs/stats.module.js';
        import { Flow } from 'three/addons/modifiers/CurveModifier.js';
        import { FontLoader } from 'three/addons/loaders/FontLoader.js';
        import { TextGeometry } from 'three/addons/geometries/TextGeometry.js';

        import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from './jsm/controls/OrbitControls.js';

        const ACTION_SELECT = 1, ACTION_NONE = 0;
        const curveHandles = [];
        const mouse = new THREE.Vector2();

        let scene,
            camera,
            renderer,
            kop, clone,
            rayCaster,
            control,
            controls,  // orbitcontroller                 
            flow,
            curve,
            initialPoints,
            action = ACTION_NONE;


        init();

        function init() {
            maakMenu();
            maakScene();
            maakInitialPoints();

            for (const handlePos of initialPoints) {
                const bol = maakBol();
                bol.position.copy(handlePos);
                curveHandles.push(bol);
                scene.add(bol);
            }

            curve = new THREE.CatmullRomCurve3(
                curveHandles.map((handle) => handle.position)
            );
            curve.curveType = 'centripetal';
            curve.closed = true;

            const points = curve.getPoints(50);
            const line = new THREE.LineLoop(
                new THREE.BufferGeometry().setFromPoints(points),
                new THREE.LineBasicMaterial({ color: 0x00ff00 })
            );

            scene.add(line);

            //
            maakBelichting();
            maakTekst();
            laadModel();
            laadRenderer();

            renderer.domElement.addEventListener('pointerdown', onPointerDown);

            rayCaster = new THREE.Raycaster();
            control = new TransformControls(camera, renderer.domElement);
            control.addEventListener('dragging-changed', function (event) {

                if (!event.value) {

                    const points = curve.getPoints(50);
                    line.geometry.setFromPoints(points);
                    flow.updateCurve(0, curve);
                }
            });
            window.addEventListener('resize', onWindowResize);

            startOrbitController();
        }  // end init. 

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onPointerDown(event) {
            action = ACTION_SELECT;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = - (event.clientY / window.innerHeight) * 2 + 1;
        }

        function animate() {

            if (action === ACTION_SELECT) {
                // alert(); 
                rayCaster.setFromCamera(mouse, camera);
                action = ACTION_NONE;
                const intersects = rayCaster.intersectObjects(curveHandles, false);
                if (intersects.length) {
                    const target = intersects[0].object;
                    control.attach(target);
                    scene.add(control.getHelper());
                }
                else console.log("Mis, op de bol...");
            }

            if (flow) {
                flow.moveAlongCurve(-0.001);
            }
            render();
        }

        function render() {
            if (clone != null && kop != null) {
                clone.rotation.z += 0.01;
                kop.rotation.z += 0.01;
            }
            renderer.render(scene, camera);
        }

        function startOrbitController() {
            controls = new OrbitControls(camera, renderer.domElement);

            controls.addEventListener('change', render);
            //    controls.listenToKeyEvents(window);    // pijltjes toetsen.


            //	controls.enableDamping = true; // an animation loop is required when either damping or auto-rotation are enabled
            //		controls.dampingFactor = 0.05;

            controls.minPolarAngle = Math.PI * 0.35;     // tilt. , x as.            
            controls.maxPolarAngle = Math.PI * 0.35;         // Math.PI * 0.6;

            controls.minAzimuthAngle = -Math.PI * 0.25;      // rot y as.
            controls.maxAzimuthAngle = Math.PI * 0.25;    //  0.4

            controls.enableRotate = false;

            //controls.target.set(0, 10, 0);
            controls.minDistance = 1.0;
            controls.maxDistance = 400.0;
            controls.update();
        }
        function laadModel() {
            let pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";
            let model = pad + 'bladerKop.glb';
            //  console.log("model: " + model)
            const loader = new GLTFLoader();

            loader.load(model, function (gltf) {
                kop = gltf.scene.children[0];
                kop.position.y = 0;
                kop.position.z = 0;
                let s = 0.03;
                kop.scale.x = kop.scale.y = kop.scale.z = s;
                scene.add(kop);

                clone = kop.clone();
                clone.scale.x = s;
                // clone.rotateZ =  Math.PI ;   // werkt niet. 
                clone.rotation.z = Math.PI;

                clone.position.z = 0.03;
                scene.add(clone);
            },
                // called while loading is progressing
                function (xhr) {
                    ;
                    // 	console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                },
                // called when loading has errors
                function (error) {
                    console.log('O, 0 An error happened during loading');
                }
            );    // einde loader
        }   // einde laadModel 

        function maakBelichting() {
            const light1 = new THREE.DirectionalLight(0xffaa33, 5);
            light1.position.set(+ 10, 10, 10);
            scene.add(light1);

            const light2 = new THREE.DirectionalLight(0xffaa33, 5);
            light2.position.set(- 10, -10, -10);
            scene.add(light2);

            const lightambient = new THREE.AmbientLight(0x003973, 3);   // 3
            scene.add(lightambient);
        }
        function maakMenu() {
            let menu = document.getElementById("menu");
            if (isTouchDevice())
                menu.innerHTML = leesMenuTekst() + "Rotating text. Touch sphere with finger to move path.";
            else
                menu.innerHTML = leesMenuTekst() + "Rotating Text - PressMouseLeft to select sphere and move path.";

            kleurActiveLink();
        }
        function maakScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x003300);

            camera = new THREE.PerspectiveCamera(
                40,
                window.innerWidth / window.innerHeight,
                1,
                1000
            );
            camera.position.set(2, 2, 6);
            //  camera.position.z = 5;
            camera.lookAt(scene.position);
        }
        function maakTekst() {

            const loader = new FontLoader();
            loader.load('fonts/helvetiker_regular.typeface.json', function (font) {

                const textgeometry = new TextGeometry('Keramieke Beelden van Marjan.', {
                    font: font,
                    size: 0.2,
                    depth: 0.05,
                    curveSegments: 12,
                    bevelEnabled: true,
                    bevelThickness: 0.02,
                    bevelSize: 0.01,
                    bevelOffset: 0,
                    bevelSegments: 5,
                });

                textgeometry.rotateX(Math.PI);

                const textmaterial2 = new THREE.MeshStandardMaterial({
                    color: 0x99ffff
                });
                const textmaterial = new THREE.MeshPhongMaterial({
                    color: 0x228822,
                    shininess: 220,    //  standaard 30 
                    emissive: 0x002200,   // 'darkgreen'
                    specular: 0x00f500,
                    reflectivity: 1.0,   // doet niet veel
                });

                const objectToCurve = new THREE.Mesh(textgeometry, textmaterial);

                flow = new Flow(objectToCurve);
                flow.updateCurve(0, curve);
                scene.add(flow.object3D);
            });
        }
        function maakInitialPoints() {
            initialPoints = [
                { x: 1, y: 0, z: - 1 },
                { x: 1, y: 0, z: 1 },
                { x: - 1, y: 0, z: 1 },
                { x: - 1, y: 0, z: - 1 },
            ];
        }
        function laadRenderer() {
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setAnimationLoop(animate);
            document.body.appendChild(renderer.domElement);
        }
        function maakBol() {
            //  const boxGeometry = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            let radius = 0.2;
            const sphereGeometry = new THREE.SphereGeometry(radius, 16, 32);
            const sphereMaterial = new THREE.MeshPhongMaterial({
                color: 0x22a522,
                shininess: 200,    //  standaard 30 
                emissive: 0x224422,   // 'darkgreen'
                specular: 0x004400
            });
            return new THREE.Mesh(sphereGeometry, sphereMaterial);
        }                
    </script>
</body>

</html>
