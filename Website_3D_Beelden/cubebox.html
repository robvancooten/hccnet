<!DOCTYPE html>
<html lang="en">

<head>
    <!--   <meta http-equiv="refresh" content="5">   -->
    <title>Funny kubus.....</title>
    <meta charset="utf-8">
    <meta name="author" content=" Rob van Cooten. Waalre. ">
    <meta name="keywords" content="3D models, Threejs, Ceramics">
    <!--  https://sourceforge.net/projects/three-js.mirror/  -->
    <meta name="description" content="Showing all kinds of ways to show ceramics heads using ThreeJS.">
    <link rel="stylesheet" type="text/css" href="css/main.css">
    <link rel="stylesheet" type="text/css" href="css/menu.css">
    <link rel="shortcut icon" href="./images/ernie.ico">
    <style>
        body {
            cursor: url(./images/biglips.cur), auto;
            background-color: darkgray;
        }
    </style>
</head>

<body>
    <div id="menu">
        <!-- tekst dynamisch-->
    </div>
    <div id="container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "./build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './my_js/menu_tekst.js';
        import * as THREE from 'three';
        import { OrbitControls } from './jsm/controls/OrbitControls.js';

        import { FontLoader } from './jsm/loaders/FontLoader.js';
        import { TextGeometry } from './jsm/geometries/TextGeometry.js';
        import Stats from './jsm/libs/stats.module.js';

        var scene, camera, renderer;
        let controls;
        const stats = new Stats();
        let breedte = 64;  //512;
        let bol, box;
        let spotLight, spotLightHelper, lightHolder;
        let richting = +1;

        init();
        animate();

        function init() {
            maakMenu();
            maakScene()
            maakTekst();
            //    maakMist(); 
            function maakMist() {
                //  scene.fog = new THREE.FogExp2(0xefd1b5, 0.0001 * 0.25);     //  kleiner, meer fog.
                const color = 0xff0000;  // white
                const near = 10;
                const far = 3000;
                scene.fog = new THREE.Fog(color, near, far);
                //     scene.fog = new THREE.FogExp2(0xffff00, near, far);
            }

            maakBol();
            maakBox();
            maakWiredBox();
            maakBelichting();
            maakRenderer();

            window.addEventListener('resize', onWindowResize);
            window.addEventListener("pointerdown", pressingDown, false);
            function pressingDown(e) {
                richting = -richting;
            }
            //  onWindowResize() ;
            startOrbitControls();
        }   // einde init

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        function orbit() {
            if (controls.autoRotateSpeed > 10)
                richting = -1;
            if (controls.autoRotateSpeed < -10)
                richting = +1;

            controls.autoRotateSpeed += richting * 0.01;
            render();
        }
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            //  lightHolder.quaternion.copy(camera.quaternion);
            //     spotLightHelper.quaternion.copy(camera.quaternion);            
            spotLight.quaternion.copy(camera.quaternion);

            render();
        }


        function render() {
            stats.update();
            renderer.render(scene, camera);
            bol.rotation.y = bol.rotation.y - richting * 0.03;
            box.rotation.y = box.rotation.y + richting * 0.005;

            //    spotLightHelper.update();
        }

        function startOrbitControls() {
            controls = new OrbitControls(camera, renderer.domElement);
            controls.addEventListener('change', orbit);
            controls.listenToKeyEvents(window);    // pijltjes toetsen.

            controls.enableDamping = true; // an animation loop is required when either damping or auto-rotation are enabled
            controls.dampingFactor = 0.05;

            //   controls.minPolarAngle = - Math.PI / 1;     // tilt. , x as.            
            //   controls.maxPolarAngle = Math.PI / 1;
            // controls.lookVertical = true;
            // controls.minAzimuthAngle = -Math.PI;
            // controls.maxAzimuthAngle = Math.PI;
            // controls.target.set(0, 10, 0);

            controls.minDistance = breedte / 2;    // 500 
            controls.maxDistance = 1500;  // breedte * 0.2;   // 1500

            controls.autoRotate = false;
            controls.autoRotateSpeed = 4;   // 2 is default. 
            controls.update();
        }
        function maakBox() {
            let materialArray = [];
            let texture_ft = new THREE.TextureLoader().load('./images/koppen/kop1.jpg');
            let texture_bk = new THREE.TextureLoader().load('./images/koppen/kop2.jpg');
            let texture_up = new THREE.TextureLoader().load('./images/koppen/kop1.jpg');
            let texture_dn = new THREE.TextureLoader().load('./images/koppen/kop1.jpg');
            let texture_rt = new THREE.TextureLoader().load('./images/koppen/kop3.jpg');
            let texture_lf = new THREE.TextureLoader().load('./images/koppen/kop4.jpg');

            // MeshBasicMaterial, MeshLambertMaterial and MeshPhongMaterial.

            let keuze = 0;
            if (keuze == 0) {
                materialArray.push(new THREE.MeshPhongMaterial({ map: texture_ft }));
                materialArray.push(new THREE.MeshPhongMaterial({ map: texture_bk }));
                materialArray.push(new THREE.MeshPhongMaterial({ map: texture_up }));
                materialArray.push(new THREE.MeshPhongMaterial({ map: texture_dn }));
                materialArray.push(new THREE.MeshPhongMaterial({ map: texture_rt }));
                materialArray.push(new THREE.MeshPhongMaterial({ map: texture_lf }));
            }
            else if (keuze == 1) {
                materialArray.push(new THREE.MeshLambertMaterial({ map: texture_ft }));
                materialArray.push(new THREE.MeshLambertMaterial({ map: texture_bk }));
                materialArray.push(new THREE.MeshLambertMaterial({ map: texture_up }));
                materialArray.push(new THREE.MeshLambertMaterial({ map: texture_dn }));
                materialArray.push(new THREE.MeshLambertMaterial({ map: texture_rt }));
                materialArray.push(new THREE.MeshLambertMaterial({ map: texture_lf }));
            }
            else {
                materialArray.push(new THREE.MeshBasicMaterial({ map: texture_ft }));
                materialArray.push(new THREE.MeshBasicMaterial({ map: texture_bk }));
                materialArray.push(new THREE.MeshBasicMaterial({ map: texture_up }));
                materialArray.push(new THREE.MeshBasicMaterial({ map: texture_dn }));
                materialArray.push(new THREE.MeshBasicMaterial({ map: texture_rt }));
                materialArray.push(new THREE.MeshBasicMaterial({ map: texture_lf }));
            }

            for (let i = 0; i < 6; i++) {
                materialArray[i].side = THREE.DoubleSide;      // THREE.BackSide;
                //   materialArray[i].transparent = true;
                materialArray[i].opacity = 1.0;        //  0  transparent ; 0.7 
            }

            let boxGeo = new THREE.BoxGeometry(breedte, breedte, breedte);
            box = new THREE.Mesh(boxGeo, materialArray);
            scene.add(box);
            //   spotLight.target = box;


        }
        function maakBol() {
            // let mat = new THREE.MeshPhongMaterial({ color: 0xaaffaa, shininess: 20, reflectivity: 0.1 });
            const texture = new THREE.TextureLoader().load('images/blad.jpg');
            const mat2 = new THREE.MeshPhongMaterial({
                map: texture,
                color: 0xaaffaa,
                shininess: 1,
                side: THREE.FrontSide,
                emissive: 'darkgreen',    // red, green 
                specular: 0x00ff00,
                reflectivity: 0.1
            });

            const mat = new THREE.MeshPhongMaterial({ color: 0x00ff00, map: texture });
            /*************    Bump MAP    ***************/
            const bumpTexture = new THREE.TextureLoader().load('images/blad_bump.jpg');
            mat.bumpMap = bumpTexture;
            mat.bumpScale = 15.5;
            /************* Einde   Bump MAP    ***************/

            // SphereGeometry(radius : Float, widthSegments : Integer, heightSegments :
            let bolGeo;
            bolGeo = new THREE.SphereGeometry(15, 16, 8);  // voor lights.   
            bol = new THREE.Mesh(bolGeo, mat);
            bol.position.y = breedte;
            scene.add(bol);

        }
        function maakWiredBox() {
            let shift = 25;
            let boxGeo = new THREE.BoxGeometry(breedte + shift, breedte + shift, breedte + shift, 4, 4, 4);
            const material = new THREE.MeshLambertMaterial({ color: 0x00ff00, wireframe: true, opacity: 0.1 });
            // .opacity : Float
            // Float in the range of 0.0 - 1.0 indicating how transparent the material is. A value of 0.0 indicates fully transparent, 1.0 is fully opaque.

            let wiredBox = new THREE.Mesh(boxGeo, material);
            scene.add(wiredBox);
            //  wiredBox.position.x = 100 ;
            /*
             var geo = new THREE.EdgesGeometry(boxGeo); // or WireframeGeometry( geometry )
             var mat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 5 });
             var wireframe = new THREE.LineSegments(geo, mat);
             scene.add(wireframe);   */
        }

        function maakTekst() {
            const loader = new FontLoader();
            let font = undefined,
                fontName = 'optimer', // helvetiker, optimer, gentilis, droid sans, droid serif
                fontWeight = 'bold'; // normal bold

            loader.load('fonts/helvetiker_regular.typeface.json', function (font) {

                const textGeo = new TextGeometry('Hello...', {
                    font: font,
                    size: 8,
                    height: 5,
                    curveSegments: 12,
                    bevelEnabled: true,
                    bevelThickness: 1,  // 10
                    bevelSize: 0.8,    // 8
                    bevelOffset: 0,
                    bevelSegments: 1  // 5
                });

                textGeo.computeBoundingBox();
                const centerOffset = - 0.5 * (textGeo.boundingBox.max.x - textGeo.boundingBox.min.x);

                const materials = [
                    new THREE.MeshPhongMaterial({ color: 0x00aa00, flatShading: true }), // front
                    new THREE.MeshPhongMaterial({ color: 0x55aa55 }) // side
                ];

                let textMesh = new THREE.Mesh(textGeo, materials);
                textMesh.scale.z = 0.05;

                textMesh.position.x = centerOffset;
                //    textMesh.rotation.y = Math.PI * 2;

                scene.add(textMesh);
            });
        }
        function maakBelichting() {
            let intens = 1.5;
            const ambientLight = new THREE.AmbientLight(0xffffff, intens);  // 0.9 
            scene.add(ambientLight);

            // dir light: 
            intens = 2.5;
            const directionalLight = new THREE.DirectionalLight(0xffffff, intens);
            directionalLight.position.set(breedte * 1.5, -breedte * 1.5 * 0, breedte * 1.5);
            scene.add(directionalLight);

            // spotLight( color : Integer, intensity : Float, distance : Float, angle : Radians, penumbra : Float, decay : Float )
            let distance = 300;
            intens = 100;
            spotLight = new THREE.SpotLight(0x00ff00, intens, 1.5 * distance, Math.PI * 0.005);
            spotLight.position.set(-distance, 100, distance);
            spotLight.decay = 0;
            spotLight.distance = berekenAfstandSpotLightBol() + 10;
            spotLight.target = bol;

            scene.add(spotLight);

            spotLightHelper = new THREE.SpotLightHelper(spotLight, 0x00ff00, 100);
            scene.add(spotLightHelper);

            /*    lightHolder = new THREE.Group();
                lightHolder.add(spotLight);
                lightHolder.add(directionalLight);
                lightHolder.add(spotLightHelper);
                scene.add(lightHolder);    */
            // lightHolder.quaternion.copy(camera.quaternion); // in the animation loop

        }

        function maakRenderer() {
            // renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);
            if (location.hostname == "localhost") {
                document.body.appendChild(stats.dom);
                //  alert(stats.dom); 
                stats.dom.style.position = 'absolute';
                stats.dom.style.top = '100px';
                stats.dom.style.left = '10px';
            }
        }
        function maakScene() {
            //    container = document.createElement('div');
            //    document.body.appendChild(container);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 45, 3 * 1000);
            camera.position.z = 400;

            scene = new THREE.Scene();
            scene.add(new THREE.GridHelper(breedte, breedte, 0x00ff00, 0x00ff00));  // centrum lijnen en de rest. 
            scene.background = new THREE.Color(0x005500);
        }
        function maakMenu() {
            let menu = document.getElementById("menu");
            if (isTouchDevice())
                menu.innerHTML = leesMenuTekst() + "Use fingers to rotate or zoom to find the secret Message.";
            else
                menu.innerHTML = leesMenuTekst() + "Press mouse to rotate or Zoom with mousewheel to find secret Message.";

            kleurActiveLink();
        }

        function berekenAfstandSpotLightBol() {
            // console.log ("kopje.positiob: " + bol.position.x ) ; 
            let a = (bol.position.x - spotLight.position.x);
            let b = (bol.position.y - spotLight.position.y);
            let c = (bol.position.z - spotLight.position.z);
            let d = Math.sqrt(a * a + b * b + c * c);
            return d;
        }        
    </script>
</body>

</html>
