<!DOCTYPE html>
<html lang="en">

<head>
    <title>X-ray of Heads.</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <meta name="author" content=" Rob van Cooten. Waalre. ">
    <meta name="keywords" content="3D models, Threejs, Ceramics">
    <meta name="description" content="Showing all kinds of ways to show ceramics heads using ThreeJS.">
    <link type="text/css" rel="stylesheet" href="css/main.css">
    <link type="text/css" rel="stylesheet" href="css/menu.css">

    <style>
        .lil-gui {
            background-color: #060;                                 
        }

        /* werkt ook: 
        #gui {
            background-color:yellow;    
        }
        */

        #gui_container {
            position: absolute;
            margin: auto;
            /* ruimte er omheen, top left, bottom, right */
            margin-left: 5%;
            width: 100%;
            /*   background-color: red;  niet fijn  */          
             top: 20%;             
            /*  left : 50%;     */
           
        }
    </style>

</head>

<body>
    <div id="menu">
    </div>
    <div id="gui_container"></div>

    <script type="importmap">
			{
				"imports": {
					"three": "./build/three.module.js"
				}
			}
		</script>

    <script type="module">
        import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './my_js/menu_tekst.js';
        import * as THREE from 'three';
        import { OrbitControls } from './jsm/controls/OrbitControls.js';
        import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';

        import { VertexNormalsHelper } from './jsm/helpers/VertexNormalsHelper.js';
        import { VertexTangentsHelper } from './jsm/helpers/VertexTangentsHelper.js';

        import { FontLoader } from './jsm/loaders/FontLoader.js';
        import { TextGeometry } from './jsm/geometries/TextGeometry.js';
        import { GUI } from './jsm/libs/lil-gui.module.min.js';

        let scene, renderer, controls;
        let camera, container;
        let gui;

        let kop, group;
        let model;     // pad afhankelijk host.
        let pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";

        let d = 2;  // grootte kubus / vorm
        let vorm = 'Cube';

        let r = +1;
        let aantal;
        let nummer = 0;
        let verwijder = false;
        let tekenen = false;
        let textMesh;

        const clones = [];
        const clonesX = [];
        let boxGroep;

        init();
        animate();

        function init() {
            maakMenu();
            maakScene();
            maakBelichting();
            //   bepaalPad();
            laadKop();
            laadKopje();  // binnenste kop           
            //  toonVertices();  asynchroon. 
            maakGUI();

            maakRenderer();
            startOrbitController();
            window.addEventListener('resize', onWindowResize);

        }   // einde init. 

        function toonVertices() {
            // constructor: radius, widthSegments, heightSegments, phiStart, phiLength, thetaStart, thetaLength

            let teller = 0;
            let geometryBox;
            if (vorm == 'Cube')
                geometryBox = new THREE.BoxGeometry(d, d, d);
            else if (vorm == 'Sphere')
                geometryBox = new THREE.SphereGeometry(d / 2, 32, 16);
            else if (vorm == 'Torus')
                geometryBox = new THREE.TorusGeometry(d / 2, d / 4, 16, 100);
            else if (vorm == 'Plane')
                geometryBox = new THREE.PlaneGeometry(d, d);
            else if (vorm == 'Ring')
                geometryBox = new THREE.RingGeometry(d / 4, d / 2);
            else
                geometryBox = new THREE.TetrahedronGeometry(d, 0)



            let materialBox = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            // materialBox = new THREE.MeshLambertMaterial({ color: 0x00ff00 });                
            let boxje = new THREE.Mesh(geometryBox, materialBox);

            boxGroep = new THREE.Group;

            maakTekst("Kop tekenen via vormen uit vlak. \n Kies vorm om mee te vullen.", 0xffffff);

            if (kop.geometry instanceof THREE.BufferGeometry) {
                const positionAttribute = kop.geometry.getAttribute('position');
                const vertex = new THREE.Vector3();
                aantal = positionAttribute.count;
                // console.log("aantal vertices: " + aantal);

                for (let k = 0; k < aantal; k++) {
                    vertex.fromBufferAttribute(positionAttribute, k); // read vertex
                    // do something with vertex

                    if (k % 10 == 0) {   // reduceren aantal. 
                        //    console.log("vertix nummer: " + teller);
                        // let hexStr = (15728640 + k).toString(16);                           
                        let getal = Math.floor(5728640 / 37340);
                        let hexStr = (getal * k).toString(16);
                        hexStr = "0x" + hexStr;
                        //  console.log("kleur: " + hexStr);
                        boxje.material.color.setHex(hexStr);
                        // boxje.needsUpdate = true;


                        clones[teller] = boxje.clone();
                        clones[teller].material = clones[teller].material.clone(); // cloning the material

                        //  console.log("vertex.x: " + vertex.x ); 
                        let schaal = 5;
                        clones[teller].position.x = 100;
                        clonesX[teller] = vertex.x * schaal;
                        //   console.log( "positieX: " + clonesX[teller]  + " teller: " + teller ) ;
                        clones[teller].position.y = vertex.y * schaal - 20;
                        clones[teller].position.z = vertex.z * schaal;
                        clones[teller].material.color.setHex(hexStr);
                        //   scene.add(clones[teller]);
                        //   renderer.render(scene, camera);
                        boxGroep.add(clones[teller++]);
                    }   // einde if 
                }    // einde for
                boxGroep.position.y = 0;
                boxGroep.position.x = 0;
                scene.add(boxGroep);
                //   alert("k= " + k); 
                // scene.add(new THREE.BoxHelper(box));
            }   // einde if 
            tekenen = true;
            // alert("aantal cubes, teller: "  + teller); 
        }  // einde toonVertices. 

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            let rot = controls.getAzimuthalAngle();
            if (rot < controls.minAzimuthAngle + 0.01)
                r = -1
            else if (rot > controls.maxAzimuthAngle - 0.01)
                r = +1;

            controls.autoRotateSpeed = 2.4 * r;
            // lightHolder.quaternion.copy(camera.quaternion);   
            controls.update();

            if (kop != null)
                render();
        }

        function render() {
            if (kop != null)
                renderer.render(scene, camera);
            if (verwijder && nummer < clones.length)
                verwijderKop();

            if (tekenen && nummer < clones.length && kop != null)
                tekenKop();

        }  // einde render

        function verwijderKop() {
            let a = 5;
            for (let k = 0; k < a; k++) {
                if (nummer % 2 == 0)
                    clones[nummer++].position.x = +100;
                else
                    clones[nummer++].position.x = -100;
            }
            if (nummer > clones.length - a) {
                //    alert("klaar met kopie. Nummer is: " + nummer);
                verwijder = false;
                tekenen = true;
                nummer = 0;

                maakTekst("Kop tekenen via vormen uit vlakken.", 0xffffff);
                scene.background = new THREE.Color(0x003300);
                let gui = document.getElementById('gui');
                gui.style.backgroundColor = "#004400";
            }
        }  // einde verwijderKop. 

        function tekenKop() {
            let a = 5;
            for (let k = 0; k < a; k++) {
                clones[nummer].position.x = clonesX[nummer];
                nummer++;
            }

            // console.log("positieX: " + clonesX[nummer] + " , nummer: " + nummer);
            if (nummer > (clones.length - a)) {
                verwijder = true;
                tekenen = false;
                nummer = 0;

                maakTekst("Kop verplaatsen naar vlakken.", 0xFFFF00);
                scene.background = new THREE.Color(0x009000);   // 0x709070
                let gui = document.getElementById('gui');
                gui.style.backgroundColor = "#008000";
            }
        }   // einde tekenKop

        function startOrbitController() {
            controls = new OrbitControls(camera, renderer.domElement);
            controls.addEventListener('change', render);
            controls.listenToKeyEvents(window);    // pijltjes toetsen.
            //	controls.enableDamping = true; // an animation loop is required when either damping or auto-rotation are enabled
            //		controls.dampingFactor = 0.05;

            controls.minPolarAngle = Math.PI * 0.35;     // tilt. , x as.            
            controls.maxPolarAngle = Math.PI * 0.6;

            controls.minAzimuthAngle = -Math.PI * 0.1;      // rot y as.
            controls.maxAzimuthAngle = +Math.PI * 0.1;

            //controls.target.set(0, 10, 0);
            controls.minDistance = 50.0;
            controls.maxDistance = 2000.0;

            controls.autoRotate = true;
            controls.autoRotateSpeed = 23;   // 2 is default. 
            controls.update();
        }

        function maakTekst(tekst, kl) {
            let kleur = kl;
            if (textMesh != null)
                scene.remove(textMesh);

            const loader = new FontLoader();
            let font = undefined,
                fontName = 'optimer', // helvetiker, optimer, gentilis, droid sans, droid serif
                fontWeight = 'norman'; // normal bold

            loader.load('fonts/helvetiker_regular.typeface.json', function (font) {

                const textGeo = new TextGeometry(tekst, {
                    font: font,
                    size: 5,
                    height: 8,
                    curveSegments: 12,
                    bevelEnabled: false,  // false
                    bevelThickness: 1,  // 10
                    bevelSize: 0.8,    // 8
                    bevelOffset: 0,
                    bevelSegments: 1  // 5
                });

                textGeo.computeBoundingBox();
                const centerOffset = - 0.5 * (textGeo.boundingBox.max.x - textGeo.boundingBox.min.x);

                // kleur=0x777777; 
                const materials = [
                    new THREE.MeshBasicMaterial({ color: kleur }), // front
                    new THREE.MeshBasicMaterial({ color: 0x000000 }) // side
                ];

                textMesh = new THREE.Mesh(textGeo, materials);
                textMesh.scale.z = 0.05;

                textMesh.position.x = centerOffset;
                textMesh.position.y = -80;  // windowHalfY
                textMesh.rotation.y = Math.PI * 2;

                scene.add(textMesh);
            });
        }

        function maakGUI() {
            gui = new GUI({ autoPlace: false, title: 'Shape' });  // evt width: 150 
            gui.domElement.id = 'gui';
            let gui_container = document.getElementById('gui_container');
            gui_container.appendChild(gui.domElement);

            let obj = { shape: 'Cube', size: 2 }


            gui.add(obj, 'shape', ['Cube', 'Sphere', 'Torus', 'Tetra', 'Plane', 'Ring']).onChange
                (function () {
                    //   alert(obj.shape);
                    vorm = obj.shape;
                    wisBoxjes();
                });

            gui.add(obj, 'size', { Small: 1, Normal: 2, Big: 10 }).onChange
                (function () {
                    d = obj.size;
                    //   alert(obj.size);
                    //  verwijder = true ; 
                    wisBoxjes();
                });
        }   // einde maakGUI 

        function laadKopje() {
            let model = pad + 'bladerKopV.glb';
            //    model = 'modellen/glb/geinVogel1.glb';
            const loader2 = new GLTFLoader();
            loader2.load(model, function (gltf) {
                let kopje = gltf.scene.children[0];
                scene.add(kopje);

                let material = new THREE.MeshPhongMaterial({ color: 0x00a300 });
                kopje.material = material;
                //   kop.opacity = 1.0;     

                kopje.position.y = -10;
                kopje.position.x = 0;
                kopje.scale.set(3, 3, 3);

            });    // einde loader

        }   // einde laadKopje

        function laadKop() {

            let model = pad + 'bladerKopV.glb';
            //   model = pad + 'geinVogel1.glb';
            const loader = new GLTFLoader();
            loader.load(model, function (gltf) {
                kop = gltf.scene.children[0];
                // scene.add(kop); 
                kop.geometry.computeTangents();
                kop.scale.multiplyScalar(5);  // 50 
                kop.updateMatrixWorld(true);

                /* 
                let material = new THREE.kopPhongMaterial({ color: 0x00ff00 });
                kop.material = material;
                kop.color = 0xff0000;
                kop.material.color.setHex(0xaaaaaa);
                kop.opacity = 0.5;     */

                // scene.add(kop); 
                kop.position.y = 0;
                group = new THREE.Group();
                group.scale.multiplyScalar(8);  // 50 
                scene.add(group);

                // To make sure that the matrixWorld is up to date for the boxhelpers
                group.updateMatrixWorld(true);
                //  group.add(kop);
                //  scene.add(new THREE.BoxHelper(kop));   // box om middelste kop. 
                toonVertices();
            });    // einde loader                
        }
        function wisBoxjes() {

            scene.remove(boxGroep);
            let l = clones.length;
            for (let k = 0; k < l; k++) {
                /*    clones[k].geometry.dispose();
                    clones[k].material.dispose();
                   clones[k] = null;   
                    clones[k].position.x = 1000 ; 
                 */
            }
            toonVertices();
        }

        function maakMenu() {

            let menu = document.getElementById("menu");
            if (isTouchDevice())
                menu.innerHTML = leesMenuTekst() + "Drawing an Head, build from 3735 'Cubes'. Use fingers to rotate.";
            else
                menu.innerHTML = leesMenuTekst() + "Drawing an Head, build from 3735 'Cubes'. Use mouse to rotate. Wheel to zoom.";

            kleurActiveLink();
        }

        function maakRenderer() {
            renderer = new THREE.WebGLRenderer();
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);  // updateStyle : boolean 
            container.appendChild(renderer.domElement);
        }

        function maakScene() {
            container = document.createElement('div');
            document.body.appendChild(container);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 10, 3000);
            camera.position.z = 200;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            scene.background = new THREE.Color(0x003300);
        }

        function maakBelichting() {
            // belichten heeft geen zin, basicMaterial.
            const ambientLight = new THREE.AmbientLight(0xcccccc, 0.4);
            scene.add(ambientLight);   // voor kop!

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);  // voor pointlight leuk belichten.
            directionalLight.position.set(-150, 150, 150);
            scene.add(directionalLight);
        }

        function bepaalPad() {
            let x = location.hostname;
            if (x == "localhost")
                pad = "./modellen/glb/"
            else
                pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";
            //    pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";    
        }
    </script>
</body>

</html>
