<!DOCTYPE html>
<html lang="en">

<head>
    <title>three.js - mirror</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <!-- 	<link type="text/css" rel="stylesheet" href="example.css">   -->
    <link type="text/css" rel="stylesheet" href="css/main.css">
    <link type="text/css" rel="stylesheet" href="css/menu.css">
</head>

<body>
    <div id="menu">
        <p>Hier komt dynamisch het menu.</p>
    </div>

    <script type="importmap">
			{
				"imports": {
					"three": "./build/three.webgpu.js",
					"three/webgpu": "./build/three.webgpu.js",
					"three/tsl": "./build/three.tsl.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>

    <script type="module">

        import * as THREE from 'three/webgpu';
        import { reflector, uv, texture, color } from 'three/tsl';
        import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { Inspector } from 'three/addons/inspector/Inspector.js';
        import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './my_js/menu_tekst.js';

        let camera, scene, renderer;
        let menu, container;

        let cameraControls;

        let sphereGroup;
        let kop, clone, groep;
        let breedte = 100.1;
        let richting=1; 

        init();

        function init() {
            maakMenu();
            maakScene();
            // maakVormen(); 
            maakKubus();
            laadModel();

            maakBelichting();
            maakRenderer();
            startOrbitController();

            window.addEventListener('resize', onWindowResize);

 			document.body.addEventListener("pointerdown", beweegReverse, false);
            function beweegReverse() {
                richting = -1*richting ;
              //  alert(); 
            }            
        }   // einde init

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {

            const timer = Date.now() * 0.01;

            if (kop != null && clone != null)
                groep.rotation.y += 0.02 * richting;

            renderer.render(scene, camera);
        }

        function startOrbitController() {
            // controls
            cameraControls = new OrbitControls(camera, renderer.domElement);
            cameraControls.target.set(0, 40, 0);
            cameraControls.maxDistance = 400;
            cameraControls.minDistance = 10;
            cameraControls.update();
        }
        function maakRenderer() {
            // renderer
            renderer = new THREE.WebGPURenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setAnimationLoop(animate);
            if (location.hostname == "localhost"){
                   renderer.inspector = new Inspector();
            }

            document.body.appendChild(renderer.domElement);
            
        //    let profiler = document.getElementById("profiler-shell") ;
        //         alert("profiler: "  + profiler) ; 
        }
        function maakScene() {
            // scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x003300);

            // camera
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 500);
            camera.position.set(0, 75, 160);
        }
        function maakBelichting() {
            // lights
            // new THREE.PointLight(color, intensity, range 0 no limit, decay 0 no decay ); 
            let intensiteit = 0.7 ;  // 0.5
            // const mainLight = new THREE.PointLight(0xe7e7e7, 5 * intensiteit, 250, 0);
            const mainLight = new THREE.PointLight(0xe7e7e7, 5 * intensiteit, 2*breedte, 0);            
            mainLight.position.y = 60;
            scene.add(mainLight);

            //  const greenLight = new THREE.PointLight(0x00ff00, intensiteit, 1000, 0);
            const greenLight = new THREE.PointLight(0xff0033, intensiteit, 1000, 0);
            greenLight.position.set(550, 50, 0);
            //   scene.add(greenLight);
            
            // const redLight = new THREE.PointLight(0xff0000, 0.5, 1000, 0);
            const redLight = new THREE.PointLight(0x00ff00, intensiteit, 1000, 0);
            redLight.position.set(- 550, 50, 0);
            //   scene.add(redLight);

            // const blueLight = new THREE.PointLight(0xbbbbfe, 0.5, 1000, 0);
            const blueLight = new THREE.PointLight(0xbbfebb, intensiteit, 1000, 0);
            blueLight.position.set(0, 50, 550);
            //    scene.add(blueLight);
        }

        function maakVormen() {
            let geometry, material;
            //

            sphereGroup = new THREE.Object3D();
            //   scene.add(sphereGroup);

            geometry = new THREE.CylinderGeometry(0.1, 15 * Math.cos(Math.PI / 180 * 30), 0.1, 24, 1);
            material = new THREE.MeshPhongMaterial({ color: 0xffffff, emissive: 0x8d8d8d });
            const sphereCap = new THREE.Mesh(geometry, material);
            sphereCap.position.y = - 15 * Math.sin(Math.PI / 180 * 30) - 0.05;
            sphereCap.rotateX(- Math.PI);

            geometry = new THREE.SphereGeometry(15, 24, 24, Math.PI / 2, Math.PI * 2, 0, Math.PI / 180 * 120);
            const halfSphere = new THREE.Mesh(geometry, material);
            halfSphere.add(sphereCap);
            halfSphere.rotateX(- Math.PI / 180 * 135);
            halfSphere.rotateZ(- Math.PI / 180 * 20);
            halfSphere.position.y = 7.5 + 15 * Math.sin(Math.PI / 180 * 30);

            //    sphereGroup.add(halfSphere);
        }

        function maakKubus() {
            // textures

            const textureLoader = new THREE.TextureLoader();

            const floorNormal = textureLoader.load('./images/FloorsCheckerboard_S_Normal.jpg');
            floorNormal.wrapS = THREE.RepeatWrapping;
            floorNormal.wrapT = THREE.RepeatWrapping;

            //    const decalDiffuse = textureLoader.load('textures/decal/decal-diffuse.png');
            // const decalDiffuse = textureLoader.load('./images/kop_diffuse.png');
            const decalDiffuse = textureLoader.load('./images/kop_diffuse_bw.png');
            decalDiffuse.colorSpace = THREE.SRGBColorSpace;

            //    const decalNormal = textureLoader.load('textures/decal/decal-normal.jpg');
            const decalNormal = textureLoader.load('./images/kop_normal.jpg');

            // reflectors / mirrors

            const groundReflector = reflector().toInspector('Ground Reflector');
            const verticalReflector = reflector().toInspector('Vertical Reflector');

            const groundNormalScale = - 0.08;
            const verticalNormalScale = 0.1;

            const groundUVOffset = texture(decalNormal).xy.mul(2).sub(1).mul(groundNormalScale);
            const verticalUVOffset = texture(floorNormal, uv().mul(5)).xy.mul(2).sub(1).mul(verticalNormalScale);

            groundReflector.uvNode = groundReflector.uvNode.add(groundUVOffset);
            verticalReflector.uvNode = verticalReflector.uvNode.add(verticalUVOffset);

            const groundNode = texture(decalDiffuse).a.mix(color(0xffffff), groundReflector);
            const verticalNode = color(0x0000ff).mul(.1).add(verticalReflector);

            // walls

            const planeGeo = new THREE.PlaneGeometry(breedte, breedte);
            const boxGeo = new THREE.BoxGeometry(breedte, breedte, 5 ) ; 
            //
            const planeBottom = new THREE.Mesh(boxGeo, new THREE.MeshPhongNodeMaterial({
                colorNode: groundNode
            }));
            planeBottom.rotateX(- Math.PI / 2);
            planeBottom.add(groundReflector.target);
            scene.add(planeBottom);

            const planeBack = new THREE.Mesh(planeGeo, new THREE.MeshPhongNodeMaterial({
                colorNode: verticalNode
            }));
            planeBack.position.z = - 50;
            planeBack.position.y = 50;
            planeBack.add(verticalReflector.target);
            scene.add(planeBack);

            //
            // const planeTop = new THREE.Mesh(planeGeo, new THREE.MeshPhongMaterial({ color: 0xffffff }));
            const planeTop = new THREE.Mesh(planeGeo, new THREE.MeshPhongMaterial({ color: 0x33aa33 }));
            planeTop.position.y = 100;
            planeTop.rotateX(Math.PI / 2);
            scene.add(planeTop);

            //   const planeFront = new THREE.Mesh(planeGeo, new THREE.MeshPhongMaterial({ color: 0x7f7fff }));
            const planeFront = new THREE.Mesh(planeGeo, new THREE.MeshPhongMaterial({ color: 0x33aa33 }));
            planeFront.position.z = 50;
            planeFront.position.y = 50;
            planeFront.rotateY(Math.PI);
            scene.add(planeFront);
            // const planeRight = new THREE.Mesh(planeGeo, new THREE.MeshPhongMaterial({ color: 0x00ff00 }));
            const planeRight = new THREE.Mesh(planeGeo, new THREE.MeshPhongMaterial({ color: 0x33aa33 }));
            planeRight.position.x = 50;
            planeRight.position.y = 50;
            planeRight.rotateY(- Math.PI / 2);
            scene.add(planeRight);

            // const planeLeft = new THREE.Mesh(planeGeo, new THREE.MeshPhongMaterial({ color: 0xff0000 }));
            const planeLeft = new THREE.Mesh(planeGeo, new THREE.MeshPhongMaterial({ color: 0x33ff33 }));
            planeLeft.position.x = - 50;
            planeLeft.position.y = 50;
            planeLeft.rotateY(Math.PI / 2);
            scene.add(planeLeft);
        }

        function laadModel() {
            let pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";
            let model = pad + 'bladerKop.glb';
            // console.log("model: " + model)
            const loader = new GLTFLoader();

            loader.load(model, function (gltf) {
                kop = gltf.scene.children[0];
                kop.position.y = 3;
                kop.position.z = 0;
                let s = 1;
                kop.scale.x = kop.scale.y = kop.scale.z = s;
                scene.add(kop);

                clone = kop.clone();
                clone.scale.x = s;
                clone.rotation.z = Math.PI;

                clone.position.z = 0.03;
                groep = new THREE.Group();
                groep.add(clone);
                groep.add(kop);
                groep.position.y = + 20;
                //   scene.add(kop);
                scene.add(groep);
            },
                // called while loading is progressing
                function (xhr) {
                    ;
                    // 	console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                },
                // called when loading has errors
                function (error) {
                    console.log('O, 0 An error happened during loading');
                    if (location.hostname == "localhost")
                        alert('O, 0 An error happened during loading');
                }
            );    // einde loader
        }   // einde laadModel  

        function maakMenu() {
            let menu = document.getElementById("menu");
            if (isTouchDevice())
                menu.innerHTML = leesMenuTekst() + "Pinch to Zoom In/Out.";
            else
                menu.innerHTML = leesMenuTekst() + "Press Mouse Left to  rotate. Mouse Wheel to zoom In/Out.";

            kleurActiveLink();
            /*
                container = document.createElement('div');
               container.setAttribute("id", "menu");
               document.body.appendChild(container);
            */
        }        
    </script>
</body>

</html>
