<!DOCTYPE html>
<html lang="en">

<head>
    <title>Exposition of Ceramic Heads.</title>
    <meta charset="utf-8">
    <meta name="author" content=" Rob van Cooten. Waalre. ">
    <meta name="keywords" content="3D models, Threejs, Ceramics">
    <!--  https://sourceforge.net/projects/three-js.mirror/  -->
    <meta name="description" content="Showing ceramics heads using ThreeJS.">
    <link href="css/main.css" type="text/css" rel="stylesheet">
    <link href="css/menu.css" rel="stylesheet" type="text/css">
    <link href="css/fps.css" rel="stylesheet" type="text/css">
    <link rel="icon" type="image/x-icon" href="./images/ernie.ico">

    <script src="./build/jquery.js"></script>
</head>

<body>

    <div id="menu">
        Hier komt menu.
    </div>
    <div id="reset" title="Reset camera positie." class="unselectable">
        <p>reset. </p>
    </div>
    <footer>
        <span id="translate">
            <span>move x</span>
            <img src="images/pijlPrev.jpg" id="links" alt="move to the left" title="move to the left"
                class="unselectable">
            <img src="images/pijlNext.jpg" id="rechts" alt="move naar Rechts" title="move to the right"
                class="unselectable">
            <span>move z</span>
            <img src="images/pijlUp.jpg" id="up" alt="up" title="to the back" class="unselectable">
            <img src="images/pijlDown.jpg" id="down" alt="naar Voren" title="to the front" class="unselectable">
        </span>

        <span id="tekst1"> &nbsp; &nbsp; &nbsp; prev:</span>
        <img src="./images/playback.png" id="showprevious" title="show previous" alt="show previous"
            class="unselectable">
        <span id="tekst2"> next:</span>
        <img src="./images/play.png" id="shownext" title="show next" alt="show next" class="unselectable">
        <span id="tekst3">...</span>
    </footer>

    <script type="importmap">
			{
				"imports": {
					"three": "./build/three.module.js"
				}
			}
		</script>

    <script type="module">
        import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './my_js/menu_tekst.js';
        import * as THREE from 'three';
        import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';
        import { OrbitControls } from './jsm/controls/OrbitControls.js';
        import { leesModellen, modellen } from './my_js/all_modellen.js';
        import { maakCorrectieArray, correctieArray } from './my_js/correctieArrayforFPS.js';        
        

        let container, menu;

        let camera, scene, renderer;
        let controls;   // touch mouse controls
        let breedte = 550    // 550;

        let windowHalfX = window.innerWidth / 2;
        let windowHalfY = window.innerHeight / 2;

        let ballon, luchtballon, kamer;
        let kop;
        const koppen = [];  // standaard null   
        // let correctieArray = [];   extern 
        let nummer = 0;
        let volgende = -1;
        let pad;
        let max;
        let object;
        let paal = [];
        let paalHoogte, paalDikte;
        const aantalKolommen = 5;

        // const pad = "./modellen/";

        let textures = [], kleuren = [];
        let pointLights = [], spotLight, spotLightHelper;
        let shiftY = 100, shiftZ = 100;   // afstand paal pointlight. 
        let move = true;
        let positie = 0;
        let teller = -1;

        const cameraZ = 1700;
        const cameraY = -45;
        let lightHolder;

        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;
        let naarLinks = false; let naarRechts = false;
        let naarAchter = false; let naarVoren = false;
        let stopvolgende = true;


        init();

        function init() {
            maakMenu();
            leesModellen();
            max = modellen.length;

            maakNavigator();
            maakScene();

            maakBelichting();
            maakKamer();
            maakPalen();
            positioneerPointLights();

            maakCorrectieArray();
            laadModel();
            maakRenderer();

            window.addEventListener('resize', onWindowResize);
            startOrbitController();
            animate();
        }   // einde init

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (koppen[nummer] != null) {  // als er 1 is geladen: 
                if (nummer < max - 1) {
                    nummer++;
                    //   console.log("nummer kop: " + nummer);
                    laadModel();  // laadt de volgende
                }
            }
            //  controls.update();
            //   lightHolder.quaternion.copy(camera.quaternion);
            render();
        }

        function render() {
            let richting = 1;
            if (stopvolgende == false) {
                // alert(volgende); 
                // console.log("volgende: " + volgende); 
                if ((camera.position.x - paal[volgende].position.x) > 1.5)
                    richting = -1;
                else if ((camera.position.x - paal[volgende].position.x) < -1.5)
                    richting = + 1;
                else {
                    // alert("STOP") ; 
                    stopvolgende = true;
                }
                camera.position.x = camera.position.x + richting * 1.1;  //  Math.abs( paal[volgende].position.x ) * 0.005;
                //    console.log("richting: " + richting);

                camera.position.y = cameraY;
                camera.position.z = paal[volgende].position.z + 30;  // shiftZ;

                //  console.log("paal[volgende].x: " + camera.position.x + " en paal: " + paal[volgende].position.x);
            }

            if (teller % 100 == 0 && koppen[max - 1] != null && move)
                scannenBeelden();

            teller++;

            let sp = 0.1;
            if (naarLinks)
                camera.position.x += sp;
            if (naarRechts)
                camera.position.x -= sp;

            if (naarAchter) {
                camera.position.z += sp;
            }
            if (naarVoren) {
                camera.position.z -= sp;
            }

            renderer.render(scene, camera);
        }


        /*****************   spotLight scan   *******************/
        function scannenBeelden() {
            //  console.log("positie: " + positie ) ;
            spotLight.target = paal[positie];

            let afstand = berekenAfstandSpotLightKop(positie) * 1.05; // 1.14 ;
            //    console.log("afstand: " + afstand ) ;
            spotLight.distance = afstand;
            spotLight.angle = 0.007 * Math.PI * breedte / afstand;  // 0.005
            spotLight.color.setHex(kleuren[positie % aantalKolommen]);
            // spotLight.color.setHex(0xffffff);   // voor debug.
            spotLightHelper.update();
            // console.log("position - afstand: " + positie + " - " + afstand) ;               
            positie++;
            positie = positie % (max - 1);
            //   console.log("nummer spotLight: " + positie);
        }   // einde scannenBeelden. 

        function kleurObject(kop) {
            kop.traverse((o) => {
                if (o.isMesh) {
                    //    o.material.emissive = new THREE.Color(0xff3333);  //  333333
                    o.material.metalness = 0.5;  // 0..1 , 0.5
                }
            });
        }

        function berekenAfstandSpotLightKop(pos) {
            let a = (paal[pos].position.x) - spotLight.position.x;
            let b = paal[pos].position.y + paalHoogte - spotLight.position.y;
            let c = paal[pos].position.z - spotLight.position.z;
            let d = Math.sqrt(a * a + b * b + c * c);

            return d;
        }


        function maakBelichting() {
            let intens = 0.3;   // 0.3
            const ambientLight = new THREE.AmbientLight(0xcccccc, intens);
            //    scene.add(ambientLight);

            // White directional light at half intensity shining from the top: 0,5 , default is 1. 
            intens = 1.5;
            const directionalLight = new THREE.DirectionalLight(0xffffff, intens);  // 1 voor pointlight leuk belichten.
            directionalLight.position.set(- breedte * 0.5, breedte * 0.5, breedte * 1);

            scene.add(directionalLight);

            const directionalLight2 = new THREE.DirectionalLight(0xffffff, intens);  // 1 voor pointlight leuk belichten.
            directionalLight2.position.set(- breedte * 0.5, breedte * 0, breedte * 1);

            scene.add(directionalLight2);

            let dirLightHelper = new THREE.DirectionalLightHelper(directionalLight);
            //   scene.add(dirLightHelper);            

            const color = 0xFFFFFF;
            let intensity = 1600;  // 20
            const angle = Math.PI * 0.015;

            // SpotLight( color : Integer, intensity : Float, distance : Float, angle : Radians, penumbra : Float, decay : Float )
            spotLight = new THREE.SpotLight(color, intensity, breedte, angle);
            spotLight.position.x = 0;
            spotLight.position.y = breedte * 2.5;   // 0.7
            spotLight.position.z = breedte * 1;  // 100

            // spotLight.position.set(breedte * 0.5, 0 * breedte * 0.5, 0 * breedte * 0.5);            
            spotLight.decay = 0;
            scene.add(spotLight);

            spotLightHelper = new THREE.SpotLightHelper(spotLight);
            scene.add(spotLightHelper);

            // kleuren voor standaards, pointlights en spotLight. 
            kleuren[0] = 0xcc00ff; // 0xff0000 ; //
            kleuren[1] = 0x3366ff;
            kleuren[2] = 0x87CEEB;
            kleuren[3] = 0xff00ff;
            kleuren[4] = 0x009900;
            kleuren[5] = 0xffffff;

            // SphereGeometry(radius : Float, widthSegments : Integer, heightSegments :
            const sphere = new THREE.SphereGeometry(3.3, 16, 8);  // voor lights.  
            // PointLight( color : Integer, intensity : Float, distance : Number, decay : Float ); 
            intensity = 17.0;
            for (let k = 0; k < aantalKolommen; k++) {
                pointLights[k] = new THREE.PointLight(kleuren[k], intensity, 100);  // 200 
                let mat = new THREE.MeshPhongMaterial({ color: kleuren[k], shininess: 200, reflectivity: 0.9 });
                pointLights[k].add(new THREE.Mesh(sphere, mat));   // ff0040
            }

            lightHolder = new THREE.Group();
            for (let k = 0; k < aantalKolommen; k++) {
                lightHolder.add(pointLights[k]);
            }
            lightHolder.position.y = + breedte * 0.25;
            //   lightHolder.position.x = +100 
            scene.add(lightHolder);
        }


        function laadModel() {
            let loc = location.hostname;
            if (loc == "localhost")
                pad = "./modellen/glb/"
            else
                pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";

            let model = pad + modellen[nummer] + '.glb';
            //    console.log("model: " + model) ; 
            //  alert("model: " + model);
            const loader = new GLTFLoader();

            loader.load(model, function (gltf) {
                //  console.log("nummer: " + nummer);
                kop = gltf.scene.children[0];
                //    koppen[nummer] = kop;
                kleurObject(kop);
                normeerKop(kop);
                centerPivot(kop);


                const group = new THREE.Group();
                group.add(kop);
                koppen[nummer] = group;
                scene.add(koppen[nummer]);
                //   scene.add(group);
                plaatsKopOpPaal();

                //  alert("nummer na laden: " + nummer)
            },
                function (xhr) {
                    let proc = + 100 * xhr.loaded / xhr.total;
                    proc = proc.toFixed(0) + "%";
                    if (proc == '118%' || proc == '100%') {
                        proc = '';
                    }

                },
                function (onLoad) {
                    //  alert("loaded"); 
                    // 	console.log('loaded');
                },
                // called when loading has errors
                function (error) {
                    //  if (loc == "localhost")
                    //      alert("o o an error while loading: " + nummer + " kop");
                    console.log('O, 0 An error happened during loading');
                }
            );    // einde loader
        }   // einde laadModel

        function maakKamer() {
            //	var material = new THREE.MeshBasicMaterial( {color: 0xcccccc} );
            let materialArray = [];
            let texture_ft = new THREE.TextureLoader().load('./images/skybox/wit.jpg');  // linkerkant 
            let texture_bk = new THREE.TextureLoader().load('./images/skybox/wit.jpg');  // rechterkant
            let texture_up = new THREE.TextureLoader().load('./images/skybox/zwart.jpg');
            let texture_dn = new THREE.TextureLoader().load('./images/schaakbord.jpg');
            let texture_rt = new THREE.TextureLoader().load('./images/skybox/woman1.jpg');  // achter
            let texture_lf = new THREE.TextureLoader().load('./images/skybox/woman1.jpg');

            // MeshBasicMaterial geen reflectie, MeshLambertMaterial and MeshPhongMaterial and MeshStandardMaterial.

            materialArray.push(new THREE.MeshStandardMaterial({ map: texture_ft }));
            materialArray.push(new THREE.MeshStandardMaterial({ map: texture_bk }));
            materialArray.push(new THREE.MeshBasicMaterial({ map: texture_up }));
            materialArray.push(new THREE.MeshPhongMaterial({ map: texture_dn }));
            materialArray.push(new THREE.MeshStandardMaterial({ map: texture_rt }));
            materialArray.push(new THREE.MeshPhongMaterial({ map: texture_lf }));


            for (let i = 0; i < 6; i++)
                materialArray[i].side = THREE.BackSide;  // BothSide;  // FrontSide ;  //  BackSide;

            let boxGeo = new THREE.BoxGeometry(breedte, breedte, breedte);
            kamer = new THREE.Mesh(boxGeo, materialArray);


            //  kamer = new THREE.Mesh(geometry, material);
            kamer.position.y = breedte * 0.3;
            //    kamer.rotation.x = -0.03;  // 0.4
            kamer.rotation.y = Math.PI / 1;
            scene.add(kamer);

        }
        /******************     maken palen    ************/
        function maakPalen() {
            let vakBreedte = 69;
            let rad = 16;  // 8
            let h = 60;
            let geo = new THREE.CylinderGeometry(rad, rad, h, 32, 1);  // radius i, radius o, height. 
            //    geo = new THREE.SphereGeometry(33, 16, 8);  // voor lights.              
            //    mat = new THREE.MeshBasicMaterial({ color: kleuren[k] });

            for (let k = 0; k < max + 1; k++) {
                let mat = new THREE.MeshPhongMaterial({ color: kleuren[k % aantalKolommen], reflectivity: 0.5 });
                //  mat = new THREE.MeshStandardMaterial({ color: kleuren[k % aantalKolommen], roughness: 0.2 });
                // roughness is, the shinier. Metalness is a difficult concept for me, but it does look more like metal as the value goes up.                                     
                paal[k] = new THREE.Mesh(geo, mat);

                paal[k].geometry.computeBoundingBox();
                let box = new THREE.Box3().setFromObject(paal[k]);
                paalHoogte = box.max.y - box.min.y;
                paalDikte = box.max.x - box.min.x;
                //  alert("paalHoogte" + paalHoogte);

                paal[k].position.x = -  vakBreedte * aantalKolommen / 2 + 0.5 * vakBreedte - paalDikte + (k % aantalKolommen) * vakBreedte;
                paal[k].position.y = -80;
                paal[k].position.z = + aantalKolommen / 2 * vakBreedte - vakBreedte * Math.floor(k / aantalKolommen);
                //    console.log("paal.z: " + paal[k].position.z  )
                scene.add(paal[k]);
            }
        }  // einde maakPalen.             

        function startOrbitController() {
            controls = new OrbitControls(camera, renderer.domElement);
            controls.addEventListener('change', render);
            controls.listenToKeyEvents(window);    // pijltjes toetsen.                

            controls.minPolarAngle = -Math.PI * 0.3;     // tilt. , x as.            
            controls.maxPolarAngle = Math.PI * 0.5;   // + meer zon. 

            controls.minAzimuthAngle = 0 // -Math.PI * 0.25;      // rot y as.
            controls.maxAzimuthAngle = 0 // Math.PI * 0.55;

            controls.target.set(0, 10, 0);
            controls.minDistance = 40.0;
            controls.maxDistance = breedte * 10;
            controls.update();
        }

        function plaatsKopOpPaal() {
            let deltaX = corrigeerPositieX(nummer);
            let deltaY = corrigeerPositieY(nummer);
            let deltaZ = corrigeerPositieZ(nummer);

            kop.position.x = paal[nummer].position.x + deltaX;   // + 300;
            kop.position.y = paal[nummer].position.y + paalHoogte * 0.5 + deltaY; // + is omhoog
            kop.position.z = paal[nummer].position.z + deltaZ;
        }

        function corrigeerPositieX(nr) {
            return correctieArray[nr].x;
        }

        function corrigeerPositieY(nr) {
            return correctieArray[nr].y;
        }
        function corrigeerPositieZ(nr) {
            return correctieArray[nr].z;
        }

        function pivot() {
            /*
            let box = new THREE.Box3().setFromObject(koppen[0]);
            let sizeX = box.getSize().x;
            let sizeY = box.getSize().y;
            let sizeZ = box.getSize().z;      */
        }
        function normeerKop(kop) {
            let hoogte = berekenHoogte(kop);
            let scaleFactor = 17 / hoogte;
            // hoogte = Math.round(hoogte);
            // alert("hoogte: " + hoogte);
            kop.scale.multiplyScalar(scaleFactor);  // 50    
        }
        
        function berekenHoogte(kop) {
            let box3 = new THREE.Box3().setFromObject(kop);
            let size = new THREE.Vector3();
            box3.getSize(size);
            //   console.log("size: " + size.y);
            return size.y;
        }

        function centerPivot(kop) {
            let box3 = new THREE.Box3().setFromObject(kop);
            const low = box3.min;
            const high = box3.max;
            const corner1 = new THREE.Vector3(low.x, low.y, low.z);
            const corner8 = new THREE.Vector3(high.x, high.y, high.z);
            const transform = new THREE.Vector3(0, 0, 0,);
            //    transform = ( corner1 - corner8 ) / 2;                     

            kop.position.x = kop.position.x - (high.x + low.x) / 2;
            //    kop.position.y = kop.position.y - (high.y + low.y) / 2;
            kop.position.y = kop.position.y - 10;  //  low.y;        
            kop.position.z = kop.position.z - (high.z + low.z) / 2;
            //   console.log("transform.x: "  +  (high.x  + low.x)/2 ); 
        }

 
        function showTranslateHTML() {
            let element = document.getElementById("translate");
            let hidden = element.getAttribute("hidden");

            if (hidden)
                element.removeAttribute("hidden")
            //    else
            //      element.setAttribute("hidden", "hidden");
        }

        function hideTranslate() {
            let element = document.getElementById("translate");
            let hidden = element.getAttribute("hidden");
            //   element.removeAttribute("hidden") ; 
            element.setAttribute("hidden", "hidden");
            //  alert("Hide: " + element) ;
            /* 
            if (hidden)
                element.removeAttribute("hidden")
            else
                element.setAttribute("hidden", "hidden");  */
        }

        function maakMenu() {
            menu = document.getElementById("menu");
            if (isTouchDevice())
                menu.innerHTML = leesMenuTekst() + "Exposition all heads. Use navigator to select model. Zoom or rotateX.";
            else
                menu.innerHTML = leesMenuTekst() + "Exposition all heads. Use navigator to select model. Zoom or rotateX.";

            kleurActiveLink();
        }

        function maakNavigator() {
            hideTranslate();

            const links = document.getElementById("links");
            links.addEventListener("pointerdown", beweegLinks, false);
            function beweegLinks() {
                naarLinks = true;
            }
            links.addEventListener("pointerup", releaseLinks, false);
            function releaseLinks() {
                naarLinks = false;
            }

            const rechts = document.getElementById("rechts");
            rechts.addEventListener("pointerdown", beweegRechts, false);
            function beweegRechts() {
                naarRechts = true;
            }
            rechts.addEventListener("pointerup", releaseRechts, false);
            function releaseRechts() {
                naarRechts = false;
            }

            const up = document.getElementById("up");
            up.addEventListener("pointerdown", beweegOmhoog, false);
            function beweegOmhoog() {
                naarAchter = true;
            }

            up.addEventListener("pointerup", releaseOmhoog, false);
            function releaseOmhoog() {
                naarAchter = false;
            }

            const down = document.getElementById("down");
            down.addEventListener("pointerdown", moveDown, false);
            function moveDown() {
                naarVoren = true;
            }
            down.addEventListener("pointerup", releaseDown, false);
            function releaseDown() {
                naarVoren = false;
            }
            /************************************************************************/
            const shownext = document.getElementById("shownext");
            shownext.addEventListener("pointerdown", pressingDownShowNext, false);
            function pressingDownShowNext() {
                //  alert("Kop:" + koppen[volgende] ); 
                volgende++;
                volgende = volgende % max;
                stopvolgende = false;
                showSpotlight();
            }

            const showprevious = document.getElementById("showprevious");
            showprevious.addEventListener("pointerdown", pressingDownShowPrev, false);
            function pressingDownShowPrev() {
                volgende--;
                if (volgende < 0)
                    volgende = max - 1;
                stopvolgende = false;
                showSpotlight();
            }
            /************************************************************************/

            function showSpotlight() {
                const tekst3 = document.getElementById("tekst3");
                tekst3.innerHTML = modellen[volgende] + ": " + volgende + "/" + max;

                let afstand = berekenAfstandSpotLightKop(positie) * 1.05; // 1.14 ;
                spotLight.distance = afstand;
                //    spotLight.color.setHex(kleuren[volgende % aantalKolommen]);
                spotLight.color.setHex(kleuren[5]);
                spotLight.target = koppen[volgende];
                spotLight.target = paal[volgende];
             //    spotLightHelper.update();
                if (move) {
                    resetCamera();
                    move = false;
                    controls.enabled = false;
                    showTranslateHTML();
                }
            }

            /*********************************************************************/
            const reset = document.getElementById("reset");
            reset.addEventListener("pointerdown", resetCamera, false);
            function resetCamera() {
                camera.position.x = 0;
                camera.position.y = cameraY;
                camera.position.z = cameraZ;
                controls.target.set(0, 10, 0);
                controls.update();
                controls.enabled = true;
                hideTranslate();
            }


        } // einde navigator    

        function maakScene() {
            container = document.createElement('div');
            document.body.appendChild(container);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10 * 1000);
            camera.position.z = cameraZ;   // 700 
            // scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.add(camera);
        }
        function maakRenderer() {
            renderer = new THREE.WebGLRenderer();
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);
        }
        function positioneerPointLights() {
            for (let k = 0; k < aantalKolommen; k++) {
                pointLights[k].position.x = paal[k].position.x;
                pointLights[k].position.y = paal[k].position.y + shiftY;
                pointLights[k].position.z = paal[k].position.z + shiftZ;
            }
        }                  
    </script>

</body>

</html>
