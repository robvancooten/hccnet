<!DOCTYPE html>
<html lang="en">

  <head>
    <title>Website of Rob van Cooten.</title>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 
      <meta http-equiv="refresh" content="10">
    -->
    <meta name="author" content=" Rob van Cooten. Waalre. ">
    <meta name="keywords" content="3D models, Threejs, Ceramics">
    <!--  https://sourceforge.net/projects/three-js.mirror/  -->
    <meta name="description" content="Showing all kinds of ways to show ceramics heads using ThreeJS.">

    <link href="css/my.css" rel="stylesheet" type="text/css">
    <link href="Website_3D_Beelden/css/menu.css" rel="stylesheet" type="text/css">

    <link rel="shortcut icon" href="./plaatjes/rob.ico">

    <!-- 
    <style>
      iframe::-webkit-scrollbar  {
        overflow-x: hidden;
      }
      iframe{
        overflow: hidden;
      }
    </style>
    -->

    <script src="./Website_3D_Beelden/build/jquery3.6.1.js"></script>
    <!-- <script src="https://code.jquery.com/jquery-latest.min.js"></script>  -->
  </head>

  <body>
    <div id="menu"> js vult dit in.... </div>
    <div id="bubbelinfo">
      <!-- js vult tekst dit -->
    </div>
    <br>
    <br><br>
    <br><br>
    <h3 id="tekst" title="Just fun."> Ceramic Heads made by Marjan. </h3>
    <br>

    <div id="spotlights">
      <span> Spelen met licht...
        <br>
      </span>
    </div>

    <!-- scrolling="no" is obsolete. Title werkt niet ook met: aria-hidden="true" niet-->
    <iframe id="virtueelKopje" alt="Ceramic Head." title="Vertices of a Head." src="./virtueelKopje.html"
      scrolling="no"></iframe>
    <iframe id="kopje" alt="Ceramic Head." title="Ceramic Head." src="./kopje.html" scrolling="no"></iframe>

    <!--    <div id="particles" type="text/html" data="particles/index.html">   -->
    <div id="particles">
      <!-- Hierin draait ./particles/index.html via jQuery.  -->
    </div>
    <div id="gordijnen">
      <img src="plaatjes/kopL.jpg" id="kopL" alt="Head on Left side." title="Head on Left side.">
      <img src="plaatjes/gordijn.jpg" id="gordijnL" alt="gordijnL">
      <img src="plaatjes/gordijn.jpg" id="gordijnR" alt="gordijnR">

      <img src="plaatjes/kopR.jpg" id="kopR" alt="Head on Right side." title="Head on Right side.">
    </div>

    <div id="gordijn_buttons">
      <input type="button" id="buttonL" value="open" title="Press to open curtains." class="unselectable">
      <!--   onclick="open_gordijn();"> -->
      <input type="button" id="buttonR" value="close" title="Press to close curtains." class="unselectable" disabled>
      <!-- onclick="close_gordijn();" disabled>    -->
    </div>
    <div id="ani"> </div>
    <div id="view"> <img src="plaatjes/view.png" title="grappig he..." alt="grappige oogjes"> </div>
    <div id="footer">
      <!-- via jquery disabled -->
      <!--  Chrome staat dit niet toe:   
        <a href="https://jigsaw.w3.org/css-validator/check/referer">
        </a>   -->
    </div>
    <!-- Voor script module:    -->
    <script async src="./Website_3D_Beelden/build/es-module-shims.js">
    </script>

    <script type="importmap">
			{
				"imports": {
					"three": "./Website_3D_Beelden/build/three.module.js"
				}
			}
		</script>

    <script type="module">
      import { leesMenuTekst } from './Website_3D_Beelden/my_js/menu_tekst.js';
      import { open_gordijn, close_gordijn } from './js/gordijn.js';
      import * as THREE from 'three';

      //  import { open_gordijn, close_gordijn } from './js/gordijn.js' ; 
      //  alert("hostname: " + location.hostname ); 

      let menu = document.getElementById("menu");
      menu.innerHTML = leesMenuTekst();
      let mess =  "<h1> &nbsp; &nbsp; &nbsp; &nbsp; HELLO localhost.</br>"; 
      mess += "&nbsp; &nbsp; &nbsp; &nbsp;  Threejs Versie: " + THREE.REVISION +"</h1>" ;
      let t = document.getElementById("footer"); 
      t.innerHTML = mess;


      $(document).ready(function () {
        let buttonL = document.getElementById("buttonL");
        let buttonR = document.getElementById("buttonR");
        buttonL.addEventListener("pointerdown", open_gordijn, false);
        buttonR.addEventListener("pointerdown", close_gordijn, false);

        close_gordijn();  // dan is close knop weg. 

        // alert("Document Ready");
        let tekst = 'Roterende beelden in 3D. Of  ' +
          '  ff spelen. <br>';
        let bubbelinfo = document.getElementById("bubbelinfo");
        bubbelinfo.innerHTML = tekst;

        $("#particles").load("particles/index.html");

        if (location.hostname != "localhost")
          document.getElementById("footer").style.display = "none";
      });
    </script>
  </body>

</html>
