<!DOCTYPE html>
<html lang="en">

<head>
    <!--   <meta http-equiv="refresh" content="5">   -->
    <title>Funny bol met koppen.....</title>
    <meta charset="UTF-8">
    <meta name="author" content=" Rob van Cooten. Waalre. ">
    <meta name="keywords" content="3D models, Threejs, Ceramics">
    <!--  https://sourceforge.net/projects/three-js.mirror/  -->
    <meta name="description" content="Showing all kinds of ways to show ceramics heads using ThreeJS.">

    <link type="text/css" rel="stylesheet" href="./Website_3D_Beelden/css/main.css">
    <link href="./Website_3D_Beelden/css/menu.css" rel="stylesheet" type="text/css">	

</head>

<body>
    <div id="menu">
        <!-- tekst dynamisch-->
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "./Website_3D_Beelden/build/three.module.js"
            }
        }
        </script>

    <script type="module">
        import { leesMenuTekst, isTouchDevice, kleurActiveLink } from './Website_3D_Beelden/my_js/menu_tekst.js';
        import * as THREE from 'three';
        //    import { TransformControls } from './Website_3D_Beelden/jsm/controls/TransformControls.js';
        import { OrbitControls } from './Website_3D_Beelden/jsm/controls/OrbitControls.js';
        import { GLTFLoader } from './Website_3D_Beelden/jsm/loaders/GLTFLoader.js';

        let scene, camera, renderer;
        let controls;
        //   let breedte = 32;  //512;
        const radius = 300; // straal vertices. 
        let lightHolder;
        let spotLight, pointLight;

        let kop;
        const clones = [];
        const groupBallen = new THREE.Group(); // groep ballen 
        let richting = 1;

        init();
        animate();

        function init() {
            maakMenu();
            maakScene();
            maakBelichting();
            maakRenderer()

            maakBallen();

            laadModel();

            startOrbitControls();

            window.addEventListener('resize', onWindowResize);

            document.getElementsByTagName("canvas")[0].addEventListener("pointerdown", pressingDown, false);

            function pressingDown(e) {
                let plusnul = 0.001;
                let minnul = -plusnul;

                //    alert("YES klik"); 
                if (richting == +1)
                    richting = plusnul
                else if (richting == plusnul)
                    richting = -1
                else if (richting == -1)
                    richting = minnul
                else richting = 1;

                controls.autoRotateSpeed = richting * 10;  // controls.autoRotateSpeed;
            }
        }   // einde init

        /******************************************************************************************/
        /******************************************************************************************/
        function maakBelichting() {
            const ambientLight = new THREE.AmbientLight(0xcccccc, 1.4);
            scene.add(ambientLight);   // voor kop!

            //   scene.add(directionalLight);
            // directionalLight.target = camera;
            //  scene.add( light.target );
            // directionalLight.position.copy(camera.position);

            const directionalLight = new THREE.DirectionalLight(0xaaffaa, 5.5);
            directionalLight.position.set(-radius * 15, radius * 15, radius * 1.5);
            scene.add(directionalLight);

            const lightbalGeo = new THREE.SphereGeometry(30.5, 16, 8);
            pointLight = new THREE.PointLight(0x228B22, 3, 1000);  // groen: 0x2E8B57
            pointLight.position.set(radius * 1.2, radius * 1.2, radius * 1.2);

            let mat = new THREE.MeshPhongMaterial({ color: 0x228B22, shininess: 200, reflectivity: 0.1 });
            pointLight.add(new THREE.Mesh(lightbalGeo, mat));   //  0x228B22
            scene.add(pointLight);
            pointLight.position.set(-radius, radius, radius);

            lightHolder = new THREE.Group();
            //   lightHolder.add(pointLight);
            lightHolder.add(directionalLight);
            scene.add(lightHolder);

            //  lightHolder.quaternion.copy(camera.quaternion); // in the animation loop, dan stilstaande lamp.

            maakSpotLight();
        }

        function maakSpotLight() {
            //   alert(); 
            let intens = 30;
            let spotLight = new THREE.SpotLight(0x00ff00, intens);
            spotLight.position.set(500, 1000, 1500);
            spotLight.distance = 2000;
            spotLight.angle = Math.PI * 0.02;
            //    spotLight.penumbra = 0;   // 0..1  breed naar smal.
            spotLight.decay = 0;

            //   scene.add(spotLight);
            lightHolder.add(spotLight);

            let lightHelper = new THREE.SpotLightHelper(spotLight);
            //   scene.add(lightHelper);
            lightHolder.add(lightHelper);
            scene.add(lightHolder);
        }
        function maakBol() {
            const geometry = new THREE.SphereGeometry(radius * 1.0, 16, 32);
            const texture = new THREE.TextureLoader().load('./Website_3D_Beelden/images/blad.jpg');
            const mat = new THREE.MeshPhongMaterial({
                map: texture,
                color: 0x228822,
                shininess: 150,
                side: THREE.DoubleSide,
                emissive: 0x001100,   // 'darkgreen'
                specular: 0x001500,
                //  receiveShadow : true    alleen lambert. 
                //  reflectivity: beta,
                //  shininess: specularShininess,
            });
            /*************    Bump MAP    ***************/
            const bumpTexture = new THREE.TextureLoader().load('./Website_3D_Beelden/images/blad_bump.jpg');
            mat.bumpMap = bumpTexture;
            mat.bumpScale = 10.0;
            /************* Einde   Bump MAP    ***************/

            // const material = new THREE.MeshBasicMaterial({ color: 0xcccccc });
            const sphere = new THREE.Mesh(geometry, mat);
            scene.add(sphere);
        }    // einde maakBol 

        function vulBol() {
            let phi, theta;
            phi = 0;
            theta = 0;
            let k = 0;
            let aantalKoppen = 10;

            for (let h = 0; h < aantalKoppen; h++) {
                for (let t = 0; t < aantalKoppen; t++) {
                    phi = Math.PI * (h / aantalKoppen) * 1.0;
                    theta = Math.PI * (t / aantalKoppen) * 2;

                    kop.position.setFromSphericalCoords(radius, phi, theta);

                    /* origineel WaveForm: 
                     kop.rotation.y = + theta;
                     kop.rotation.x = + phi - Math.PI / 2;   
                     */

                    kop.rotation.z = - theta;        // verticaal. 
                    kop.rotation.x = + phi; // // horizontaal.

                    clones[k] = kop.clone();
                    scene.add(clones[k]);
                    k++;
                }  // einde for loop.
            }    // einde for loop.
        }   // einde vulBol


        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();

            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            lightHolder.quaternion.copy(camera.quaternion);
            controls.update();
            //  render(); 
            requestAnimationFrame(animate);
        }


        function render() {
            renderer.render(scene, camera);
        }

        function startOrbitControls() {
            controls = new OrbitControls(camera, renderer.domElement);
            controls.addEventListener('change', render);

            controls.enableDamping = true; // an animation loop is required when either damping or auto-rotation are enabled
            controls.dampingFactor = 0.5;

            controls.minPolarAngle = Math.PI * 0.35;     // tilt. , x as.            
            controls.maxPolarAngle = Math.PI * 0.6;

            controls.minAzimuthAngle = -Math.PI * 0.25;      // rot y as.
            //   controls.maxAzimuthAngle = Math.PI * 0.4;

            controls.minDistance = radius;    // 500 
            controls.maxDistance = 5500;     // 1500 tevens startpositie camera

            controls.autoRotate = true;
            controls.autoRotateSpeed = 8;   // 2.4;   // 2 is default. 
            controls.update();
        }

        function maakBallen() {
            let aantalBallen = 5;
            for (let k = 1; k < aantalBallen; k++) {
                clones[k] = pointLight.clone();
                clones[k].position.x = radius * 1 * k - radius * 1 * aantalBallen / 2;
                clones[k].position.y = 0;  // radius * 1 * k - radius * 1 * 5;
                clones[k].position.z = radius * 3 * k - radius * 1 / aantalBallen;
                //  scene.add(clones[k]);                    
                groupBallen.add(clones[k]);
            }
            scene.add(groupBallen);

        }

        function laadModel() {
            let pad = "https://cdn.jsdelivr.net/gh/robvancooten/glb/";
            let model = pad + 'bladerKop.glb';
            //  console.log("model: " + model)
            const loader = new GLTFLoader();

            loader.load(model, function (gltf) {
                kop = gltf.scene.children[0];

                kop.scale.multiplyScalar(3.5);  // 50 
            },
                // called while loading is progressing
                function (xhr) {
                    ;
                    // 	console.log((xhr.loaded / xhr.total * 100) + '% loaded');
                },
                // called when loading has errors
                function (error) {
                    console.log('O, 0 An error happened during loading');
                }
            );    // einde loader
        }   // einde laadModel

        function maakMenu() {
            let menu = document.getElementById("menu");
            if (isTouchDevice())
                menu.innerHTML = leesMenuTekst() + "Planet with Heads - Use fingers to zoom, rotate. Touch for reverse rotation -";
            else
                menu.innerHTML = leesMenuTekst() + "Planet with Heads - Click for reverse rotation. Zoom with MouseWheel -";

            kleurActiveLink();
        }

        function maakScene() {
            scene = new THREE.Scene();
            //  scene.background = new THREE.Color(0x99ee99);
            scene.background = new THREE.Color(0x003300);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 45, 30 * 1000);
            camera.position.z = 1200; // 1500;
            //  camera.lookAt(new THREE.Vector3(1, 1, 1))
        }

        function maakRenderer() {
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
        }

    </script>
</body>

</html>
